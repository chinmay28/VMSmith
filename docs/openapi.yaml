openapi: 3.0.3
info:
  title: VMSmith API
  version: 0.2.0
  description: |
    OpenAPI description for the VMSmith REST API.

    This spec covers the implemented `/api/v1/*` surface exposed by the daemon,
    including VM lifecycle, bulk actions, cloning, snapshots, images, templates,
    host discovery, quotas, and log retrieval.
servers:
  - url: http://localhost:8080/api/v1
    description: Local daemon
security:
  - bearerAuth: []
tags:
  - name: VMs
  - name: Snapshots
  - name: Port Forwards
  - name: Images
  - name: Templates
  - name: Host
  - name: Quotas
  - name: Logs
  - name: Events
  - name: Schedules
paths:
  /vms:
    get:
      tags: [VMs]
      summary: List virtual machines
      parameters:
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/SearchFilter'
        - $ref: '#/components/parameters/ImageFilter'
        - $ref: '#/components/parameters/DefaultUserFilter'
        - $ref: '#/components/parameters/OSTypeFilter'
        - $ref: '#/components/parameters/OSVariantFilter'
        - $ref: '#/components/parameters/FirmwareFilter'
        - $ref: '#/components/parameters/DiskBusFilter'
        - $ref: '#/components/parameters/NICModelFilter'
        - $ref: '#/components/parameters/MachineFilter'
        - $ref: '#/components/parameters/ClockOffsetFilter'
        - $ref: '#/components/parameters/GPUFilter'
        - $ref: '#/components/parameters/NetworkFilter'
        - $ref: '#/components/parameters/PrefixFilter'
        - name: nat_static_ip
          in: query
          required: false
          description: |
            Case-insensitive exact-match on the VM's
            `spec.nat_static_ip`. Matches when the filter equals the
            stored CIDR (e.g. `192.168.100.50/24`) or the IP portion
            alone (e.g. `192.168.100.50`). Whitespace is trimmed; empty
            disables the filter. VMs with an empty `nat_static_ip`
            (DHCP-assigned) drop out whenever the filter is set —
            mirrors the empty-stored exclusion contract on the
            port-forward `?guest_ip=` filter (5.4.73). No validation
            rejection: `nat_static_ip` is a free-form value operators
            paste verbatim and garbage simply matches no VMs. Applied
            between `prefix` and `since`/`until` so it composes
            additively with every other VM filter; `X-Total-Count`
            reflects the post-filter population.
          schema:
            type: string
        - name: nat_gateway
          in: query
          required: false
          description: |
            Case-insensitive exact-match on the VM's
            `spec.nat_gateway` (the plain gateway IP — no CIDR
            dual-form, since gateways are always stored as bare IPs).
            Whitespace is trimmed; empty disables the filter. VMs with
            an empty `nat_gateway` (no explicit gateway override) drop
            out whenever the filter is set — mirrors the
            empty-stored-excludes contract on `?nat_static_ip=`
            (5.4.79). No validation rejection: `nat_gateway` is a
            free-form value operators paste verbatim and garbage simply
            matches no VMs. Applied right after `nat_static_ip` and
            before `since`/`until` so it composes additively with every
            other VM filter; `X-Total-Count` reflects the post-filter
            population.
          schema:
            type: string
        - name: ip
          in: query
          required: false
          description: |
            Case-insensitive exact-match on the VM's runtime-discovered
            IP (`vm.ip` — the value displayed in the VM table, populated
            by the libvirt DHCP lease lookup with fallback to the IP
            portion of `spec.nat_static_ip` for static-IP VMs). Closes
            the operator query *"which VM is at 192.168.100.42 right
            now?"* that `?nat_static_ip=` (5.4.79) cannot answer for
            DHCP-assigned VMs because those VMs have an empty
            `spec.nat_static_ip`. Whitespace is trimmed; empty disables
            the filter. VMs with an empty IP (stopped, no lease yet, no
            static IP) drop out whenever the filter is set, mirroring
            the empty-stored-excludes contract on `?nat_static_ip=` and
            `?nat_gateway=`. No validation rejection: `ip` is a
            free-form value operators paste verbatim and garbage simply
            matches no VMs. Applied right after `nat_gateway` and before
            `since`/`until` so it composes additively with every other
            VM filter; `X-Total-Count` reflects the post-filter
            population.
          schema:
            type: string
        - $ref: '#/components/parameters/AutoStartFilter'
        - $ref: '#/components/parameters/LockedFilter'
        - $ref: '#/components/parameters/VMSort'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the VM's
            `created_at`. VMs created before this instant are filtered
            out. Whitespace is trimmed; empty disables the filter.
            Invalid values return 400 `invalid_since`. A VM with a zero
            / unknown `created_at` is filtered OUT whenever any bound is
            set — operators querying a time window don't want unbounded
            entries silently included. Composes additively with every
            other list filter so `X-Total-Count` reflects the
            post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the VM's
            `created_at`. VMs created after this instant are filtered
            out. Whitespace is trimmed; empty disables the filter.
            Invalid values return 400 `invalid_until`. Same zero /
            unknown / additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
        - name: min_cpus
          in: query
          required: false
          description: |
            Inclusive lower bound on the VM's `spec.cpus` (vCPU count).
            VMs with fewer vCPUs are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_min_cpus`. Composes additively with every
            other list filter so `X-Total-Count` reflects the post-filter
            population.
          schema:
            type: integer
            minimum: 0
        - name: max_cpus
          in: query
          required: false
          description: |
            Inclusive upper bound on the VM's `spec.cpus` (vCPU count).
            VMs with more vCPUs are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_max_cpus`. Same count-range semantics as
            `min_cpus`.
          schema:
            type: integer
            minimum: 0
        - name: min_ram_mb
          in: query
          required: false
          description: |
            Inclusive lower bound on the VM's `spec.ram_mb` (RAM in MB).
            VMs with less RAM are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_min_ram_mb`. Composes additively with every
            other list filter so `X-Total-Count` reflects the post-filter
            population.
          schema:
            type: integer
            minimum: 0
        - name: max_ram_mb
          in: query
          required: false
          description: |
            Inclusive upper bound on the VM's `spec.ram_mb` (RAM in MB).
            VMs with more RAM are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_max_ram_mb`. Same count-range semantics as
            `min_ram_mb`.
          schema:
            type: integer
            minimum: 0
        - name: min_disk_gb
          in: query
          required: false
          description: |
            Inclusive lower bound on the VM's `spec.disk_gb` (disk in GB).
            VMs with less disk are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_min_disk_gb`. Composes additively with every
            other list filter so `X-Total-Count` reflects the post-filter
            population.
          schema:
            type: integer
            minimum: 0
        - name: max_disk_gb
          in: query
          required: false
          description: |
            Inclusive upper bound on the VM's `spec.disk_gb` (disk in GB).
            VMs with more disk are filtered out. Whitespace is trimmed;
            empty disables the bound. Non-numeric or negative values
            return 400 `invalid_max_disk_gb`. Same count-range semantics as
            `min_disk_gb`.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: VM list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [VMs]
      summary: Create a VM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMSpec'
      responses:
        '201':
          description: VM created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/stats/top:
    get:
      tags: [VMs]
      summary: Top VMs by metric
      description: |
        Returns the top-N VMs ranked by the requested metric, sorted descending.
        Values are taken from each VM's most recent in-memory metric sample;
        VMs without a sample for the requested metric are skipped. Returns 503
        when metrics collection is disabled.
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
            default: cpu
          description: Which metric to rank by.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
        - name: state
          in: query
          schema:
            type: string
            enum: [running, all]
            default: running
          description: Limit to running VMs (default) or include all VMs.
      responses:
        '200':
          description: Top VMs ranked by metric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopVMResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/bulk:
    post:
      tags: [VMs]
      summary: Run a bulk VM lifecycle action
      description: |
        Apply the same lifecycle action to multiple VMs in a single request.
        Supported actions are `start`, `stop`, `delete`, `restart`,
        `force-stop`, `reboot`, `suspend`, and `resume`. Per-VM successes and
        failures are returned together so partial failures (one VM in the
        wrong state, the rest succeeded) surface in the response without
        stopping the bulk operation. Each successful per-VM action emits the
        same `vm.<action>_requested` (or `vm.deleted`) event as the
        single-VM endpoint, with an extra `bulk=true` attribute so audit
        consumers can distinguish bulk actions from operator clicks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkVMActionRequest'
      responses:
        '200':
          description: Per-VM bulk action results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkVMActionResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}:
    get:
      tags: [VMs]
      summary: Get a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [VMs]
      summary: Update a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMUpdateSpec'
      responses:
        '200':
          description: Updated VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [VMs]
      summary: Delete a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '204':
          description: VM deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/start:
    post:
      tags: [VMs]
      summary: Start a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stop:
    post:
      tags: [VMs]
      summary: Stop a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/force-stop:
    post:
      tags: [VMs]
      summary: Force-stop a VM (immediate destroy, skips ACPI shutdown)
      description: |
        Equivalent to pulling the power cord — used when the guest OS is
        unresponsive or the operator deliberately wants to skip graceful
        shutdown. Returns 409 `vm_already_stopped` when the VM is not in a
        running state.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM force-stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/restart:
    post:
      tags: [VMs]
      summary: Restart a VM (graceful stop then start; or just start if stopped)
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/reboot:
    post:
      tags: [VMs]
      summary: Reboot a running VM via guest ACPI signal (no power cycle)
      description: |
        Sends an ACPI reboot signal to the guest via libvirt's `dom.Reboot()`.
        Unlike `restart` (which is a stop+start cycle that power-cycles the
        QEMU process), `reboot` keeps the libvirt domain alive and asks the
        guest OS to reboot itself. The IP, MAC, and DHCP reservation are
        preserved. Returns 409 `vm_not_running` when the VM is not running.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM reboot signal sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/suspend:
    post:
      tags: [VMs]
      summary: Suspend a running VM (freeze CPU + memory)
      description: |
        Pauses CPU + memory of a running VM without releasing host resources.
        IPs, sockets, and RAM contents are preserved; resume picks up where
        suspend left off. Returns 409 `vm_not_running` if the VM is stopped, or
        409 `vm_already_paused` if it is already paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/resume:
    post:
      tags: [VMs]
      summary: Resume a paused VM
      description: |
        Unpauses a suspended VM, restoring it to the running state. Returns
        409 `vm_not_paused` if the VM is not currently paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/clone:
    post:
      tags: [VMs]
      summary: Clone a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneVMRequest'
      responses:
        '201':
          description: Cloned VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats:
    get:
      tags: [VMs]
      summary: Get VM resource metrics
      description: |
        Returns the most recent metric sample plus the in-memory history ring
        for a VM. History is ordered oldest-first. Metric fields are nullable —
        a missing CPU/mem/disk/net field means the daemon has no value for that
        metric (e.g., counter reset, guest agent unavailable, or the first
        sample after boot has no prior counter to derive a rate from).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - name: since
          in: query
          required: false
          description: RFC 3339 timestamp; truncate history to samples after this time.
          schema:
            type: string
            format: date-time
        - name: fields
          in: query
          required: false
          description: Comma-separated projection (any of `cpu`, `mem`, `disk`, `net`).
          schema:
            type: string
      responses:
        '200':
          description: VM stats snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMStatsSnapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats/stream:
    get:
      tags: [VMs]
      summary: Stream VM resource metrics (SSE)
      description: |
        Server-Sent Events stream of `MetricSample` frames. Each new sample
        produced by the metrics collector is delivered as one `vm.stats`
        event whose `data` field is a JSON-encoded `MetricSample` and whose
        `id` is the sample's unix-nanosecond timestamp. Clients should
        seed history with `GET /vms/{vmID}/stats` before subscribing.
        Replay is not supported on this stream, so requests that send
        `Last-Event-ID` or `?since=` are rejected with HTTP 400
        `metrics_replay_not_supported`. A `: keepalive` comment frame is
        sent every 30 seconds. The stream closes when the client
        disconnects, the VM is deleted, or the daemon shuts down.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/operations/progress:
    get:
      tags: [VMs]
      summary: Stream long-operation progress (SSE)
      description: |
        Server-Sent Events stream of long-running operation progress for the VM
        — currently image export (`POST /images`) and clone (`POST
        /vms/{id}/clone`). Each `operation.progress` event's `data` field is a
        JSON object `{ "op": string, "name": string, "percent": number, "done":
        boolean }` where `op` is `"export"` or `"clone"`, carrying the live
        `qemu-img convert` completion percentage (throttled to whole-percent
        steps). A terminal frame with `done: true` is sent when the operation
        finishes (success or failure) and closes the stream. The daemon replays
        the most recent frame to a subscriber that connects mid-operation, so a
        small connect delay never loses progress. This dedicated channel
        bypasses the event bus, so the high-frequency frames never reach the
        persistent event log or webhooks. A `: keepalive` comment frame is sent
        every 30 seconds.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots:
    get:
      tags: [Snapshots]
      summary: List VM snapshots
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SnapshotSort'
        - $ref: '#/components/parameters/SortOrder'
        - name: search
          in: query
          required: false
          description: |
            Case-insensitive substring filter applied to the snapshot's
            `name`, `description`, and `tags`. The needle is trimmed and
            lowercased before matching. Filtering happens before sort +
            pagination so `X-Total-Count` reflects the post-search
            population. The snapshot ID (`<vmID>/<name>`) and `vm_id` are
            intentionally excluded from the haystack to avoid noisy false
            positives on short numeric queries.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: |
            Case-insensitive exact-match tag filter. A snapshot matches
            when any of its tags equals this value. Applied **before**
            `search` so the post-filter `X-Total-Count` reflects the
            intersection. Mirrors the same shape on every other tagged
            resource (VMs, images, templates, port forwards, webhooks).
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          description: |
            Case-sensitive `HasPrefix(snap.name, prefix)` filter. A
            snapshot matches when its `name` starts with this value
            literally. Whitespace is trimmed; empty disables the filter.
            Mirrors the `prefix` selector on
            `POST /vms/{vmID}/snapshots/bulk_delete` so the same query
            an operator runs to inspect (`?prefix=auto-nightly-`)
            round-trips 1:1 with the request body they then send to
            bulk_delete — preview the cohort before deleting it. Applied
            between `tag` and the time-range filter so the post-filter
            `X-Total-Count` stays correct.
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the snapshot's
            `created_at`. Snapshots created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A snapshot
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `prefix`, `search`, and pagination so
            `X-Total-Count` reflects the post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the snapshot's
            `created_at`. Snapshots created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same
            zero / unknown / additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Snapshots]
      summary: Create a VM snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/{snapName}/restore:
    post:
      tags: [Snapshots]
      summary: Restore a snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      responses:
        '200':
          description: Snapshot restored
