  /webhooks:
    get:
      tags: [Webhooks]
      summary: List registered webhooks (secrets redacted)
      parameters:
        - in: query
          name: tag
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the webhook tag list
            (a webhook matches when any of its tags equals the value).
            Whitespace-trimmed. Applied before the search filter so the
            response reflects the intersection of tag + search.
        - in: query
          name: event_type
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the webhook's
            `event_types` filter list (a webhook matches when any entry in
            the list equals the value). Whitespace-trimmed. Catch-all
            webhooks (empty `event_types`) are NOT matched — mirrors the
            bulk_delete `event_type` selector semantics: this is an
            explicit-membership query ("which webhooks listen for
            vm.created"), not "which webhooks will fire for this event".
            Applied between `tag` and `search` so the post-filter
            `X-Total-Count` stays correct.
        - in: query
          name: since
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp lower bound (inclusive) on the webhook's
            `created_at`. Webhooks created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A webhook
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `event_type`, `search`, `sort`, and pagination so
            `X-Total-Count` reflects the post-filter population. Mirrors
            the snapshot (5.4.28), image (5.4.29), VM (5.4.30), and
            template (5.4.31) time-range filters.
        - in: query
          name: until
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp upper bound (inclusive) on the webhook's
            `created_at`. Webhooks created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same zero
            / unknown / additive-composition semantics as `since`.
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied across each webhook's
            URL, description, event-type filters, and tags. Whitespace is
            trimmed before matching. Secret, ID, and last_error are
            intentionally excluded from the haystack — secrets must never
            appear in response bodies, IDs are opaque `wh-<unix-nano>`
            strings, and last_error is operator-noise surfaced via
            `last_status` / status badges instead.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [id, url, created_at, last_delivery_at]
            default: id
          description: |
            Field to sort by. `url` matches case-insensitively.
            `last_delivery_at` sorts never-delivered webhooks
            (zero timestamp) at the tail of the ascending list and the
            head of the descending list. All comparators tiebreak on `id`
            so repeated requests return a deterministic order.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction. Default `asc`.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: |
            1-based page number when paginating the filtered + sorted
            response. Has no effect when `per_page` (or `limit`) is unset.
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
          description: |
            Maximum number of webhooks to return per page. `limit` is
            accepted as a synonym. When omitted the full filtered set is
            returned. Pagination is applied after filter + sort so the
            `X-Total-Count` response header reflects the post-filter /
            pre-pagination population.
      responses:
        '200':
          description: Webhook list
          headers:
            X-Total-Count:
              description: |
                Total number of webhooks matching the active filters before
                pagination is applied. Use this to drive page indicators
                like "Showing 1-25 of 137".
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/bulk_delete:
    post:
      tags: [Webhooks]
      summary: Delete multiple webhooks in a single request
      description: |
        Delete a batch of webhooks either by explicit ID list or by event-type
        selector. Returns a per-target result so partial failures (one
        webhook missing, the rest succeeded) surface in a single response.
        Exactly one of `ids` or `event_type` must be provided.

        The `event_type` selector matches webhooks whose `event_types` filter
        list contains the exact event type. Catch-all webhooks (empty
        `event_types`) are NOT swept by the categorical selector — delete
        them by id. Mirrors `/templates/bulk_delete` (2.3.9) and
        `/images/bulk_delete` (2.3.6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteWebhooksRequest'
      responses:
        '200':
          description: Per-webhook delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteWebhooksResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Webhooks]
      summary: Get a single webhook (secret redacted)
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [Webhooks]
      summary: Update editable webhook fields
      description: >
        Mutates one or more editable fields on an existing webhook.  Every
        field in the request body is optional — omit a key to leave it
        unchanged.  At least one editable field must be present; an empty
        body returns 400 `noop_update`.

        On success the in-memory delivery worker is bounced so subsequent
        deliveries pick up the new URL / secret / event-type filters /
        active flag.  Setting `active: false` stops the worker; setting
        it back to `true` re-registers it.

        Secrets are accepted but never returned; the response carries the
        same redacted shape as `GET /webhooks/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateSpec'
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}/test:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Webhooks]
      summary: Send a synthetic test event to a webhook
      description: >
        Synthesises a `system.webhook_test` event and delivers it once
        (no retries) to the registered webhook so operators can verify
        connectivity, signing, and receiver health.  Updates the persisted
        webhook's `last_status` / `last_error` / `last_delivery_at` fields.
      responses:
        '200':
          description: Delivery attempted (success or failure both return 200; inspect the body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResult'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /logs:
    get:
      tags: [Logs]
      summary: List recent daemon logs
      parameters:
        - name: level
          in: query
          schema:
            type: string
          description: Minimum log level.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return entries at or after this timestamp.
        - name: source
          in: query
          schema:
            type: string
          description: Filter by structured log source.
        - name: vm_id
          in: query
          required: false
          schema:
            type: string
          description: |
            Exact-match filter against each entry's structured `vm_id`
            field (case-sensitive — VM IDs are opaque `vm-<unix-nano>`
            strings). Whitespace is trimmed before matching. Empty value
            disables the filter. Composes additively with `level`,
            `source`, `since`, `search`, and pagination so
            `X-Total-Count` reflects the post-filter population.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Alias retained for compatibility.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: |
            Case-insensitive substring filter applied to each entry's
            message, source, level, and every value in the structured
            fields map. Whitespace is trimmed before matching. Field keys
            and timestamps are intentionally excluded from the haystack —
            keys are a small repeating vocabulary (`vm_id`, `method`,
            `error`, ...) and would generate noisy matches, while
            timestamps are scoped via `since`. The filter composes
            additively with `level`, `source`, `since`, and pagination,
            so `X-Total-Count` reflects the post-search population.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [timestamp, level, source]
            default: timestamp
          description: |
            Sort entries by `timestamp`, `level`, or `source`. `level`
            orders by severity rank (debug < info < warn < error), not
            alphabetically. `source` matches case-insensitively. All
            comparators tiebreak on timestamp+source so paginated
            responses are deterministic. Unknown values return 400
            `invalid_sort`.
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: |
            Sort order. Default is `asc` — preserves the legacy
            oldest-first contract the GUI's auto-scroll relies on.
            Unknown values return 400 `invalid_order`.
      responses:
        '200':
          description: Log entries
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
        default:
          $ref: '#/components/responses/APIError'
  /events:
    get:
      tags: [Events]
      summary: List recent events
      description: |
        Returns the most recent events matching the provided filters, sorted
        newest-first by default. Each event carries a monotonic numeric ID
        assigned by the EventBus, plus a structured payload (source, severity,
        attributes).

        Sorting is whitelisted via `sort` and `order` (defaults: `id` /
        `desc` — preserves the long-standing "newest first" contract since
        sequence IDs are appended in publish order). All comparators tiebreak
        on `id` so paginated responses are deterministic. Unknown values
        return 400 `invalid_sort` / `invalid_order`.

        Pagination is page/per_page; clients can also provide `until=<seq>` to
        fetch events older than a known sequence ID (cursor pagination).
      parameters:
        - name: vm_id
          in: query
          schema:
            type: string
          description: Filter by VM ID (exact match).
        - name: type
          in: query
          schema:
            type: string
          description: Filter by event type (e.g., `vm.started`).
        - name: type_prefix
          in: query
          schema:
            type: string
          description: |
            Case-insensitive prefix match on event type. Lets operators slice
            an entire event family (e.g. `snapshot.` matches every `snapshot.*`
            subtype, `vm.` matches every `vm.*` subtype) without enumerating
            each fully-qualified type. Composes additively with `type`,
            `source`, `severity`, `search`, and the time/cursor filters.
        - name: source
          in: query
          schema:
            type: string
            enum: [libvirt, app, system]
          description: Filter by event source.
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warn, error]
          description: Filter by severity.
        - name: actor
          in: query
          schema:
            type: string
          description: |
            Case-sensitive exact-match filter on the event's `actor` field
            (e.g. `system`, `app`, or an API-key alias). Mirrors `?vm_id=`'s
            contract: empty disables the filter, whitespace is trimmed.
            Lets operators slice the timeline to a single human / bot
            without the noisy substring matches `?search=` gives.
        - name: resource_id
          in: query
          schema:
            type: string
          description: |
            Filter by `resource_id` (exact match, case-sensitive). Mirrors the
            `vm_id` filter contract — resource IDs are opaque server-issued
            strings operators reference verbatim (e.g. `snap-…`, `img-…`,
            `wh-…`). Whitespace is trimmed before comparison; empty disables
            the filter. Composes additively with `vm_id`, `type`, `source`,
            `severity`, `actor`, `search`, `since`, and `until` so
            `X-Total-Count` reflects the post-filter population.
        - name: search
          in: query
          schema:
            type: string
          description: |
            Case-insensitive substring match across `message`, `type`, `source`,
            `severity`, `actor`, `vm_id`, `resource_id`, and every value in
            `attributes`. Combines additively with the other filters.
            The numeric event ID is intentionally excluded from the haystack so
            short numeric queries don't produce noisy matches.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return only events with `occurred_at` after this RFC3339 timestamp.
        - name: until
          in: query
          schema:
            type: string
          description: Cursor — exclude events with sequence ID >= this uint64.
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, occurred_at, type, source, severity]
            default: id
          description: |
            Sort field. `type`, `source`, and `severity` match
            case-insensitively. Defaults to `id` so the long-standing
            newest-first contract is preserved.
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: |
            Sort direction. Defaults to `desc` so the long-standing
            newest-first contract is preserved.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Event list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        default:
          $ref: '#/components/responses/APIError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  headers:
    XTotalCount:
      description: Total matching records before pagination.
      schema:
        type: integer
  parameters:
    VMID:
      name: vmID
      in: path
      required: true
      schema:
        type: string
    ImageID:
      name: imageID
      in: path
      required: true
      schema:
        type: string
    TemplateID:
      name: templateID
      in: path
      required: true
      schema:
        type: string
    PortID:
      name: portID
      in: path
      required: true
      schema:
        type: string
    SnapshotName:
      name: snapName
      in: path
      required: true
      schema:
        type: string
    TagFilter:
      name: tag
      in: query
      schema:
        type: string
      description: Case-insensitive tag filter.
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [creating, running, stopped, paused, deleted, unknown]
    SearchFilter:
      name: search
      in: query
      description: |
        Case-insensitive substring filter applied across the VM's name,
        description, and tags. Combine with `tag` and `status` for narrower
        scoping; an empty value matches every VM. ID is intentionally excluded
        from the match — the opaque `vm-<unix-nano>` form rarely matches a
        useful operator query.
      schema:
        type: string
    ImageFilter:
      name: image
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's base image
        (`spec.image`). Closes the operator query "show me every VM built
        from `rocky9.qcow2`" that the existing `?search=` and `?tag=`
        filters cannot answer precisely — `?search=rocky` would also
        match VMs whose description or tag contains the substring, while
        `?tag=` requires the operator to have tagged every VM by image.
        Whitespace is trimmed before comparison; empty value disables
        the filter. Composes additively with `tag`, `status`, `search`,
        and the sort + pagination params.
      schema:
        type: string
    DefaultUserFilter:
      name: default_user
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's configured
        `default_user` field. Whitespace is trimmed before comparison;
        an empty value disables the filter. An empty `spec.default_user`
        is treated as `root` to mirror `lifecycle.go`'s runtime semantics
        — `?default_user=root` matches every VM that SSHes in as root,
        whether the field was explicitly set or left blank at create
        time. Composes additively with the existing `tag`, `status`, and
        `search` filters; `X-Total-Count` reflects the post-filter /
        pre-pagination population.
      schema:
        type: string
    AutoStartFilter:
      name: auto_start
      in: query
      description: |
        Tristate boolean filter on the VM's `auto_start` flag. Accepts
        `true` / `false` (case-insensitive, plus `1` / `0` aliases);
        absent or whitespace-only disables the filter so every VM is
        returned. Anything else returns 400 `invalid_auto_start`.
        Composes additively with every other list filter so
        `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: ["true", "false"]
    LockedFilter:
      name: locked
      in: query
      description: |
        Tristate boolean filter on the VM's `locked` (delete-protection)
        flag. Accepts `true` / `false` (case-insensitive, plus `1` / `0`
        aliases); absent or whitespace-only disables the filter so every
        VM is returned. Anything else returns 400 `invalid_locked`.
        Composes additively with every other list filter so
        `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: ["true", "false"]
    VMSort:
      name: sort
      in: query
      description: |
        Field to sort the VM list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. All comparators tiebreak on `id` so
        pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, created_at, state]
        default: id
    ImageSort:
      name: sort
      in: query
      description: |
        Field to sort the image list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. All comparators tiebreak on `id` so
        pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, size, created_at]
        default: id
    SnapshotSort:
      name: sort
      in: query
      description: |
        Field to sort the snapshot list by. Defaults to `id`. Within a single
        VM the snapshot ID is `<vmID>/<name>` so id-asc is identical to
        name-asc. Unknown values return 400 `invalid_sort`. All comparators
        tiebreak on `name` so pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, created_at]
        default: id
    TemplateSort:
      name: sort
      in: query
      description: |
        Field to sort the template list by. Defaults to `id`. Unknown
        values return 400 `invalid_sort`. All comparators tiebreak on
        `id` so paginated requests return the same set across two
        independent fetches.
      schema:
        type: string
        enum: [id, name, created_at]
        default: id
    SortOrder:
      name: order
      in: query
      description: |
        Sort direction. Defaults to `asc`. Unknown values return 400
        `invalid_order`.
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
  responses:
    APIError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
  schemas:
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    Protocol:
      type: string
      enum: [tcp, udp]
    VMState:
      type: string
      enum: [creating, running, stopped, paused, deleted, unknown]
    NetworkMode:
      type: string
      enum: [nat, macvtap, bridge]
    NetworkAttachment:
      type: object
      properties:
        name:
          type: string
        mode:
          $ref: '#/components/schemas/NetworkMode'
        host_interface:
          type: string
        bridge:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        mac_address:
          type: string
    VMSpec:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        template_id:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        cloud_init_file:
          type: string
        ssh_pub_key:
          type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: When true, the daemon starts this VM automatically at boot.
        locked:
          type: boolean
          description: When true, the VM is delete-protected. Stop/start/restart still work.
    VMUpdateSpec:
      type: object
      properties:
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: Toggle auto-start at daemon boot. Omit to leave unchanged.
          nullable: true
        locked:
          type: boolean
          description: Toggle delete-protection. Omit to leave unchanged.
          nullable: true
    VM:
      type: object
      required: [id, name, spec, state, disk_path, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        spec:
          $ref: '#/components/schemas/VMSpec'
        state:
          $ref: '#/components/schemas/VMState'
        ip:
          type: string
        nat_mac:
          type: string
        disk_path:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CloneVMRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    BulkVMActionRequest:
      type: object
      required: [action, ids]
      properties:
        action:
          type: string
          enum: [start, stop, delete, restart, force-stop, reboot, suspend, resume]
          description: |
            Lifecycle verb to apply to every VM in `ids`. Maps 1:1 to the
            single-VM endpoints — e.g. `restart` is a graceful stop+start,
            `reboot` issues an in-guest ACPI reboot without power-cycling
            QEMU, `force-stop` is an immediate destroy that skips ACPI,
            `suspend`/`resume` pause/unpause CPU+memory.
        ids:
          type: array
          minItems: 1
          items:
            type: string
    BulkVMActionResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    BulkVMActionResponse:
      type: object
      required: [action, results]
      properties:
        action:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkVMActionResult'
    UpdatePortRequest:
      type: object
      description: |
        Editable metadata for an existing port forwarding rule. Currently
        `description` and `tags` are editable; the underlying iptables
        5-tuple (host_port/guest_port/guest_ip/protocol) is immutable. Both
        fields use JSON-pointer style optionals — omit a key to leave its
        value unchanged. Pass `description: ""` to clear the description;
        pass `tags: []` to clear the tag set.
      properties:
        description:
          type: string
          maxLength: 256
          description: Free-form label (max 256 chars). Pass `""` to clear.
        tags:
          type: array
          description: |
            Replace the rule's tag set with this list. Tags are normalised
            (lowercased, deduplicated, alphabetised; 1-32 chars; pattern
            `[a-z0-9][a-z0-9._:-]*`). Pass `[]` to clear; omit the key to
            leave the existing tag set unchanged.
          items:
            type: string
    BulkDeletePortsRequest:
      type: object
      description: |
        Selector for the port forwards to delete. Exactly one of `ids` or
        `protocol` must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present.
      properties:
        ids:
          type: array
          description: Explicit list of port-forward IDs to delete.
          items:
            type: string
        protocol:
          type: string
          enum: [tcp, udp]
          description: Match every port forward on this VM with this protocol.
    BulkDeletePortsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeletePortResult'
    BulkDeletePortResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteSnapshotsRequest:
      type: object
      description: |
        Selector for the snapshots to delete. Exactly one of `names` or `prefix`
        must be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present.
      properties:
        names:
          type: array
          description: Explicit list of snapshot names to delete.
          items:
            type: string
        prefix:
          type: string
          description: Match every snapshot whose name starts with this prefix.
    BulkDeleteSnapshotsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteSnapshotResult'
    BulkDeleteSnapshotResult:
      type: object
      required: [name, success]
      properties:
        name:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteImagesRequest:
      type: object
      description: |
        Selector for the images to delete. Exactly one of `ids` or `tag` must
        be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present. Tag matching is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of image IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every image whose tag list contains this tag (case-insensitive).
    BulkDeleteImagesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteImageResult'
    BulkDeleteImageResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteTemplatesRequest:
      type: object
      description: |
        Selector for the templates to delete. Exactly one of `ids` or `tag`
        must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present. Tag matching
        is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of template IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every template whose tag list contains this tag (case-insensitive).
    BulkDeleteTemplatesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteTemplateResult'
    BulkDeleteTemplateResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteWebhooksRequest:
      type: object
      description: |
        Selector for the webhooks to delete. Exactly one of `ids` or
        `event_type` must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present.

        The `event_type` selector matches webhooks whose `event_types`
        filter list contains this exact value. Catch-all webhooks
        (empty `event_types`) are NOT swept by the categorical selector
        — delete them by id.
      properties:
        ids:
          type: array
          description: Explicit list of webhook IDs to delete.
          items:
            type: string
        event_type:
          type: string
          description: Match every webhook whose event_types filter contains this exact event type.
    BulkDeleteWebhooksResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteWebhookResult'
    BulkDeleteWebhookResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    TopVMItem:
      type: object
      required: [vm_id, name, state, value]
      properties:
        vm_id:
          type: string
        name:
          type: string
        state:
          type: string
        value:
          type: number
          format: double
        sample:
          $ref: '#/components/schemas/MetricSample'
    TopVMResponse:
      type: object
      required: [metric, limit, state, items]
      properties:
        metric:
          type: string
          enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
        limit:
          type: integer
        state:
          type: string
          enum: [running, all]
        items:
          type: array
          items:
            $ref: '#/components/schemas/TopVMItem'
    Snapshot:
      type: object
      required: [id, vm_id, name, created_at]
      properties:
        id:
          type: string
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
          description: Optional free-text description (max 1024 chars).
        tags:
          type: array
          items:
            type: string
          description: |
            Operator-supplied labels.  Lowercased, deduplicated, and
            alphabetised server-side using the shared tag alphabet
            (1-32 chars, `[a-z0-9][a-z0-9._:-]*`).  Persisted out of band
            from the libvirt snapshot XML (the domainsnapshot schema does
            not permit `<metadata>`); the wire shape is identical to the
            tags array on every other tagged resource.
        created_at:
          type: string
          format: date-time
    CreateSnapshotRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          maxLength: 1024
          description: Optional free-text description for this snapshot.
        tags:
          type: array
          items:
            type: string
          description: |
            Optional tag list.  Lowercased + deduped + alphabetised server-side
            using the shared `[a-z0-9][a-z0-9._:-]*` tag alphabet.
    UpdateSnapshotRequest:
      type: object
      description: |
        Editable metadata for an existing snapshot. The snapshot's
        underlying disk and memory state, parent pointer, and creation
        timestamp are immutable.

        Field semantics:
          * `description` nil/missing = leave as-is; explicit empty
            string clears the description.
          * `tags` nil/missing = leave as-is; explicit empty array
            (`[]`) clears every tag.
      properties:
        description:
          type: string
          nullable: true
          maxLength: 1024
          description: New description for the snapshot. Empty string clears.
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: New tag list. Empty array clears every tag.
    AddPortRequest:
      type: object
      required: [host_port, guest_port]
      properties:
        host_port:
          type: integer
        guest_port:
          type: integer
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          maxLength: 256
          description: Optional free-form label for the rule (e.g. "web", "metrics scrape").
        tags:
          type: array
          description: |
            Optional free-form tags. Normalised on save (lowercased,
            deduplicated, alphabetised; 1-32 chars per tag; pattern
            `[a-z0-9][a-z0-9._:-]*`).
          items:
            type: string
    PortForward:
      type: object
      required: [id, vm_id, host_port, guest_port, guest_ip, protocol]
      properties:
        id:
          type: string
        vm_id:
          type: string
        host_port:
          type: integer
        guest_port:
          type: integer
        guest_ip:
          type: string
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          description: Optional free-form label for the rule.
        tags:
          type: array
          description: |
            Normalised tag list (lowercased, deduplicated, alphabetised).
          items:
            type: string
    ConsoleTicket:
      type: object
      required: [ticket, expires_at, websocket_url]
      properties:
        ticket:
          type: string
          description: Single-use opaque token; pass to the websocket endpoint.
        expires_at:
          type: string
          format: date-time
        websocket_url:
          type: string
          description: Path the client should dial after upgrading to a websocket.
    Image:
      type: object
      required: [id, name, path, size_bytes, format, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
        format:
          type: string
        source_vm:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateImageRequest:
      type: object
      required: [vm_id, name]
      properties:
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
    UpdateImageRequest:
      type: object
      properties:
        description:
          type: string
          description: New description. An empty string is treated as "no change".
        tags:
          type: array
          description: Replacement tag set. A null/omitted field leaves tags unchanged; an empty array clears all tags.
          items:
            type: string
    VMTemplate:
      type: object
      required: [id, name, image, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateTemplateRequest:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
    UpdateTemplateRequest:
      type: object
      description: |
        Partial update for an existing template. An empty `description`
        means "no change"; a missing `tags` field means "no change",
        while an explicit empty `tags` array clears the tag set.
      properties:
        description:
          type: string
        tags:
          type: array
          nullable: true
          items:
            type: string
    HostInterface:
      type: object
      required: [name, ips, mac, is_up, is_physical]
      properties:
        name:
          type: string
        ips:
          type: array
          items:
            type: string
        mac:
          type: string
        is_up:
          type: boolean
        is_physical:
          type: boolean
    HostResourceUsageSummary:
      type: object
      required: [used, total]
      properties:
        used:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        available:
          type: integer
          format: int64
        percentage:
          type: integer
    HostStats:
      type: object
      required: [vm_count, cpu, ram, disk, event_stream_connections]
      properties:
        vm_count:
          type: integer
        cpu:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        ram:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        disk:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        event_stream_connections:
          type: integer
          format: int64
          description: |
            Number of in-flight Server-Sent Event clients on
            `/api/v1/events/stream`.  Useful for spotting consumer pressure
            and stuck SSE connections.
    QuotaUsageSummary:
      type: object
      required: [used]
      properties:
        used:
          type: integer
        limit:
          type: integer
    QuotaUsage:
      type: object
      required: [vms, cpus, ram_mb, disk_gb]
      properties:
        vms:
          $ref: '#/components/schemas/QuotaUsageSummary'
        cpus:
          $ref: '#/components/schemas/QuotaUsageSummary'
        ram_mb:
          $ref: '#/components/schemas/QuotaUsageSummary'
        disk_gb:
          $ref: '#/components/schemas/QuotaUsageSummary'
    Webhook:
      type: object
      required: [id, url, active, created_at]
      properties:
        id:
          type: string
          example: "wh-1741234567890123"
        url:
          type: string
          format: uri
          example: "https://example.com/hook"
        event_types:
          type: array
          items:
            type: string
          description: Optional event-type filter list (exact match or "prefix.*" glob). Empty = all events.
        description:
          type: string
          maxLength: 1024
          description: >
            Free-form operator label ("Slack notifier for VM crashes",
            "PagerDuty escalations"). Surfaced in the GUI and CLI listings;
            included in the case-insensitive `search` haystack.
        tags:
          type: array
          items:
            type: string
          description: >
            Free-form lowercase tag list for organising webhooks by team or
            purpose ("production", "audit", "slack"). Normalised on
            persistence (trimmed, lowercased, deduplicated, alphabetised);
            included in the case-insensitive `search` haystack and supports
            exact-match filtering via the `?tag=` query parameter.
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_delivery_at:
          type: string
          format: date-time
        last_status:
          type: integer
          description: HTTP status of the most recent successful delivery; 0 if last attempt failed.
        last_error:
          type: string
    WebhookCreateRequest:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
          description: HMAC-SHA256 signing secret. Never returned in responses.
        event_types:
          type: array
          items:
            type: string
        description:
          type: string
          maxLength: 1024
          description: >
            Free-form operator label. Trimmed before persistence; capped at
            1024 characters. Optional.
        tags:
          type: array
          items:
            type: string
          description: >
            Free-form tag list. Normalised on persistence (trimmed,
            lowercased, deduplicated, alphabetised). Each tag must be 1-32
            characters of lowercase letters, numbers, dots, colons,
            underscores, or hyphens. Optional.
    WebhookUpdateSpec:
      type: object
      description: >
        Partial-update payload for `PATCH /webhooks/{id}`.  All fields are
        optional; omit a key to leave the corresponding field unchanged.
        `event_types: []` clears the filter so the webhook matches every
        event; `event_types` omitted leaves the current list intact.
      properties:
        url:
          type: string
          format: uri
          description: Replace the receiver URL.  Must use http or https.
        secret:
          type: string
          description: >
            Rotate the HMAC signing secret.  Empty string is rejected — an
            unsigned webhook would defeat receiver-side verification.
        event_types:
          type: array
          items:
            type: string
          description: Replace the event-type filter list.  Pass `[]` to clear.
        active:
          type: boolean
          description: Toggle delivery on or off without deleting the registration.
        description:
          type: string
          maxLength: 1024
          description: >
            Replace the free-form description. Omit the key to leave it
            unchanged; pass the empty string to clear it.
        tags:
          type: array
          items:
            type: string
          description: >
            Replace the tag list. Omit the key to leave the current list
            unchanged; pass `[]` to clear all tags. Tags are normalised
            (trimmed, lowercased, deduplicated, alphabetised) before
            persistence.
    WebhookTestResult:
      type: object
      required: [success, duration_ms, attempted_at]
      properties:
        success:
          type: boolean
          description: True iff the receiver returned a 2xx HTTP status.
        status_code:
          type: integer
          description: HTTP status code returned by the receiver, if any.
        error:
          type: string
          description: Error message when delivery failed.
        duration_ms:
          type: integer
          format: int64
          description: Round-trip time of the single delivery attempt.
        attempted_at:
          type: string
          format: date-time
        event_id:
          type: string
          description: ID of the synthetic system.webhook_test event used for the probe.
    LogField:
      type: object
      additionalProperties:
        type: string
    LogsResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        total:
          type: integer
    LogEntry:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
        source:
          type: string
        msg:
          type: string
        fields:
          $ref: '#/components/schemas/LogField'
    MetricSample:
      type: object
      required: [timestamp]
      properties:
        timestamp:
          type: string
          format: date-time
        cpu_percent:
          type: number
          format: double
          nullable: true
          description: CPU utilisation percent across all vCPUs (null when unavailable).
        mem_used_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        mem_avail_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          description: Available memory reported by the guest agent (null without it).
        disk_read_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        disk_write_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_rx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_tx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
    VMStatsSnapshot:
      type: object
      required: [vm_id, state, history, interval_seconds, history_size]
      properties:
        vm_id:
          type: string
        state:
          type: string
          description: VM state at the time of the response (running, stopped, ...).
        last_sampled_at:
          type: string
          format: date-time
          nullable: true
        current:
          allOf:
            - $ref: '#/components/schemas/MetricSample'
          nullable: true
          description: Most recent sample (mirrors the last entry in `history`).
        history:
          type: array
          items:
            $ref: '#/components/schemas/MetricSample'
          description: Sample history, oldest first.
        interval_seconds:
          type: integer
          minimum: 0
          description: Configured sample interval in seconds.
        history_size:
          type: integer
          minimum: 0
          description: Configured ring buffer capacity (max samples retained).
    Event:
      type: object
      required: [id, type, source, severity, message, occurred_at]
      properties:
        id:
          type: string
          description: Stringified monotonic uint64 assigned by the EventBus.
        type:
          type: string
          description: Event type (e.g., `vm.started`, `vm.created`).
        source:
          type: string
          enum: [libvirt, app, system]
        vm_id:
          type: string
        resource_id:
          type: string
        severity:
          type: string
          enum: [info, warn, error]
        message:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        actor:
          type: string
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          description: Legacy timestamp; prefer `occurred_at` for new code.
