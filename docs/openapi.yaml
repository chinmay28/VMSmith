  /templates:
    get:
      tags: [Templates]
      summary: List reusable VM templates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/TemplateSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema: { type: string }
          description: |
            Case-insensitive filter; only templates carrying this tag are
            returned. Filtering is applied before sort + pagination, so
            X-Total-Count reflects the filtered population.
        - in: query
          name: search
          required: false
          description: |
            Case-insensitive substring filter applied to the template's
            `name`, `description`, and `tags`. The needle is trimmed and
            lowercased before matching. Filtering happens before sort +
            pagination so `X-Total-Count` reflects the post-search
            population. ID, image, default_user, and network attachments
            are intentionally excluded from the haystack — they describe
            what the template produces, not the template itself, and
            including them produces noisy false positives. Mirrors the
            5.4.9 / 5.4.10 / 5.4.11 `search` filter contract.
          schema:
            type: string
        - in: query
          name: image
          required: false
          description: |
            Case-insensitive exact-match filter on the template's `image`
            field. Whitespace is trimmed before comparison; empty value
            disables the filter. Closes the operator query "show me every
            template built from `rocky9.qcow2`" that `?search=` would
            match fuzzily across name / description / tags. Composes
            additively with `?tag=`, `?search=`, `?sort=`, `?order=`, and
            pagination so `X-Total-Count` reflects the post-filter
            population. Mirrors the VMs `?image=` filter (5.4.22).
          schema:
            type: string
        - in: query
          name: since
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the template's
            `created_at`. Templates created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A template
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `image`, `search`, `sort`, and pagination so
            `X-Total-Count` reflects the post-filter population. Mirrors
            the snapshot (5.4.28), image (5.4.29), and VM (5.4.30)
            time-range filters.
          schema:
            type: string
        - in: query
          name: until
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the template's
            `created_at`. Templates created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same zero
            / unknown / additive-composition semantics as `since`.
          schema:
            type: string
      responses:
        '200':
          description: Template list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VMTemplate'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Templates]
      summary: Create a reusable VM template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMTemplate'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates/bulk_delete:
    post:
      tags: [Templates]
      summary: Delete multiple templates in a single request
      description: |
        Delete a batch of templates either by explicit ID list or by tag
        selector. Returns a per-target result so partial failures (one
        template missing, the rest succeeded) surface in a single response.
        Exactly one of `ids` or `tag` must be provided. Tag matching is
        case-insensitive. Mirrors `/images/bulk_delete` (2.3.6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteTemplatesRequest'
      responses:
        '200':
          description: Per-template delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteTemplatesResponse'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates/{templateID}:
    patch:
      tags: [Templates]
      summary: Update a template's description and/or tags
      description: |
        Only `description` and `tags` are mutable. PATCH semantics: an empty
        `description` is treated as "no change"; a `null`/missing `tags`
        field is treated as "no change", while an explicit empty array
        (`"tags": []`) clears the tag set.
      parameters:
        - $ref: '#/components/parameters/TemplateID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMTemplate'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Templates]
      summary: Delete a template
      parameters:
        - $ref: '#/components/parameters/TemplateID'
      responses:
        '204':
          description: Template deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /host/interfaces:
    get:
      tags: [Host]
      summary: Discover host interfaces
      responses:
        '200':
