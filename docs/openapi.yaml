openapi: 3.0.3
info:
  title: VMSmith API
  version: 0.2.0
  description: |
    OpenAPI description for the VMSmith REST API.

    This spec covers the implemented `/api/v1/*` surface exposed by the daemon,
    including VM lifecycle, bulk actions, cloning, snapshots, images, templates,
    host discovery, quotas, and log retrieval.
servers:
  - url: http://localhost:8080/api/v1
    description: Local daemon
security:
  - bearerAuth: []
tags:
  - name: VMs
  - name: Snapshots
  - name: Port Forwards
  - name: Images
  - name: Templates
  - name: Host
  - name: Quotas
  - name: Logs
  - name: Events
paths:
  /vms:
    get:
      tags: [VMs]
      summary: List virtual machines
      parameters:
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/SearchFilter'
        - $ref: '#/components/parameters/ImageFilter'
        - $ref: '#/components/parameters/DefaultUserFilter'
        - $ref: '#/components/parameters/AutoStartFilter'
        - $ref: '#/components/parameters/LockedFilter'
        - $ref: '#/components/parameters/VMSort'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the VM's
            `created_at`. VMs created before this instant are filtered
            out. Whitespace is trimmed; empty disables the filter.
            Invalid values return 400 `invalid_since`. A VM with a zero
            / unknown `created_at` is filtered OUT whenever any bound is
            set — operators querying a time window don't want unbounded
            entries silently included. Composes additively with every
            other list filter so `X-Total-Count` reflects the
            post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the VM's
            `created_at`. VMs created after this instant are filtered
            out. Whitespace is trimmed; empty disables the filter.
            Invalid values return 400 `invalid_until`. Same zero /
            unknown / additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: VM list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [VMs]
      summary: Create a VM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMSpec'
      responses:
        '201':
          description: VM created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/stats/top:
    get:
      tags: [VMs]
      summary: Top VMs by metric
      description: |
        Returns the top-N VMs ranked by the requested metric, sorted descending.
        Values are taken from each VM's most recent in-memory metric sample;
        VMs without a sample for the requested metric are skipped. Returns 503
        when metrics collection is disabled.
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
            default: cpu
          description: Which metric to rank by.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
        - name: state
          in: query
          schema:
            type: string
            enum: [running, all]
            default: running
          description: Limit to running VMs (default) or include all VMs.
      responses:
        '200':
          description: Top VMs ranked by metric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopVMResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/bulk:
    post:
      tags: [VMs]
      summary: Run a bulk VM lifecycle action
      description: |
        Apply the same lifecycle action to multiple VMs in a single request.
        Supported actions are `start`, `stop`, `delete`, `restart`,
        `force-stop`, `reboot`, `suspend`, and `resume`. Per-VM successes and
        failures are returned together so partial failures (one VM in the
        wrong state, the rest succeeded) surface in the response without
        stopping the bulk operation. Each successful per-VM action emits the
        same `vm.<action>_requested` (or `vm.deleted`) event as the
        single-VM endpoint, with an extra `bulk=true` attribute so audit
        consumers can distinguish bulk actions from operator clicks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkVMActionRequest'
      responses:
        '200':
          description: Per-VM bulk action results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkVMActionResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}:
    get:
      tags: [VMs]
      summary: Get a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [VMs]
      summary: Update a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMUpdateSpec'
      responses:
        '200':
          description: Updated VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [VMs]
      summary: Delete a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '204':
          description: VM deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/start:
    post:
      tags: [VMs]
      summary: Start a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stop:
    post:
      tags: [VMs]
      summary: Stop a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/force-stop:
    post:
      tags: [VMs]
      summary: Force-stop a VM (immediate destroy, skips ACPI shutdown)
      description: |
        Equivalent to pulling the power cord — used when the guest OS is
        unresponsive or the operator deliberately wants to skip graceful
        shutdown. Returns 409 `vm_already_stopped` when the VM is not in a
        running state.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM force-stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/restart:
    post:
      tags: [VMs]
      summary: Restart a VM (graceful stop then start; or just start if stopped)
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/reboot:
    post:
      tags: [VMs]
      summary: Reboot a running VM via guest ACPI signal (no power cycle)
      description: |
        Sends an ACPI reboot signal to the guest via libvirt's `dom.Reboot()`.
        Unlike `restart` (which is a stop+start cycle that power-cycles the
        QEMU process), `reboot` keeps the libvirt domain alive and asks the
        guest OS to reboot itself. The IP, MAC, and DHCP reservation are
        preserved. Returns 409 `vm_not_running` when the VM is not running.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM reboot signal sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/suspend:
    post:
      tags: [VMs]
      summary: Suspend a running VM (freeze CPU + memory)
      description: |
        Pauses CPU + memory of a running VM without releasing host resources.
        IPs, sockets, and RAM contents are preserved; resume picks up where
        suspend left off. Returns 409 `vm_not_running` if the VM is stopped, or
        409 `vm_already_paused` if it is already paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/resume:
    post:
      tags: [VMs]
      summary: Resume a paused VM
      description: |
        Unpauses a suspended VM, restoring it to the running state. Returns
        409 `vm_not_paused` if the VM is not currently paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/clone:
    post:
      tags: [VMs]
      summary: Clone a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneVMRequest'
      responses:
        '201':
          description: Cloned VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats:
    get:
      tags: [VMs]
      summary: Get VM resource metrics
      description: |
        Returns the most recent metric sample plus the in-memory history ring
        for a VM. History is ordered oldest-first. Metric fields are nullable —
        a missing CPU/mem/disk/net field means the daemon has no value for that
        metric (e.g., counter reset, guest agent unavailable, or the first
        sample after boot has no prior counter to derive a rate from).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - name: since
          in: query
          required: false
          description: RFC 3339 timestamp; truncate history to samples after this time.
          schema:
            type: string
            format: date-time
        - name: fields
          in: query
          required: false
          description: Comma-separated projection (any of `cpu`, `mem`, `disk`, `net`).
          schema:
            type: string
      responses:
        '200':
          description: VM stats snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMStatsSnapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats/stream:
    get:
      tags: [VMs]
      summary: Stream VM resource metrics (SSE)
      description: |
        Server-Sent Events stream of `MetricSample` frames. Each new sample
        produced by the metrics collector is delivered as one `vm.stats`
        event whose `data` field is a JSON-encoded `MetricSample` and whose
        `id` is the sample's unix-nanosecond timestamp. Clients should
        seed history with `GET /vms/{vmID}/stats` before subscribing.
        Replay is not supported on this stream, so requests that send
        `Last-Event-ID` or `?since=` are rejected with HTTP 400
        `metrics_replay_not_supported`. A `: keepalive` comment frame is
        sent every 30 seconds. The stream closes when the client
        disconnects, the VM is deleted, or the daemon shuts down.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots:
    get:
      tags: [Snapshots]
      summary: List VM snapshots
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SnapshotSort'
        - $ref: '#/components/parameters/SortOrder'
        - name: search
          in: query
          required: false
          description: |
            Case-insensitive substring filter applied to the snapshot's
            `name`, `description`, and `tags`. The needle is trimmed and
            lowercased before matching. Filtering happens before sort +
            pagination so `X-Total-Count` reflects the post-search
            population. The snapshot ID (`<vmID>/<name>`) and `vm_id` are
            intentionally excluded from the haystack to avoid noisy false
            positives on short numeric queries.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: |
            Case-insensitive exact-match tag filter. A snapshot matches
            when any of its tags equals this value. Applied **before**
            `search` so the post-filter `X-Total-Count` reflects the
            intersection. Mirrors the same shape on every other tagged
            resource (VMs, images, templates, port forwards, webhooks).
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the snapshot's
            `created_at`. Snapshots created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A snapshot
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `search`, and pagination so `X-Total-Count`
            reflects the post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the snapshot's
            `created_at`. Snapshots created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same
            zero / unknown / additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Snapshots]
      summary: Create a VM snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/{snapName}/restore:
    post:
      tags: [Snapshots]
      summary: Restore a snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      responses:
        '200':
          description: Snapshot restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/{snapName}:
    patch:
      tags: [Snapshots]
      summary: Update snapshot metadata
      description: |
        Edit the description of an existing snapshot. The underlying disk and
        memory state are not touched — only the snapshot's `<description>`
        element is rewritten via libvirt's snapshot REDEFINE primitive.

        Pass `description: ""` to clear the description; omit the field
        entirely to leave it unchanged.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSnapshotRequest'
      responses:
        '200':
          description: Snapshot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Snapshots]
      summary: Delete a snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      responses:
        '204':
          description: Snapshot deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/bulk_delete:
    post:
      tags: [Snapshots]
      summary: Delete multiple snapshots in a single request
      description: |
        Delete a batch of snapshots either by explicit name list or by prefix
        match. Returns a per-target result so partial failures are visible.
        Exactly one of `names` or `prefix` must be provided.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteSnapshotsRequest'
      responses:
        '200':
          description: Per-snapshot delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteSnapshotsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports:
    get:
      tags: [Port Forwards]
      summary: List a VM's port forwards
      description: |
        `sort` accepts `id` (default), `host_port`, `guest_port`, `protocol`, or
        `description`; the description sort is case-insensitive. `order` accepts
        `asc` (default) or `desc`. All comparators tiebreak on `id` so
        repeated requests return a deterministic order.

        `search` is an optional case-insensitive substring filter applied
        before sort across `description`, `protocol`, `host_port`,
        `guest_port`, `guest_ip`, and `tags`. The rule ID (`{vmID}/{host}`)
        and `vm_id` are intentionally excluded from the haystack — they're
        the URL scope or redundant with the host port match.

        `tag` is an optional case-insensitive exact-match filter on the
        rule's tag list. Composes additively with `search` (the tag filter
        is applied first).

        `protocol` is an optional case-insensitive exact-match filter on
        the rule's transport protocol (`tcp` or `udp`). Empty disables;
        anything other than tcp/udp returns 400 `invalid_protocol`.
        Mirrors the bulk_delete `protocol` selector so the filter and
        bulk-action surfaces agree. Composes additively with `tag` and
        `search`.

        `page` and `per_page` paginate the result. Pagination is applied
        after filter + sort so the `X-Total-Count` response header reflects
        the post-filter / pre-pagination population. `limit` is accepted as
        a synonym for `per_page`. Omitting both returns the full filtered
        set, preserving the legacy contract.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: query
          name: sort
          schema:
            type: string
            enum: [id, host_port, guest_port, protocol, description]
            default: id
          required: false
          description: Field to sort by.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          required: false
          description: Sort direction.
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied before sort across
            description, protocol, host_port, guest_port, guest_ip, and
            tags. Leading/trailing whitespace is trimmed.
        - in: query
          name: tag
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the rule's tag list.
            Applied before search + sort; composes additively with search.
        - in: query
          name: protocol
          schema:
            type: string
            enum: [tcp, udp]
          required: false
          description: |
            Case-insensitive exact-match filter on transport protocol.
            Empty disables; anything other than tcp/udp returns 400
            `invalid_protocol`. Composes additively with `tag` and
            `search`.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Port forward list
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: |
                Total number of port forwards matching the filter +
                search predicates (pre-pagination). Use this to drive
                page indicators on the client.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Port Forwards]
      summary: Add a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPortRequest'
      responses:
        '201':
          description: Port forward created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/bulk_delete:
    post:
      tags: [Port Forwards]
      summary: Delete multiple port forwards in a single request
      description: |
        Delete a batch of port forwards either by explicit ID list or by
        protocol selector (`tcp` / `udp`). Returns a per-target result so
        partial failures are visible. Exactly one of `ids` or `protocol`
        must be provided. The protocol selector is always scoped to the VM
        in the URL — it never deletes another VM's rules.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeletePortsRequest'
      responses:
        '200':
          description: Per-port-forward delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeletePortsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/{portID}:
    patch:
      tags: [Port Forwards]
      summary: Update editable metadata on a port forward
      description: |
        Updates the editable metadata on an existing port forwarding rule.
        Today only the `description` is editable; the underlying iptables
        5-tuple (host_port/guest_port/guest_ip/protocol) is intentionally
        immutable. Omit `description` to leave it unchanged; pass `""` to
        clear it.

        The `vmID` in the URL is the authoritative scope: a request that
        targets a port-forward owned by a different VM returns
        `404 resource_not_found` (mirroring the safety property of
        bulk_delete).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePortRequest'
      responses:
        '200':
          description: Updated port forward
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Port Forwards]
      summary: Remove a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      responses:
        '204':
          description: Port forward removed
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/console/ticket:
    post:
      tags: [Console]
      summary: Issue a single-use console ticket
      description: |
        Returns a short-TTL one-time token the caller passes to the console
        websocket endpoint (forthcoming).  The VM must be in the `running`
        state.  The endpoint returns 503 `service_unavailable` when the
        daemon was started without a console subsystem (e.g. on a host where
        the console feature is disabled in config).
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleTicket'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images:
    get:
      tags: [Images]
      summary: List images
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ImageSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema:
            type: string
          description: Filter to images carrying this tag (case-insensitive).
        - in: query
          name: source_vm
          schema:
            type: string
          description: |
            Case-insensitive exact-match on the image's `source_vm` field —
            i.e. the VM ID the image was exported from. Whitespace is trimmed;
            an empty value disables the filter. Composes additively with
            `tag`, `search`, `sort`, and pagination so `X-Total-Count` reflects
            the post-filter population.
        - in: query
          name: search
          schema:
            type: string
          description: |
            Case-insensitive substring filter on image name, description, and
            tags. Whitespace is trimmed; ID is intentionally excluded so opaque
            `img-<unix-nano>` strings don't produce numeric false positives.
            Composes additively with `tag`, `source_vm`, `sort`, and
            pagination.
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the image's
            `created_at`. Images created before this instant are filtered
            out. Whitespace is trimmed; empty disables the filter. Invalid
            values return 400 `invalid_since`. An image with a zero /
            unknown `created_at` is filtered OUT whenever any bound is set
            — operators querying a time window don't want unbounded entries
            silently included. Composes additively with `tag`, `source_vm`,
            `search`, `sort`, and pagination so `X-Total-Count` reflects
            the post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the image's
            `created_at`. Images created after this instant are filtered
            out. Whitespace is trimmed; empty disables the filter. Invalid
            values return 400 `invalid_until`. Same zero / unknown /
            additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Image list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Images]
      summary: Export a VM to an image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
      responses:
        '201':
          description: Image created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/upload:
    post:
      tags: [Images]
      summary: Upload a qcow2 image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  description: Optional display name override.
                description:
                  type: string
                  description: Optional human-readable description.
                tags:
                  type: array
                  description: Optional tags. Repeat the form field per tag, or pass a single comma-separated value.
                  items:
                    type: string
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '507':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/bulk_delete:
    post:
      tags: [Images]
      summary: Delete multiple images in a single request
      description: |
        Delete a batch of images either by explicit ID list or by tag selector.
        Returns a per-target result so partial failures (one image missing,
        the rest succeeded) surface in a single response. Exactly one of
        `ids` or `tag` must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteImagesRequest'
      responses:
        '200':
          description: Per-image delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteImagesResponse'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/{imageID}:
    patch:
      tags: [Images]
      summary: Update image description and/or tags
      parameters:
        - $ref: '#/components/parameters/ImageID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageRequest'
      responses:
