openapi: 3.0.3
info:
  title: VMSmith API
  version: 0.2.0
  description: |
    OpenAPI description for the VMSmith REST API.

    This spec covers the implemented `/api/v1/*` surface exposed by the daemon,
    including VM lifecycle, bulk actions, cloning, snapshots, images, templates,
    host discovery, quotas, and log retrieval.
servers:
  - url: http://localhost:8080/api/v1
    description: Local daemon
security:
  - bearerAuth: []
tags:
  - name: VMs
  - name: Snapshots
  - name: Port Forwards
  - name: Images
  - name: Templates
  - name: Host
  - name: Quotas
  - name: Logs
  - name: Events
paths:
  /vms:
    get:
      tags: [VMs]
      summary: List virtual machines
      parameters:
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/SearchFilter'
        - $ref: '#/components/parameters/VMSort'
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: VM list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [VMs]
      summary: Create a VM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMSpec'
      responses:
        '201':
          description: VM created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/stats/top:
    get:
      tags: [VMs]
      summary: Top VMs by metric
      description: |
        Returns the top-N VMs ranked by the requested metric, sorted descending.
        Values are taken from each VM's most recent in-memory metric sample;
        VMs without a sample for the requested metric are skipped. Returns 503
        when metrics collection is disabled.
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
            default: cpu
          description: Which metric to rank by.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
        - name: state
          in: query
          schema:
            type: string
            enum: [running, all]
            default: running
          description: Limit to running VMs (default) or include all VMs.
      responses:
        '200':
          description: Top VMs ranked by metric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopVMResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/bulk:
    post:
      tags: [VMs]
      summary: Run a bulk VM lifecycle action
      description: |
        Apply the same lifecycle action to multiple VMs in a single request.
        Supported actions are `start`, `stop`, `delete`, `restart`,
        `force-stop`, `reboot`, `suspend`, and `resume`. Per-VM successes and
        failures are returned together so partial failures (one VM in the
        wrong state, the rest succeeded) surface in the response without
        stopping the bulk operation. Each successful per-VM action emits the
        same `vm.<action>_requested` (or `vm.deleted`) event as the
        single-VM endpoint, with an extra `bulk=true` attribute so audit
        consumers can distinguish bulk actions from operator clicks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkVMActionRequest'
      responses:
        '200':
          description: Per-VM bulk action results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkVMActionResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}:
    get:
      tags: [VMs]
      summary: Get a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [VMs]
      summary: Update a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMUpdateSpec'
      responses:
        '200':
          description: Updated VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [VMs]
      summary: Delete a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '204':
          description: VM deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/start:
    post:
      tags: [VMs]
      summary: Start a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stop:
    post:
      tags: [VMs]
      summary: Stop a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/force-stop:
    post:
      tags: [VMs]
      summary: Force-stop a VM (immediate destroy, skips ACPI shutdown)
      description: |
        Equivalent to pulling the power cord — used when the guest OS is
        unresponsive or the operator deliberately wants to skip graceful
        shutdown. Returns 409 `vm_already_stopped` when the VM is not in a
        running state.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM force-stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/restart:
    post:
      tags: [VMs]
      summary: Restart a VM (graceful stop then start; or just start if stopped)
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/reboot:
    post:
      tags: [VMs]
      summary: Reboot a running VM via guest ACPI signal (no power cycle)
      description: |
        Sends an ACPI reboot signal to the guest via libvirt's `dom.Reboot()`.
        Unlike `restart` (which is a stop+start cycle that power-cycles the
        QEMU process), `reboot` keeps the libvirt domain alive and asks the
        guest OS to reboot itself. The IP, MAC, and DHCP reservation are
        preserved. Returns 409 `vm_not_running` when the VM is not running.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM reboot signal sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/suspend:
    post:
      tags: [VMs]
      summary: Suspend a running VM (freeze CPU + memory)
      description: |
        Pauses CPU + memory of a running VM without releasing host resources.
        IPs, sockets, and RAM contents are preserved; resume picks up where
        suspend left off. Returns 409 `vm_not_running` if the VM is stopped, or
        409 `vm_already_paused` if it is already paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/resume:
    post:
      tags: [VMs]
      summary: Resume a paused VM
      description: |
        Unpauses a suspended VM, restoring it to the running state. Returns
        409 `vm_not_paused` if the VM is not currently paused.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: VM resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/clone:
    post:
      tags: [VMs]
      summary: Clone a VM
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneVMRequest'
      responses:
        '201':
          description: Cloned VM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VM'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats:
    get:
      tags: [VMs]
      summary: Get VM resource metrics
      description: |
        Returns the most recent metric sample plus the in-memory history ring
        for a VM. History is ordered oldest-first. Metric fields are nullable —
        a missing CPU/mem/disk/net field means the daemon has no value for that
        metric (e.g., counter reset, guest agent unavailable, or the first
        sample after boot has no prior counter to derive a rate from).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - name: since
          in: query
          required: false
          description: RFC 3339 timestamp; truncate history to samples after this time.
          schema:
            type: string
            format: date-time
        - name: fields
          in: query
          required: false
          description: Comma-separated projection (any of `cpu`, `mem`, `disk`, `net`).
          schema:
            type: string
      responses:
        '200':
          description: VM stats snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMStatsSnapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/stats/stream:
    get:
      tags: [VMs]
      summary: Stream VM resource metrics (SSE)
      description: |
        Server-Sent Events stream of `MetricSample` frames.  Each new sample
        produced by the metrics collector is delivered as one `vm.stats`
        event whose `data` field is a JSON-encoded `MetricSample` and whose
        `id` is the sample's unix-nanosecond timestamp.  Clients should
        seed history with `GET /vms/{vmID}/stats` before subscribing —
        the stream provides no replay.  A `: keepalive` comment frame is
        sent every 30 seconds.  The stream closes when the client
        disconnects, the VM is deleted, or the daemon shuts down.
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots:
    get:
      tags: [Snapshots]
      summary: List VM snapshots
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SnapshotSort'
        - $ref: '#/components/parameters/SortOrder'
        - name: search
          in: query
          required: false
          description: |
            Case-insensitive substring filter applied to the snapshot's
            `name` and `description`. The needle is trimmed and lowercased
            before matching. Filtering happens before sort + pagination so
            `X-Total-Count` reflects the post-search population. The
            snapshot ID (`<vmID>/<name>`) and `vm_id` are intentionally
            excluded from the haystack to avoid noisy false positives on
            short numeric queries.
          schema:
            type: string
      responses:
        '200':
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Snapshots]
      summary: Create a VM snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/{snapName}/restore:
    post:
      tags: [Snapshots]
      summary: Restore a snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      responses:
        '200':
          description: Snapshot restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/{snapName}:
    patch:
      tags: [Snapshots]
      summary: Update snapshot metadata
      description: |
        Edit the description of an existing snapshot. The underlying disk and
        memory state are not touched — only the snapshot's `<description>`
        element is rewritten via libvirt's snapshot REDEFINE primitive.

        Pass `description: ""` to clear the description; omit the field
        entirely to leave it unchanged.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSnapshotRequest'
      responses:
        '200':
          description: Snapshot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Snapshots]
      summary: Delete a snapshot
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/SnapshotName'
      responses:
        '204':
          description: Snapshot deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/snapshots/bulk_delete:
    post:
      tags: [Snapshots]
      summary: Delete multiple snapshots in a single request
      description: |
        Delete a batch of snapshots either by explicit name list or by prefix
        match. Returns a per-target result so partial failures are visible.
        Exactly one of `names` or `prefix` must be provided.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteSnapshotsRequest'
      responses:
        '200':
          description: Per-snapshot delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteSnapshotsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports:
    get:
      tags: [Port Forwards]
      summary: List a VM's port forwards
      description: |
        `sort` accepts `id` (default), `host_port`, `guest_port`, `protocol`, or
        `description`; the description sort is case-insensitive. `order` accepts
        `asc` (default) or `desc`. All comparators tiebreak on `id` so
        repeated requests return a deterministic order.

        `search` is an optional case-insensitive substring filter applied
        before sort across `description`, `protocol`, `host_port`,
        `guest_port`, and `guest_ip`. The rule ID (`{vmID}/{host}`) and
        `vm_id` are intentionally excluded from the haystack — they're the
        URL scope or redundant with the host port match.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: query
          name: sort
          schema:
            type: string
            enum: [id, host_port, guest_port, protocol, description]
            default: id
          required: false
          description: Field to sort by.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          required: false
          description: Sort direction.
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied before sort across
            description, protocol, host_port, guest_port, and guest_ip.
            Leading/trailing whitespace is trimmed.
      responses:
        '200':
          description: Port forward list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Port Forwards]
      summary: Add a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPortRequest'
      responses:
        '201':
          description: Port forward created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/bulk_delete:
    post:
      tags: [Port Forwards]
      summary: Delete multiple port forwards in a single request
      description: |
        Delete a batch of port forwards either by explicit ID list or by
        protocol selector (`tcp` / `udp`). Returns a per-target result so
        partial failures are visible. Exactly one of `ids` or `protocol`
        must be provided. The protocol selector is always scoped to the VM
        in the URL — it never deletes another VM's rules.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeletePortsRequest'
      responses:
        '200':
          description: Per-port-forward delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeletePortsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/{portID}:
    patch:
      tags: [Port Forwards]
      summary: Update editable metadata on a port forward
      description: |
        Updates the editable metadata on an existing port forwarding rule.
        Today only the `description` is editable; the underlying iptables
        5-tuple (host_port/guest_port/guest_ip/protocol) is intentionally
        immutable. Omit `description` to leave it unchanged; pass `""` to
        clear it.

        The `vmID` in the URL is the authoritative scope: a request that
        targets a port-forward owned by a different VM returns
        `404 resource_not_found` (mirroring the safety property of
        bulk_delete).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePortRequest'
      responses:
        '200':
          description: Updated port forward
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Port Forwards]
      summary: Remove a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      responses:
        '204':
          description: Port forward removed
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/console/ticket:
    post:
      tags: [Console]
      summary: Issue a single-use console ticket
      description: |
        Returns a short-TTL one-time token the caller passes to the console
        websocket endpoint (forthcoming).  The VM must be in the `running`
        state.  The endpoint returns 503 `service_unavailable` when the
        daemon was started without a console subsystem (e.g. on a host where
        the console feature is disabled in config).
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleTicket'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images:
    get:
      tags: [Images]
      summary: List images
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ImageSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema:
            type: string
          description: Filter to images carrying this tag (case-insensitive).
        - in: query
          name: search
          schema:
            type: string
          description: |
            Case-insensitive substring filter on image name, description, and
            tags. Whitespace is trimmed; ID is intentionally excluded so opaque
            `img-<unix-nano>` strings don't produce numeric false positives.
            Composes additively with `tag`, `sort`, and pagination.
      responses:
        '200':
          description: Image list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Images]
      summary: Export a VM to an image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
      responses:
        '201':
          description: Image created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/upload:
    post:
      tags: [Images]
      summary: Upload a qcow2 image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  description: Optional display name override.
                description:
                  type: string
                  description: Optional human-readable description.
                tags:
                  type: array
                  description: Optional tags. Repeat the form field per tag, or pass a single comma-separated value.
                  items:
                    type: string
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '507':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/bulk_delete:
    post:
      tags: [Images]
      summary: Delete multiple images in a single request
      description: |
        Delete a batch of images either by explicit ID list or by tag selector.
        Returns a per-target result so partial failures (one image missing,
        the rest succeeded) surface in a single response. Exactly one of
        `ids` or `tag` must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteImagesRequest'
      responses:
        '200':
          description: Per-image delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteImagesResponse'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/{imageID}:
    patch:
      tags: [Images]
      summary: Update image description and/or tags
      parameters:
        - $ref: '#/components/parameters/ImageID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageRequest'
      responses:
        '200':
          description: Image updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Images]
      summary: Delete an image
      parameters:
        - $ref: '#/components/parameters/ImageID'
      responses:
        '204':
          description: Image deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/{imageID}/download:
    get:
      tags: [Images]
      summary: Download an image file
      parameters:
        - $ref: '#/components/parameters/ImageID'
      responses:
        '200':
          description: Binary image download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates:
    get:
      tags: [Templates]
      summary: List reusable VM templates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/TemplateSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema: { type: string }
          description: |
            Case-insensitive filter; only templates carrying this tag are
            returned. Filtering is applied before sort + pagination, so
            X-Total-Count reflects the filtered population.
        - in: query
          name: search
          required: false
          description: |
            Case-insensitive substring filter applied to the template's
            `name`, `description`, and `tags`. The needle is trimmed and
            lowercased before matching. Filtering happens before sort +
            pagination so `X-Total-Count` reflects the post-search
            population. ID, image, default_user, and network attachments
            are intentionally excluded from the haystack — they describe
            what the template produces, not the template itself, and
            including them produces noisy false positives. Mirrors the
            5.4.9 / 5.4.10 / 5.4.11 `search` filter contract.
          schema:
            type: string
      responses:
        '200':
          description: Template list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VMTemplate'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Templates]
      summary: Create a reusable VM template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMTemplate'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates/bulk_delete:
    post:
      tags: [Templates]
      summary: Delete multiple templates in a single request
      description: |
        Delete a batch of templates either by explicit ID list or by tag
        selector. Returns a per-target result so partial failures (one
        template missing, the rest succeeded) surface in a single response.
        Exactly one of `ids` or `tag` must be provided. Tag matching is
        case-insensitive. Mirrors `/images/bulk_delete` (2.3.6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteTemplatesRequest'
      responses:
        '200':
          description: Per-template delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteTemplatesResponse'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates/{templateID}:
    patch:
      tags: [Templates]
      summary: Update a template's description and/or tags
      description: |
        Only `description` and `tags` are mutable. PATCH semantics: an empty
        `description` is treated as "no change"; a `null`/missing `tags`
        field is treated as "no change", while an explicit empty array
        (`"tags": []`) clears the tag set.
      parameters:
        - $ref: '#/components/parameters/TemplateID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMTemplate'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Templates]
      summary: Delete a template
      parameters:
        - $ref: '#/components/parameters/TemplateID'
      responses:
        '204':
          description: Template deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /host/interfaces:
    get:
      tags: [Host]
      summary: Discover host interfaces
      responses:
        '200':
          description: Host interfaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HostInterface'
        default:
          $ref: '#/components/responses/APIError'
  /host/stats:
    get:
      tags: [Host]
      summary: Get host utilization stats
      responses:
        '200':
          description: Host stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostStats'
        default:
          $ref: '#/components/responses/APIError'
  /quotas/usage:
    get:
      tags: [Quotas]
      summary: Get current quota usage
      responses:
        '200':
          description: Quota usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaUsage'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks:
    get:
      tags: [Webhooks]
      summary: List registered webhooks (secrets redacted)
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied across each webhook's
            URL and event-type filters. Whitespace is trimmed before
            matching. Secret, ID, and last_error are intentionally
            excluded from the haystack — secrets must never appear in
            response bodies, IDs are opaque `wh-<unix-nano>` strings, and
            last_error is operator-noise surfaced via `last_status` /
            status badges instead.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [id, url, created_at, last_delivery_at]
            default: id
          description: |
            Field to sort by. `url` matches case-insensitively.
            `last_delivery_at` sorts never-delivered webhooks
            (zero timestamp) at the tail of the ascending list and the
            head of the descending list. All comparators tiebreak on `id`
            so repeated requests return a deterministic order.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction. Default `asc`.
      responses:
        '200':
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Webhooks]
      summary: Get a single webhook (secret redacted)
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [Webhooks]
      summary: Update editable webhook fields
      description: >
        Mutates one or more editable fields on an existing webhook.  Every
        field in the request body is optional — omit a key to leave it
        unchanged.  At least one editable field must be present; an empty
        body returns 400 `noop_update`.

        On success the in-memory delivery worker is bounced so subsequent
        deliveries pick up the new URL / secret / event-type filters /
        active flag.  Setting `active: false` stops the worker; setting
        it back to `true` re-registers it.

        Secrets are accepted but never returned; the response carries the
        same redacted shape as `GET /webhooks/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateSpec'
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}/test:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Webhooks]
      summary: Send a synthetic test event to a webhook
      description: >
        Synthesises a `system.webhook_test` event and delivers it once
        (no retries) to the registered webhook so operators can verify
        connectivity, signing, and receiver health.  Updates the persisted
        webhook's `last_status` / `last_error` / `last_delivery_at` fields.
      responses:
        '200':
          description: Delivery attempted (success or failure both return 200; inspect the body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResult'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /logs:
    get:
      tags: [Logs]
      summary: List recent daemon logs
      parameters:
        - name: level
          in: query
          schema:
            type: string
          description: Minimum log level.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return entries at or after this timestamp.
        - name: source
          in: query
          schema:
            type: string
          description: Filter by structured log source.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Alias retained for compatibility.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: |
            Case-insensitive substring filter applied to each entry's
            message, source, level, and every value in the structured
            fields map. Whitespace is trimmed before matching. Field keys
            and timestamps are intentionally excluded from the haystack —
            keys are a small repeating vocabulary (`vm_id`, `method`,
            `error`, ...) and would generate noisy matches, while
            timestamps are scoped via `since`. The filter composes
            additively with `level`, `source`, `since`, and pagination,
            so `X-Total-Count` reflects the post-search population.
      responses:
        '200':
          description: Log entries
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
        default:
          $ref: '#/components/responses/APIError'
  /events:
    get:
      tags: [Events]
      summary: List recent events
      description: |
        Returns the most recent events matching the provided filters, sorted
        newest-first. Each event carries a monotonic numeric ID assigned by the
        EventBus, plus a structured payload (source, severity, attributes).

        Pagination is page/per_page; clients can also provide `until=<seq>` to
        fetch events older than a known sequence ID (cursor pagination).
      parameters:
        - name: vm_id
          in: query
          schema:
            type: string
          description: Filter by VM ID (exact match).
        - name: type
          in: query
          schema:
            type: string
          description: Filter by event type (e.g., `vm.started`).
        - name: source
          in: query
          schema:
            type: string
            enum: [libvirt, app, system]
          description: Filter by event source.
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warn, error]
          description: Filter by severity.
        - name: search
          in: query
          schema:
            type: string
          description: |
            Case-insensitive substring match across `message`, `type`, `source`,
            `severity`, `actor`, `vm_id`, `resource_id`, and every value in
            `attributes`. Combines additively with the other filters.
            The numeric event ID is intentionally excluded from the haystack so
            short numeric queries don't produce noisy matches.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return only events with `occurred_at` after this RFC3339 timestamp.
        - name: until
          in: query
          schema:
            type: string
          description: Cursor — exclude events with sequence ID >= this uint64.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Event list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        default:
          $ref: '#/components/responses/APIError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  headers:
    XTotalCount:
      description: Total matching records before pagination.
      schema:
        type: integer
  parameters:
    VMID:
      name: vmID
      in: path
      required: true
      schema:
        type: string
    ImageID:
      name: imageID
      in: path
      required: true
      schema:
        type: string
    TemplateID:
      name: templateID
      in: path
      required: true
      schema:
        type: string
    PortID:
      name: portID
      in: path
      required: true
      schema:
        type: string
    SnapshotName:
      name: snapName
      in: path
      required: true
      schema:
        type: string
    TagFilter:
      name: tag
      in: query
      schema:
        type: string
      description: Case-insensitive tag filter.
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [creating, running, stopped, paused, deleted, unknown]
    SearchFilter:
      name: search
      in: query
      description: |
        Case-insensitive substring filter applied across the VM's name,
        description, and tags. Combine with `tag` and `status` for narrower
        scoping; an empty value matches every VM. ID is intentionally excluded
        from the match — the opaque `vm-<unix-nano>` form rarely matches a
        useful operator query.
      schema:
        type: string
    VMSort:
      name: sort
      in: query
      description: |
        Field to sort the VM list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. All comparators tiebreak on `id` so
        pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, created_at, state]
        default: id
    ImageSort:
      name: sort
      in: query
      description: |
        Field to sort the image list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. All comparators tiebreak on `id` so
        pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, size, created_at]
        default: id
    SnapshotSort:
      name: sort
      in: query
      description: |
        Field to sort the snapshot list by. Defaults to `id`. Within a single
        VM the snapshot ID is `<vmID>/<name>` so id-asc is identical to
        name-asc. Unknown values return 400 `invalid_sort`. All comparators
        tiebreak on `name` so pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, created_at]
        default: id
    TemplateSort:
      name: sort
      in: query
      description: |
        Field to sort the template list by. Defaults to `id`. Unknown
        values return 400 `invalid_sort`. All comparators tiebreak on
        `id` so paginated requests return the same set across two
        independent fetches.
      schema:
        type: string
        enum: [id, name, created_at]
        default: id
    SortOrder:
      name: order
      in: query
      description: |
        Sort direction. Defaults to `asc`. Unknown values return 400
        `invalid_order`.
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
  responses:
    APIError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
  schemas:
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    Protocol:
      type: string
      enum: [tcp, udp]
    VMState:
      type: string
      enum: [creating, running, stopped, paused, deleted, unknown]
    NetworkMode:
      type: string
      enum: [nat, macvtap, bridge]
    NetworkAttachment:
      type: object
      properties:
        name:
          type: string
        mode:
          $ref: '#/components/schemas/NetworkMode'
        host_interface:
          type: string
        bridge:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        mac_address:
          type: string
    VMSpec:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        template_id:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        cloud_init_file:
          type: string
        ssh_pub_key:
          type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: When true, the daemon starts this VM automatically at boot.
        locked:
          type: boolean
          description: When true, the VM is delete-protected. Stop/start/restart still work.
    VMUpdateSpec:
      type: object
      properties:
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: Toggle auto-start at daemon boot. Omit to leave unchanged.
          nullable: true
        locked:
          type: boolean
          description: Toggle delete-protection. Omit to leave unchanged.
          nullable: true
    VM:
      type: object
      required: [id, name, spec, state, disk_path, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        spec:
          $ref: '#/components/schemas/VMSpec'
        state:
          $ref: '#/components/schemas/VMState'
        ip:
          type: string
        nat_mac:
          type: string
        disk_path:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CloneVMRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    BulkVMActionRequest:
      type: object
      required: [action, ids]
      properties:
        action:
          type: string
          enum: [start, stop, delete, restart, force-stop, reboot, suspend, resume]
          description: |
            Lifecycle verb to apply to every VM in `ids`. Maps 1:1 to the
            single-VM endpoints — e.g. `restart` is a graceful stop+start,
            `reboot` issues an in-guest ACPI reboot without power-cycling
            QEMU, `force-stop` is an immediate destroy that skips ACPI,
            `suspend`/`resume` pause/unpause CPU+memory.
        ids:
          type: array
          minItems: 1
          items:
            type: string
    BulkVMActionResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    BulkVMActionResponse:
      type: object
      required: [action, results]
      properties:
        action:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkVMActionResult'
    UpdatePortRequest:
      type: object
      description: |
        Editable metadata for an existing port forwarding rule. Today only
        `description` is editable; the underlying iptables 5-tuple is
        immutable. The `description` field is a JSON-pointer style optional
        — omit it to leave the description unchanged, pass an empty string to
        clear it.
      properties:
        description:
          type: string
          maxLength: 256
          description: Free-form label (max 256 chars). Pass `""` to clear.
    BulkDeletePortsRequest:
      type: object
      description: |
        Selector for the port forwards to delete. Exactly one of `ids` or
        `protocol` must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present.
      properties:
        ids:
          type: array
          description: Explicit list of port-forward IDs to delete.
          items:
            type: string
        protocol:
          type: string
          enum: [tcp, udp]
          description: Match every port forward on this VM with this protocol.
    BulkDeletePortsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeletePortResult'
    BulkDeletePortResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteSnapshotsRequest:
      type: object
      description: |
        Selector for the snapshots to delete. Exactly one of `names` or `prefix`
        must be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present.
      properties:
        names:
          type: array
          description: Explicit list of snapshot names to delete.
          items:
            type: string
        prefix:
          type: string
          description: Match every snapshot whose name starts with this prefix.
    BulkDeleteSnapshotsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteSnapshotResult'
    BulkDeleteSnapshotResult:
      type: object
      required: [name, success]
      properties:
        name:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteImagesRequest:
      type: object
      description: |
        Selector for the images to delete. Exactly one of `ids` or `tag` must
        be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present. Tag matching is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of image IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every image whose tag list contains this tag (case-insensitive).
    BulkDeleteImagesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteImageResult'
    BulkDeleteImageResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteTemplatesRequest:
      type: object
      description: |
        Selector for the templates to delete. Exactly one of `ids` or `tag`
        must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present. Tag matching
        is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of template IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every template whose tag list contains this tag (case-insensitive).
    BulkDeleteTemplatesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteTemplateResult'
    BulkDeleteTemplateResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    TopVMItem:
      type: object
      required: [vm_id, name, state, value]
      properties:
        vm_id:
          type: string
        name:
          type: string
        state:
          type: string
        value:
          type: number
          format: double
        sample:
          $ref: '#/components/schemas/MetricSample'
    TopVMResponse:
      type: object
      required: [metric, limit, state, items]
      properties:
        metric:
          type: string
          enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
        limit:
          type: integer
        state:
          type: string
          enum: [running, all]
        items:
          type: array
          items:
            $ref: '#/components/schemas/TopVMItem'
    Snapshot:
      type: object
      required: [id, vm_id, name, created_at]
      properties:
        id:
          type: string
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
          description: Optional free-text description (max 1024 chars).
        created_at:
          type: string
          format: date-time
    CreateSnapshotRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          maxLength: 1024
          description: Optional free-text description for this snapshot.
    UpdateSnapshotRequest:
      type: object
      description: |
        Editable metadata for an existing snapshot. Currently only the
        description is editable; the snapshot's underlying disk and memory
        state, parent pointer, and creation timestamp are immutable.

        A nil/missing description means "leave as-is"; an explicit empty string
        clears the description.
      properties:
        description:
          type: string
          nullable: true
          maxLength: 1024
          description: New description for the snapshot. Empty string clears.
    AddPortRequest:
      type: object
      required: [host_port, guest_port]
      properties:
        host_port:
          type: integer
        guest_port:
          type: integer
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          maxLength: 256
          description: Optional free-form label for the rule (e.g. "web", "metrics scrape").
    PortForward:
      type: object
      required: [id, vm_id, host_port, guest_port, guest_ip, protocol]
      properties:
        id:
          type: string
        vm_id:
          type: string
        host_port:
          type: integer
        guest_port:
          type: integer
        guest_ip:
          type: string
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          description: Optional free-form label for the rule.
    ConsoleTicket:
      type: object
      required: [ticket, expires_at, websocket_url]
      properties:
        ticket:
          type: string
          description: Single-use opaque token; pass to the websocket endpoint.
        expires_at:
          type: string
          format: date-time
        websocket_url:
          type: string
          description: Path the client should dial after upgrading to a websocket.
    Image:
      type: object
      required: [id, name, path, size_bytes, format, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
        format:
          type: string
        source_vm:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateImageRequest:
      type: object
      required: [vm_id, name]
      properties:
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
    UpdateImageRequest:
      type: object
      properties:
        description:
          type: string
          description: New description. An empty string is treated as "no change".
        tags:
          type: array
          description: Replacement tag set. A null/omitted field leaves tags unchanged; an empty array clears all tags.
          items:
            type: string
    VMTemplate:
      type: object
      required: [id, name, image, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateTemplateRequest:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
    UpdateTemplateRequest:
      type: object
      description: |
        Partial update for an existing template. An empty `description`
        means "no change"; a missing `tags` field means "no change",
        while an explicit empty `tags` array clears the tag set.
      properties:
        description:
          type: string
        tags:
          type: array
          nullable: true
          items:
            type: string
    HostInterface:
      type: object
      required: [name, ips, mac, is_up, is_physical]
      properties:
        name:
          type: string
        ips:
          type: array
          items:
            type: string
        mac:
          type: string
        is_up:
          type: boolean
        is_physical:
          type: boolean
    HostResourceUsageSummary:
      type: object
      required: [used, total]
      properties:
        used:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        available:
          type: integer
          format: int64
        percentage:
          type: integer
    HostStats:
      type: object
      required: [vm_count, cpu, ram, disk, event_stream_connections]
      properties:
        vm_count:
          type: integer
        cpu:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        ram:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        disk:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        event_stream_connections:
          type: integer
          format: int64
          description: |
            Number of in-flight Server-Sent Event clients on
            `/api/v1/events/stream`.  Useful for spotting consumer pressure
            and stuck SSE connections.
    QuotaUsageSummary:
      type: object
      required: [used]
      properties:
        used:
          type: integer
        limit:
          type: integer
    QuotaUsage:
      type: object
      required: [vms, cpus, ram_mb, disk_gb]
      properties:
        vms:
          $ref: '#/components/schemas/QuotaUsageSummary'
        cpus:
          $ref: '#/components/schemas/QuotaUsageSummary'
        ram_mb:
          $ref: '#/components/schemas/QuotaUsageSummary'
        disk_gb:
          $ref: '#/components/schemas/QuotaUsageSummary'
    Webhook:
      type: object
      required: [id, url, active, created_at]
      properties:
        id:
          type: string
          example: "wh-1741234567890123"
        url:
          type: string
          format: uri
          example: "https://example.com/hook"
        event_types:
          type: array
          items:
            type: string
          description: Optional event-type filter list (exact match or "prefix.*" glob). Empty = all events.
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_delivery_at:
          type: string
          format: date-time
        last_status:
          type: integer
          description: HTTP status of the most recent successful delivery; 0 if last attempt failed.
        last_error:
          type: string
    WebhookCreateRequest:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
          description: HMAC-SHA256 signing secret. Never returned in responses.
        event_types:
          type: array
          items:
            type: string
    WebhookUpdateSpec:
      type: object
      description: >
        Partial-update payload for `PATCH /webhooks/{id}`.  All fields are
        optional; omit a key to leave the corresponding field unchanged.
        `event_types: []` clears the filter so the webhook matches every
        event; `event_types` omitted leaves the current list intact.
      properties:
        url:
          type: string
          format: uri
          description: Replace the receiver URL.  Must use http or https.
        secret:
          type: string
          description: >
            Rotate the HMAC signing secret.  Empty string is rejected — an
            unsigned webhook would defeat receiver-side verification.
        event_types:
          type: array
          items:
            type: string
          description: Replace the event-type filter list.  Pass `[]` to clear.
        active:
          type: boolean
          description: Toggle delivery on or off without deleting the registration.
    WebhookTestResult:
      type: object
      required: [success, duration_ms, attempted_at]
      properties:
        success:
          type: boolean
          description: True iff the receiver returned a 2xx HTTP status.
        status_code:
          type: integer
          description: HTTP status code returned by the receiver, if any.
        error:
          type: string
          description: Error message when delivery failed.
        duration_ms:
          type: integer
          format: int64
          description: Round-trip time of the single delivery attempt.
        attempted_at:
          type: string
          format: date-time
        event_id:
          type: string
          description: ID of the synthetic system.webhook_test event used for the probe.
    LogField:
      type: object
      additionalProperties:
        type: string
    LogsResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        total:
          type: integer
    LogEntry:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
        source:
          type: string
        msg:
          type: string
        fields:
          $ref: '#/components/schemas/LogField'
    MetricSample:
      type: object
      required: [timestamp]
      properties:
        timestamp:
          type: string
          format: date-time
        cpu_percent:
          type: number
          format: double
          nullable: true
          description: CPU utilisation percent across all vCPUs (null when unavailable).
        mem_used_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        mem_avail_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          description: Available memory reported by the guest agent (null without it).
        disk_read_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        disk_write_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_rx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_tx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
    VMStatsSnapshot:
      type: object
      required: [vm_id, state, history, interval_seconds, history_size]
      properties:
        vm_id:
          type: string
        state:
          type: string
          description: VM state at the time of the response (running, stopped, ...).
        last_sampled_at:
          type: string
          format: date-time
          nullable: true
        current:
          allOf:
            - $ref: '#/components/schemas/MetricSample'
          nullable: true
          description: Most recent sample (mirrors the last entry in `history`).
        history:
          type: array
          items:
            $ref: '#/components/schemas/MetricSample'
          description: Sample history, oldest first.
        interval_seconds:
          type: integer
          minimum: 0
          description: Configured sample interval in seconds.
        history_size:
          type: integer
          minimum: 0
          description: Configured ring buffer capacity (max samples retained).
    Event:
      type: object
      required: [id, type, source, severity, message, occurred_at]
      properties:
        id:
          type: string
          description: Stringified monotonic uint64 assigned by the EventBus.
        type:
          type: string
          description: Event type (e.g., `vm.started`, `vm.created`).
        source:
          type: string
          enum: [libvirt, app, system]
        vm_id:
          type: string
        resource_id:
          type: string
        severity:
          type: string
          enum: [info, warn, error]
        message:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        actor:
          type: string
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          description: Legacy timestamp; prefer `occurred_at` for new code.
