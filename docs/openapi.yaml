  /webhooks:
    get:
      tags: [Webhooks]
      summary: List registered webhooks (secrets redacted)
      parameters:
        - in: query
          name: tag
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the webhook tag list
            (a webhook matches when any of its tags equals the value).
            Whitespace-trimmed. Applied before the search filter so the
            response reflects the intersection of tag + search.
        - in: query
          name: event_type
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the webhook's
            `event_types` filter list (a webhook matches when any entry in
            the list equals the value). Whitespace-trimmed. Catch-all
            webhooks (empty `event_types`) are NOT matched — mirrors the
            bulk_delete `event_type` selector semantics: this is an
            explicit-membership query ("which webhooks listen for
            vm.created"), not "which webhooks will fire for this event".
            Applied between `tag` and `search` so the post-filter
            `X-Total-Count` stays correct.
        - in: query
          name: since
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp lower bound (inclusive) on the webhook's
            `created_at`. Webhooks created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A webhook
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `event_type`, `search`, `sort`, and pagination so
            `X-Total-Count` reflects the post-filter population. Mirrors
            the snapshot (5.4.28), image (5.4.29), VM (5.4.30), and
            template (5.4.31) time-range filters.
        - in: query
          name: until
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp upper bound (inclusive) on the webhook's
            `created_at`. Webhooks created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same zero
            / unknown / additive-composition semantics as `since`.
        - in: query
          name: last_delivery_since
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp lower bound (inclusive) on the webhook's
            `last_delivery_at` (5.4.61). Webhooks whose most recent
            delivery occurred before this instant are filtered out.
            Whitespace is trimmed; empty disables the filter. Invalid
            values return 400 `invalid_last_delivery_since`. A
            never-delivered webhook (zero `last_delivery_at`) is filtered
            OUT whenever either `last_delivery_since` or
            `last_delivery_until` is set — operators querying by
            delivery activity don't want unbounded entries silently
            included. Use `delivery_status=never` when the intent is to
            *find* never-delivered webhooks. Mirrors the `created_at`
            range (`since` / `until`) on this list and the
            `next_fire_since` / `next_fire_until` filter on the
            schedule list (5.4.60).
        - in: query
          name: last_delivery_until
          required: false
          schema:
            type: string
          description: |
            RFC3339 timestamp upper bound (inclusive) on the webhook's
            `last_delivery_at` (5.4.61). Webhooks whose most recent
            delivery occurred after this instant are filtered out. Same
            shape as `last_delivery_since`; 400
            `invalid_last_delivery_until` on garbage; never-delivered
            webhooks (zero `last_delivery_at`) are excluded when either
            bound is set.
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied across each webhook's
            URL, description, event-type filters, and tags. Whitespace is
            trimmed before matching. Secret, ID, and last_error are
            intentionally excluded from the haystack — secrets must never
            appear in response bodies, IDs are opaque `wh-<unix-nano>`
            strings, and last_error is operator-noise surfaced via
            `last_status` / status badges instead.
        - in: query
          name: delivery_status
          required: false
          schema:
            type: string
            enum: [never, healthy, failing]
          description: |
            Categorical filter on the webhook's most-recent delivery
            classification (5.4.35):
              - `never`: `last_delivery_at` is zero (no attempt yet).
              - `healthy`: most recent attempt returned 2xx and
                `last_error` is empty.
              - `failing`: an attempt was made but did not meet the
                healthy contract — transport error (`last_status == 0`
                with a non-empty `last_error`), 4xx, 5xx, 3xx, or 2xx
                with a stale `last_error`.
            Whitespace-trimmed; case-insensitive; empty disables the
            filter. Unknown values return 400 `invalid_delivery_status`.
            Applied before `search` so `X-Total-Count` reflects the
            post-filter population. The three values form a complete
            partition of every persisted webhook.
        - in: query
          name: active
          required: false
          schema:
            type: string
            enum: ['true', 'false']
          description: |
            Tristate boolean exact-match on the webhook's `active` flag
            (5.4.37). Accepts `true` / `false` (case-insensitive) with
            `1` / `0` aliases; whitespace-trimmed; empty disables the
            filter; anything else returns 400 `invalid_active`. Closes the
            "show me only disabled webhooks" / "show me only live webhooks"
            operator queries that `delivery_status` (runtime health) and
            `event_type` (subscription) can't answer. Mirrors the VM
            `auto_start` / `locked` tristate filters. Composes additively
            with every other webhook list filter so `X-Total-Count`
            reflects the post-filter population.
        - in: query
          name: url_prefix
          required: false
          schema:
            type: string
          description: |
            Case-insensitive `HasPrefix(wh.URL, value)` filter (5.4.83).
            Whitespace-trimmed; empty disables. Closes the receiver-cohort
            operator queries *"which webhooks point to my Slack
            workspace?"* / *"which receivers fire into our test
            environment?"* that `search` (case-insensitive substring
            across URL + description + event_types + tags) can answer
            only with noisy fuzzy matches. Case-insensitive because URL
            schemes and hosts are case-insensitive per RFC 3986; matches
            the existing URL haystack in `WebhookMatchesSearch`.
            Diverges from the case-sensitive name-prefix family
            (snapshots 5.4.75, VMs 5.4.76, images 5.4.77, templates
            5.4.78, schedules 5.4.82) because URLs are not free-form
            name alphabets. Applied between `active` and `search` so it
            composes additively with every other webhook list filter
            and `X-Total-Count` reflects the post-filter population.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [id, url, created_at, last_delivery_at, delivery_status]
            default: id
          description: |
            Field to sort by. `url` matches case-insensitively.
            `last_delivery_at` sorts never-delivered webhooks
            (zero timestamp) at the tail of the ascending list and the
            head of the descending list. `delivery_status` (5.4.98)
            orders by the derived classification — alphabetical
            `failing < healthy < never` — and is the symmetric sort
            counterpart to the case-insensitive `?delivery_status=`
            exact-match filter; operator-triage ASC surfaces broken
            receivers first and DESC surfaces never-attempted receivers
            first. All comparators tiebreak on `id` so repeated requests
            return a deterministic order.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction. Default `asc`.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: |
            1-based page number when paginating the filtered + sorted
            response. Has no effect when `per_page` (or `limit`) is unset.
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
          description: |
            Maximum number of webhooks to return per page. `limit` is
            accepted as a synonym. When omitted the full filtered set is
            returned. Pagination is applied after filter + sort so the
            `X-Total-Count` response header reflects the post-filter /
            pre-pagination population.
      responses:
        '200':
          description: Webhook list
          headers:
            X-Total-Count:
              description: |
                Total number of webhooks matching the active filters before
                pagination is applied. Use this to drive page indicators
                like "Showing 1-25 of 137".
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/bulk_delete:
    post:
      tags: [Webhooks]
      summary: Delete multiple webhooks in a single request
      description: |
        Delete a batch of webhooks either by explicit ID list or by event-type
        selector. Returns a per-target result so partial failures (one
        webhook missing, the rest succeeded) surface in a single response.
        Exactly one of `ids` or `event_type` must be provided.

        The `event_type` selector matches webhooks whose `event_types` filter
        list contains the exact event type. Catch-all webhooks (empty
        `event_types`) are NOT swept by the categorical selector — delete
        them by id. Mirrors `/templates/bulk_delete` (2.3.9) and
        `/images/bulk_delete` (2.3.6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteWebhooksRequest'
      responses:
        '200':
          description: Per-webhook delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteWebhooksResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Webhooks]
      summary: Get a single webhook (secret redacted)
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [Webhooks]
      summary: Update editable webhook fields
      description: >
        Mutates one or more editable fields on an existing webhook.  Every
        field in the request body is optional — omit a key to leave it
        unchanged.  At least one editable field must be present; an empty
        body returns 400 `noop_update`.

        On success the in-memory delivery worker is bounced so subsequent
        deliveries pick up the new URL / secret / event-type filters /
        active flag.  Setting `active: false` stops the worker; setting
        it back to `true` re-registers it.

        Secrets are accepted but never returned; the response carries the
        same redacted shape as `GET /webhooks/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateSpec'
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /webhooks/{webhookID}/test:
    parameters:
      - name: webhookID
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Webhooks]
      summary: Send a synthetic test event to a webhook
      description: >
        Synthesises a `system.webhook_test` event and delivers it once
        (no retries) to the registered webhook so operators can verify
        connectivity, signing, and receiver health.  Updates the persisted
        webhook's `last_status` / `last_error` / `last_delivery_at` fields.
      responses:
        '200':
          description: Delivery attempted (success or failure both return 200; inspect the body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResult'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /schedules:
    get:
      tags: [Schedules]
      summary: List scheduled operations
      parameters:
        - in: query
          name: vm_id
          required: false
          schema:
            type: string
          description: |
            Exact-match filter on the schedule's target `vm_id`.
            Whitespace-trimmed; empty disables the filter.
        - in: query
          name: tag_selector
          required: false
          schema:
            type: string
          description: |
            Case-insensitive exact-membership filter on the schedule's
            `tag_selector` list: a schedule matches when any entry equals the
            value. Whitespace-trimmed; empty disables the filter. Schedules with
            an empty `tag_selector` (vm_id-targeted or all-VMs) are NOT matched,
            mirroring the webhook `event_type` membership semantics. The
            symmetric counterpart to `vm_id` for tag-selector-targeted schedules.
        - in: query
          name: action
          required: false
          schema:
            type: string
            enum: [snapshot, start, stop, restart, force-stop, reboot, suspend, resume]
          description: |
            Exact-match filter on the schedule's `action`.
            Whitespace-trimmed; empty disables the filter.
        - in: query
          name: catch_up_policy
          required: false
          schema:
            type: string
            enum: [skip, run_once, run_all]
          description: |
            Case-insensitive exact-match filter on the schedule's
            `catch_up_policy`. Whitespace-trimmed; empty disables the filter;
            invalid values return 400 `invalid_catch_up_policy`. A schedule
            persisted with an empty policy is treated as `skip` (the engine's
            default) so `catch_up_policy=skip` matches it, mirroring the VM
            `default_user=root` empty-means-root filter semantics. Composes
            additively with every other schedule filter.
        - in: query
          name: timezone
          required: false
          schema:
            type: string
          description: |
            Case-sensitive exact-match filter against the schedule's stored
            `timezone` field. IANA timezone names are case-sensitive
            (`America/New_York` not `america/new_york`), mirroring the
            `vm_id` / `actor` / `resource_id` exact-match filter contracts.
            Whitespace-trimmed; empty disables the filter. No default-fallback
            for empty stored values — the engine's effective default is
            host-dependent (`time.Local`), so operators querying by timezone
            must supply the literal value they stored. Applied after
            `catch_up_policy` and before `enabled` so it composes additively
            with every other schedule filter; `X-Total-Count` reflects the
            post-filter population.
        - in: query
          name: enabled
          required: false
          schema:
            type: string
            enum: ['true', 'false']
          description: |
            Tristate boolean filter on the schedule's `enabled` flag.
            Case-insensitive `true` / `false`; whitespace-trimmed; empty
            disables the filter; anything else returns 400 `invalid_enabled`.
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: |
            Case-insensitive substring filter applied across each schedule's
            name, action, vm_id, and tag_selector. Whitespace is trimmed
            before matching. ID is intentionally excluded from the haystack.
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive lower bound (RFC3339) on the schedule's `created_at`.
            Whitespace-trimmed; empty disables the bound; invalid values
            return 400 `invalid_since`. A schedule with a zero `created_at`
            is filtered OUT whenever any bound is set. Mirrors the
            snapshot / image / VM / template / webhook time-range filters.
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive upper bound (RFC3339) on the schedule's `created_at`.
            Same shape as `since`; invalid values return 400 `invalid_until`.
        - in: query
          name: next_fire_since
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive lower bound (RFC3339) on the schedule's `next_fire_at`
            — the cron-computed wall-clock time of the next planned fire.
            Closes the *"what fires in the next N hours"* operator query that
            the `next_fire_at` sort axis can order but not narrow.
            Whitespace-trimmed; empty disables the bound; invalid values
            return 400 `invalid_next_fire_since`. Schedules with a nil
            `next_fire_at` (disabled / stalled) are filtered OUT whenever any
            bound is set, mirroring the zero-`created_at` handling of the
            existing `since` / `until` filter. Composes additively with every
            other schedule filter; `X-Total-Count` reflects the post-filter
            population.
        - in: query
          name: next_fire_until
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive upper bound (RFC3339) on the schedule's `next_fire_at`.
            Same shape as `next_fire_since`; invalid values return 400
            `invalid_next_fire_until`.
        - in: query
          name: last_fired_since
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive lower bound (RFC3339) on the schedule's `last_fired_at`
            — the wall-clock time of the schedule's most recent fire. Closes
            the SRE triage operator queries *"which schedules fired during
            yesterday's maintenance window"* / *"which schedules haven't
            fired since the last daemon restart"* that the categorical
            `enabled` filter and the `next_fire_since` / `next_fire_until`
            filter on the *next* fire cannot answer. Whitespace-trimmed;
            empty disables the bound; invalid values return 400
            `invalid_last_fired_since`. Schedules with a nil `last_fired_at`
            (never-fired) are filtered OUT whenever any bound is set,
            mirroring the webhook `last_delivery_since` / `last_delivery_until`
            nil-handling and the `next_fire_at` filter nil-exclusion.
            Composes additively with every other schedule filter;
            `X-Total-Count` reflects the post-filter population.
        - in: query
          name: last_fired_until
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive upper bound (RFC3339) on the schedule's `last_fired_at`.
            Same shape as `last_fired_since`; invalid values return 400
            `invalid_last_fired_until`.
        - in: query
          name: prefix
          required: false
          schema:
            type: string
          description: |
            Case-sensitive `HasPrefix(sched.Name, prefix)` filter (5.4.82).
            Whitespace-trimmed; empty disables the filter. The fifth and
            final member of the name-prefix filter family alongside snapshots
            (5.4.75), VMs (5.4.76), images (5.4.77), and templates (5.4.78)
            so the same cohort-discrimination query (`?prefix=nightly-`,
            `?prefix=backup-`, `?prefix=auto-`) round-trips 1:1 across every
            name-prefix axis operators reach for most. Case-sensitive because
            schedule names share the same case-sensitive free-form alphabet
            as VM / template names. Applied after the time-range filters and
            before `search` so it composes additively with every other
            schedule filter; `X-Total-Count` reflects the post-filter
            population.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [id, name, created_at, next_fire_at, last_fired_at, vm_id, action, timezone, enabled]
            default: id
          description: |
            Field to sort by. `name` matches case-insensitively;
            `next_fire_at` sorts schedules with no scheduled fire (disabled /
            unscheduled) at the tail of the ascending list and the head of the
            descending list. `last_fired_at` (5.4.84) is the symmetric
            backward-looking sort axis to the existing `next_fire_at` —
            schedules with a nil `last_fired_at` (never-fired) also sort at
            the tail in `asc` / head in `desc`, mirroring the webhook
            `last_delivery_at` sort axis. `vm_id` (5.4.97) is the symmetric
            sort counterpart to the case-sensitive `?vm_id=` exact-match
            filter on the same column — case-sensitive ASCII compare (VM
            IDs are opaque `vm-<unix-nano>` strings), and schedules with
            an empty `vm_id` (tag_selector-targeted or all-VMs schedules)
            sink to the tail in `asc` / head in `desc`, mirroring the
            events `vm_id` sort axis (5.4.93), the logs `vm_id` sort axis
            (5.4.94), and the schedule-runs `vm_id` sort axis (5.4.95).
            `action` (5.4.99) is the symmetric sort counterpart to the
            existing case-insensitive `?action=` exact-match filter on the
            same column — case-insensitive alphabetical compare on the
            four-member action enum (`restart` < `snapshot` < `start` <
            `stop`). Action is closed-and-total (every schedule resolves
            to exactly one of the four values at create time), so the
            `action` branch diverges from the nil-trailing convention the
            same way the webhook `delivery_status` sort axis (5.4.98) does
            — there is no empty bucket to sink. `timezone` (5.4.112) is
            the symmetric sort counterpart to the existing case-sensitive
            `?timezone=` exact-match filter on the same column —
            case-sensitive compare (IANA timezone names are case-sensitive:
            `America/New_York`, not `america/new_york`); schedules with an
            empty `timezone` (the daemon's effective default is the
            host-dependent `time.Local`, so an empty stored value means
            "operator did not pin a zone") sink to the tail in `asc` /
            head in `desc`, mirroring the `vm_id` axis nil-trailing
            semantics and every other nullable string axis (ip, image,
            gpu, actor, last_fired_at, next_fire_at). `enabled` (5.4.113)
            is the symmetric sort counterpart to the tristate `?enabled=
            true|false` exact-match filter on the same column — boolean
            compare with asc collation `false < true` so disabled
            schedules cluster at the head of `asc` and the enabled cohort
            (the schedules that actually fire) at the head of `desc`.
            Closed-and-total: `Schedule.enabled` is `json:"enabled"`
            without `omitempty` so a missing wire key resolves to the
            zero value (false) and every schedule belongs to exactly one
            of the two buckets — no nil-trailing bucket, mirroring the
            VM `auto_start` axis (5.4.108) and `locked` axis (5.4.109).
            All comparators tiebreak on `id` so repeated requests return
            a deterministic order.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction. Default `asc`.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: |
            1-based page number when paginating the filtered + sorted
            response. Has no effect when `per_page` is unset.
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
          description: |
            Maximum number of schedules to return per page. When omitted the
            full filtered set is returned. Pagination is applied after filter
            + sort so the `X-Total-Count` response header reflects the
            post-filter / pre-pagination population.
      responses:
        '200':
          description: Schedule list
          headers:
            X-Total-Count:
              description: |
                Total number of schedules matching the active filters before
                pagination is applied.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Schedules]
      summary: Create a scheduled operation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /schedules/{scheduleID}:
    parameters:
      - name: scheduleID
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Schedules]
      summary: Get a single schedule
      responses:
        '200':
          description: Schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    patch:
      tags: [Schedules]
      summary: Update editable schedule fields
      description: >
        Mutates one or more editable fields on an existing schedule. Every
        field in the request body is optional — omit a key to leave the
        corresponding field unchanged. At least one editable field must be
        present; an empty body returns 400 `noop_update`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpdateSpec'
      responses:
        '200':
          description: Schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Schedules]
      summary: Delete a schedule
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /schedules/{scheduleID}/runs:
    parameters:
      - name: scheduleID
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Schedules]
      summary: List recent runs for a schedule (newest first)
      description: |
        Returns the schedule's run history, newest first. Filters are applied
        before pagination so `X-Total-Count` reflects the post-filter
        population, and compose additively with one another.
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [running, success, error, skipped]
          description: |
            Case-insensitive exact-match on the run status. Empty disables the
            filter; unknown values return 400 `invalid_status`.
        - in: query
          name: vm_id
          required: false
          schema:
            type: string
          description: |
            Case-sensitive exact-match against the run's `vm_id`. Whitespace
            is trimmed; empty disables the filter. Useful for tag-selector
            schedules that target many VMs — narrows the run history to a
            single VM (e.g. "which runs of `nightly-snapshot` targeted
            `vm-1700000000000`"). Composes additively with `status` and
            `since`/`until`; applied before pagination so `X-Total-Count`
            reflects the post-filter population.
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive RFC3339 lower bound on the run's `started_at`. Invalid
            values return 400 `invalid_since`. A run with a zero `started_at`
            is filtered out whenever `since` or `until` is set.
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive RFC3339 upper bound on the run's `started_at`. Invalid
            values return 400 `invalid_until`.
        - in: query
          name: skip_reason
          required: false
          schema:
            type: string
            enum:
              - vm_not_found
              - vm_already_stopped
              - vm_already_running
              - concurrent_run
              - catch_up_skipped
              - queue_full
          description: |
            Case-insensitive exact-match on the run's `skip_reason` field
            (5.4.65). Whitespace is trimmed; empty disables the filter;
            invalid values return 400 `invalid_skip_reason`. Runs with an
            empty `skip_reason` (every non-skipped run, and any skipped run
            persisted without a reason) are filtered OUT whenever the
            filter is set, mirroring the nil-finished_at exclusion in the
            `finished_since`/`finished_until` family — same "only rows
            where the field is populated" semantics. The symmetric
            categorical sub-axis to `status=skipped`: `status=` narrows
            the visible cohort to the four enum buckets but cannot answer
            *which* reason a run was skipped. Composes additively with
            every other run filter; applied right after `status` so the
            post-filter `X-Total-Count` stays correct.
        - in: query
          name: finished_since
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive RFC3339 lower bound on the run's nullable `finished_at`.
            Whitespace is trimmed; empty disables the bound; invalid values
            return 400 `invalid_finished_since`. Runs with a nil `finished_at`
            (typically still-running runs) are filtered OUT whenever either
            `finished_since` or `finished_until` is set — mirrors the
            nil-handling for the schedule `next_fire_at` filter. Closes the
            *"which runs of this schedule completed between X and Y"* triage
            query that the `since`/`until` filter on `started_at` cannot
            answer (a run can start inside a window but finish well outside
            it). Composes additively with every other filter; applied between
            the `started_at` range and `search`, before pagination so
            `X-Total-Count` reflects the post-filter population.
        - in: query
          name: finished_until
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Inclusive RFC3339 upper bound on the run's nullable `finished_at`.
            Same shape as `finished_since`; invalid values return 400
            `invalid_finished_until`. Runs with a nil `finished_at` are
            filtered OUT whenever either bound is set.
        - in: query
          name: min_duration_ms
          required: false
          schema:
            type: integer
            minimum: 0
          description: |
            Inclusive lower bound (non-negative integer) on the run's
            `finished_at - started_at` duration in milliseconds (5.4.64).
            Whitespace is trimmed; empty disables the bound; non-numeric or
            negative values return 400 `invalid_min_duration_ms`. Runs with a
            nil `finished_at` (still-running runs have no known duration) are
            filtered OUT whenever either `min_duration_ms` or
            `max_duration_ms` is set, mirroring the `finished_since`/
            `finished_until` nil-handling. Closes the *"show me every run
            that took ≥ 5 minutes"* triage query that the categorical
            `status` filter cannot answer; the symmetric range counterpart
            to the `duration` sort axis added in 5.4.63. Composes additively
            with every other filter; applied between `finished_until` and
            `search`, before pagination so `X-Total-Count` reflects the
            post-filter population.
        - in: query
          name: max_duration_ms
          required: false
          schema:
            type: integer
            minimum: 0
          description: |
            Inclusive upper bound (non-negative integer) on the run's
            `finished_at - started_at` duration in milliseconds (5.4.64).
            Same shape as `min_duration_ms`; invalid values return 400
            `invalid_max_duration_ms`. Runs with a nil `finished_at` are
            filtered OUT whenever either bound is set.
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: |
            Case-insensitive substring match across the run's `error` and
            `skip_reason` fields. Whitespace is trimmed; empty disables the
            filter. The id / schedule_id / vm_id / status fields are
            intentionally excluded from the haystack so short numeric
            needles don't generate noisy matches against opaque IDs.
            Composes additively with `status`, `vm_id`, and `since`/`until`;
            applied before pagination so `X-Total-Count` reflects the
            post-filter population.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [id, started_at, finished_at, status, duration, vm_id, skip_reason]
            default: started_at
          description: |
            Field to sort the run history by. Default is `started_at` to
            preserve the legacy newest-first contract. `finished_at` puts
            still-running runs (nil `finished_at`) at the tail when ascending
            and at the head when descending. `duration` orders by
            `finished_at - started_at`; runs with no known duration (nil
            `finished_at`) apply the same nil-trailing semantics. `vm_id`
            (5.4.95) is case-sensitive (VM IDs are opaque `vm-<unix-nano>`
            strings) and sinks runs with an empty `vm_id` (e.g. `queue_full`
            skips on an all-VMs schedule) to the tail in `asc` / head in
            `desc`, mirroring the events `vm_id` sort axis and the logs
            `vm_id` sort axis. `skip_reason` (5.4.96) is the symmetric sort
            counterpart to the `?skip_reason=` exact-match filter; runs
            with an empty `skip_reason` (every non-skipped run, plus
            skipped runs persisted without a reason) sink to the tail in
            `asc` and the head in `desc`, mirroring the finished_at /
            duration nil-trailing semantics. All comparators tiebreak on
            `id` so paginated requests are deterministic. Unknown values
            return 400 `invalid_sort`.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: |
            Sort order. When `sort` is omitted the default order is `desc`
            (newest first); when `sort` is explicitly supplied the default
            is `asc`. Unknown values return 400 `invalid_order`.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 1-based page number when paginating the run history.
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
          description: |
            Maximum number of runs to return per page. When omitted the full
            run history is returned. The `X-Total-Count` response header
            reflects the pre-pagination population.
      responses:
        '200':
          description: Schedule run list (newest first)
          headers:
            X-Total-Count:
              description: Total number of runs for this schedule before pagination.
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleRun'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /schedules/{scheduleID}/run-now:
    parameters:
      - name: scheduleID
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Schedules]
      summary: Fire a schedule immediately, out of band
      description: >
        Triggers the schedule's action right now without waiting for the next
        cron fire. Returns the (possibly updated) schedule.
      responses:
        '200':
          description: Schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /logs:
    get:
      tags: [Logs]
      summary: List recent daemon logs
      parameters:
        - name: level
          in: query
          schema:
            type: string
          description: Minimum log level.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Return entries strictly AFTER this RFC3339 timestamp. Whitespace
            is trimmed; empty disables the bound; invalid values return 400
            `invalid_since`. (Strict-after semantics are preserved from the
            legacy `logger.Entries` contract.)
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Return entries at-or-BEFORE this RFC3339 timestamp (inclusive
            upper bound — mirrors the snapshot/image/VM/template/webhook
            time-range filters). Whitespace is trimmed; empty disables the
            bound; invalid values return 400 `invalid_until`. Composes
            additively with `since` and the other filters so `X-Total-Count`
            reflects the post-filter population.
        - name: source
          in: query
          schema:
            type: string
          description: Filter by structured log source.
        - name: vm_id
          in: query
          required: false
          schema:
            type: string
          description: |
            Exact-match filter against each entry's structured `vm_id`
            field (case-sensitive — VM IDs are opaque `vm-<unix-nano>`
            strings). Whitespace is trimmed before matching. Empty value
            disables the filter. Composes additively with `level`,
            `source`, `since`, `search`, and pagination so
            `X-Total-Count` reflects the post-filter population.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Alias retained for compatibility.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: |
            Case-insensitive substring filter applied to each entry's
            message, source, level, and every value in the structured
            fields map. Whitespace is trimmed before matching. Field keys
            and timestamps are intentionally excluded from the haystack —
            keys are a small repeating vocabulary (`vm_id`, `method`,
            `error`, ...) and would generate noisy matches, while
            timestamps are scoped via `since`. The filter composes
            additively with `level`, `source`, `since`, and pagination,
            so `X-Total-Count` reflects the post-search population.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [timestamp, level, source, vm_id]
            default: timestamp
          description: |
            Sort entries by `timestamp`, `level`, `source`, or
            `vm_id`. `level` orders by severity rank
            (debug < info < warn < error), not alphabetically.
            `source` matches case-insensitively. `vm_id` is the
            symmetric sort counterpart to the `?vm_id=` exact-match
            filter — case-sensitive (VM IDs are opaque `vm-<unix-nano>`
            strings); entries with no `vm_id` field sink to the tail
            of `asc` and the head of `desc`, mirroring the events
            `vm_id` sort axis and every other nullable sort axis.
            All comparators tiebreak on timestamp+source so paginated
            responses are deterministic. Unknown values return 400
            `invalid_sort`.
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: |
            Sort order. Default is `asc` — preserves the legacy
            oldest-first contract the GUI's auto-scroll relies on.
            Unknown values return 400 `invalid_order`.
      responses:
        '200':
          description: Log entries
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
        default:
          $ref: '#/components/responses/APIError'
  /events:
    get:
      tags: [Events]
      summary: List recent events
      description: |
        Returns the most recent events matching the provided filters, sorted
        newest-first by default. Each event carries a monotonic numeric ID
        assigned by the EventBus, plus a structured payload (source, severity,
        attributes).

        Sorting is whitelisted via `sort` and `order` (defaults: `id` /
        `desc` — preserves the long-standing "newest first" contract since
        sequence IDs are appended in publish order). All comparators tiebreak
        on `id` so paginated responses are deterministic. Unknown values
        return 400 `invalid_sort` / `invalid_order`.

        Pagination is page/per_page; clients can also provide `until=<seq>` to
        fetch events older than a known sequence ID (cursor pagination).
      parameters:
        - name: vm_id
          in: query
          schema:
            type: string
          description: Filter by VM ID (exact match).
        - name: type
          in: query
          schema:
            type: string
          description: Filter by event type (e.g., `vm.started`).
        - name: type_prefix
          in: query
          schema:
            type: string
          description: |
            Case-insensitive prefix match on event type. Lets operators slice
            an entire event family (e.g. `snapshot.` matches every `snapshot.*`
            subtype, `vm.` matches every `vm.*` subtype) without enumerating
            each fully-qualified type. Composes additively with `type`,
            `source`, `severity`, `search`, and the time/cursor filters.
        - name: source
          in: query
          schema:
            type: string
            enum: [libvirt, app, system]
          description: Filter by event source.
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warn, error]
          description: Filter by severity (exact match).
        - name: min_severity
          in: query
          schema:
            type: string
            enum: [info, warn, error]
          description: |
            Severity floor: return events ranked at-or-above this level
            (info < warn < error). Closes the "show me everything that needs
            attention (warn + error)" operator query that the exact-match
            `severity` filter cannot answer. Whitespace-trimmed and
            case-insensitive; empty disables the floor; unknown values return
            400 `invalid_min_severity`. Composes additively with the
            exact-match `severity` and every other event filter so
            `X-Total-Count` reflects the post-filter population. Mirrors the
            severity-floor semantics the logs `level` filter already ships.
        - name: actor
          in: query
          schema:
            type: string
          description: |
            Case-sensitive exact-match filter on the event's `actor` field
            (e.g. `system`, `app`, or an API-key alias). Mirrors `?vm_id=`'s
            contract: empty disables the filter, whitespace is trimmed.
            Lets operators slice the timeline to a single human / bot
            without the noisy substring matches `?search=` gives.
        - name: resource_id
          in: query
          schema:
            type: string
          description: |
            Filter by `resource_id` (exact match, case-sensitive). Mirrors the
            `vm_id` filter contract — resource IDs are opaque server-issued
            strings operators reference verbatim (e.g. `snap-…`, `img-…`,
            `wh-…`). Whitespace is trimmed before comparison; empty disables
            the filter. Composes additively with `vm_id`, `type`, `source`,
            `severity`, `actor`, `search`, `since`, and `until` so
            `X-Total-Count` reflects the post-filter population.
        - name: search
          in: query
          schema:
            type: string
          description: |
            Case-insensitive substring match across `message`, `type`, `source`,
            `severity`, `actor`, `vm_id`, `resource_id`, and every value in
            `attributes`. Combines additively with the other filters.
            The numeric event ID is intentionally excluded from the haystack so
            short numeric queries don't produce noisy matches.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return only events with `occurred_at` after this RFC3339 timestamp.
        - name: until
          in: query
          schema:
            type: string
          description: Cursor — exclude events with sequence ID >= this uint64.
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, occurred_at, type, source, severity, actor, resource_id, vm_id]
            default: id
          description: |
            Sort field. `type`, `source`, and `severity` match
            case-insensitively; `actor`, `resource_id`, and `vm_id` are
            **case-sensitive** to mirror their respective case-sensitive
            `?actor=` / `?resource_id=` / `?vm_id=` exact-match filter
            contracts. Events with an empty `actor` (legacy events
            written before the actor attribution sweep), an empty
            `resource_id`, or an empty `vm_id` (host-level events like
            `system.daemon_started`) sort to the tail of `asc` and the
            head of `desc`, mirroring the nil-trailing semantics on the
            VM list `ip` axis and the schedule `last_fired_at` /
            `next_fire_at` axes. All comparators tiebreak on `id` so
            paginated responses are deterministic. Defaults to `id` so
            the long-standing newest-first contract is preserved.
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: |
            Sort direction. Defaults to `desc` so the long-standing
            newest-first contract is preserved.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Event list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        default:
          $ref: '#/components/responses/APIError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  headers:
    XTotalCount:
      description: Total matching records before pagination.
      schema:
        type: integer
  parameters:
    VMID:
      name: vmID
      in: path
      required: true
      schema:
        type: string
    ImageID:
      name: imageID
      in: path
      required: true
      schema:
        type: string
    TemplateID:
      name: templateID
      in: path
      required: true
      schema:
        type: string
    PortID:
      name: portID
      in: path
      required: true
      schema:
        type: string
    SnapshotName:
      name: snapName
      in: path
      required: true
      schema:
        type: string
    TagFilter:
      name: tag
      in: query
      schema:
        type: string
      description: Case-insensitive tag filter.
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [creating, running, stopped, paused, deleted, unknown]
    SearchFilter:
      name: search
      in: query
      description: |
        Case-insensitive substring filter applied across the VM's name,
        description, and tags. Combine with `tag` and `status` for narrower
        scoping; an empty value matches every VM. ID is intentionally excluded
        from the match — the opaque `vm-<unix-nano>` form rarely matches a
        useful operator query.
      schema:
        type: string
    ImageFilter:
      name: image
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's base image
        (`spec.image`). Closes the operator query "show me every VM built
        from `rocky9.qcow2`" that the existing `?search=` and `?tag=`
        filters cannot answer precisely — `?search=rocky` would also
        match VMs whose description or tag contains the substring, while
        `?tag=` requires the operator to have tagged every VM by image.
        Whitespace is trimmed before comparison; empty value disables
        the filter. Composes additively with `tag`, `status`, `search`,
        and the sort + pagination params.
      schema:
        type: string
    DefaultUserFilter:
      name: default_user
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's configured
        `default_user` field. Whitespace is trimmed before comparison;
        an empty value disables the filter. An empty `spec.default_user`
        is treated as `root` to mirror `lifecycle.go`'s runtime semantics
        — `?default_user=root` matches every VM that SSHes in as root,
        whether the field was explicitly set or left blank at create
        time. Composes additively with the existing `tag`, `status`, and
        `search` filters; `X-Total-Count` reflects the post-filter /
        pre-pagination population.
      schema:
        type: string
    NetworkFilter:
      name: network
      in: query
      description: |
        Case-insensitive exact-match filter on the name of any of the VM's
        additional network attachments (`spec.networks[].name`). A VM matches
        when any attachment name equals the value (any-of). Whitespace is
        trimmed before comparison; an empty value disables the filter. The
        implicit primary NAT network is NOT matched — it is not represented
        in `spec.networks`, so this filter only ever scopes to the
        explicitly-attached extra networks operators name and group by
        ("data-net", "storage-net"). Composes additively with `tag`,
        `status`, `search`, `image`, `default_user`, and the sort +
        pagination params; `X-Total-Count` reflects the post-filter /
        pre-pagination population.
      schema:
        type: string
    PrefixFilter:
      name: prefix
      in: query
      description: |
        Case-sensitive `HasPrefix(vm.name, prefix)` filter. A VM matches
        when its `name` starts with this value verbatim. Whitespace is
        trimmed before comparison; an empty value disables the filter.
        Mirrors the 5.4.75 snapshot `?prefix=` selector and the
        case-sensitive `vmsmith` VM-name alphabet (`[A-Za-z0-9-]`) —
        operators routinely cohort their fleet by name prefix
        (`web-prod-`, `db-prod-`, `web-staging-`) and need exact-prefix
        discrimination before running fan-out actions. Closes the
        cohort-discrimination operator query that `?search=`
        (case-insensitive substring) cannot answer cleanly — searching
        for `web-prod-` also surfaces `legacy-web-prod-2024-bak`
        because of substring matching. Applied between `network` and
        the `since` / `until` time range so the post-filter
        `X-Total-Count` stays correct, and composes additively with
        every other VM filter.
      schema:
        type: string
    OSTypeFilter:
      name: os_type
      in: query
      description: |
        Case-insensitive exact-match filter on the guest OS family. Accepts
        `linux` or `windows` (case-insensitive; surrounding whitespace
        trimmed); empty value disables the filter. An empty stored
        `spec.os_type` resolves to `linux` — mirrors `ResolvedOSType` and
        the `?default_user=root` empty-means-root semantics — so
        `?os_type=linux` matches both explicit-linux VMs and those left
        unset. Any value other than `linux` / `windows` returns
        `400 invalid_os_type` (matching the create-time validation contract
        on `POST /vms`). Composes additively with every other filter; the
        same parameter applies to `GET /templates` and uses
        `VMTemplate.ResolvedOSType` for the empty-means-linux fallback.
      schema:
        type: string
        enum: [linux, windows]
    OSVariantFilter:
      name: os_variant
      in: query
      description: |
        Case-insensitive exact-match filter on the Windows guest variant
        (the record's `os_variant` field — `spec.os_variant` on `GET /vms`,
        `os_variant` on `GET /templates`). Accepts one of
        `windows-10`, `windows-11`, `windows-server-2019`,
        `windows-server-2022`, `windows-server-2025` (case-insensitive;
        surrounding whitespace trimmed); empty value disables the filter.
        Unlike `?os_type=linux` (which matches empty-stored records via the
        documented linux default), `?os_variant=` has NO documented default —
        an empty stored `os_variant` means "operator did not specify an
        edition" and is filtered OUT whenever the filter is set, mirroring
        the webhook `?event_type=` membership semantics. The symmetric
        sub-axis to `?os_type=windows`: `?os_type=` narrows to the OS family,
        `?os_variant=` slices the Windows cohort by edition. Any value other
        than the five known variants returns `400 invalid_os_variant`.
        Composes additively with every other filter; `X-Total-Count` reflects
        the post-filter population.
      schema:
        type: string
        enum:
          - windows-10
          - windows-11
          - windows-server-2019
          - windows-server-2022
          - windows-server-2025
    FirmwareFilter:
      name: firmware
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's firmware choice
        (`spec.firmware`). Accepts one of `bios`, `uefi`, `ovmf`
        (case-insensitive; surrounding whitespace trimmed); empty value
        disables the filter. `bios` matches both stored "bios" AND VMs with
        no firmware override (the SeaBIOS default — mirrors the
        `?os_type=linux` empty-means-linux contract). `uefi` and `ovmf`
        strict-match the stored value; they map to the same libvirt
        `firmware='efi'` attribute at render time, but the operator's
        stored choice survives the round-trip so the filter exposes it
        back. Any other value returns `400 invalid_firmware` (matching the
        create-time validation contract on `POST /vms`). Composes
        additively with every other filter; `X-Total-Count` reflects the
        post-filter population.
      schema:
        type: string
        enum: [bios, uefi, ovmf]
    DiskBusFilter:
      name: disk_bus
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's effective disk bus.
        Accepts one of `virtio`, `sata` (case-insensitive; surrounding
        whitespace trimmed); empty value disables the filter. Resolution
        defers to `VMSpec.ResolvedDiskBus`, so empty `spec.disk_bus`
        matches the OS-family default — Linux VMs match
        `?disk_bus=virtio`, Windows VMs match `?disk_bus=sata`. Mirrors
        the empty-means-default contract of `?firmware=bios` (empty
        defaults to SeaBIOS) and `?os_type=linux` (empty defaults to
        Linux). Any other value returns `400 invalid_disk_bus` (matching
        the create-time validation contract on `POST /vms`). Composes
        additively with every other filter; `X-Total-Count` reflects the
        post-filter population.
      schema:
        type: string
        enum: [virtio, sata]
    NICModelFilter:
      name: nic_model
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's effective NIC model
        (`VMSpec.ResolvedNICModel`). Accepts one of `virtio`, `e1000e`
        (case-insensitive; surrounding whitespace trimmed); empty value
        disables the filter. Resolution defers to the OS-family default for
        empty stored values: a Linux VM with empty `spec.nic_model` matches
        `?nic_model=virtio` (the historical Linux default), and a Windows
        VM with empty `spec.nic_model` matches `?nic_model=e1000e` (the
        boot-without-virtio-drivers default). An explicit `spec.nic_model`
        always wins over the OS-family default, so a Windows guest flipped
        to virtio via 5.6.12 after the operator installs the virtio-net
        drivers in-guest appears under `?nic_model=virtio`. Any other value
        returns `400 invalid_nic_model` (matching the create-time
        validation contract on `POST /vms`). Composes additively with every
        other filter; `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: [virtio, e1000e]
    MachineFilter:
      name: machine
      in: query
      description: |
        Case-sensitive exact-match filter on the VM's effective libvirt
        machine type (`VMSpec.ResolvedMachine`). Free-form value bounded
        by the libvirt machine-type alphabet `[A-Za-z0-9._-]+` (e.g.
        `pc-q35-6.2`, `pc-q35-rhel9.6.0`, `q35`, `virt-7.2`); surrounding
        whitespace is trimmed; empty value disables the filter. Resolution
        defers to the daemon default (`pc-q35-6.2`) for empty stored values,
        so `?machine=pc-q35-6.2` matches both stored `pc-q35-6.2` AND VMs
        with no override — mirrors the `?firmware=bios` empty-defaults-to-
        SeaBIOS contract. Garbage failing the alphabet check returns
        `400 invalid_machine`. Composes additively with every other filter;
        `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
    ClockOffsetFilter:
      name: clock_offset
      in: query
      description: |
        Case-insensitive exact-match filter on the VM's effective libvirt
        clock offset (`VMSpec.ResolvedClockOffset`). Accepts one of `utc`,
        `localtime` (case-insensitive; surrounding whitespace trimmed);
        empty value disables the filter. Resolution defers to the OS-family
        default for empty stored values: a Linux VM with empty
        `spec.clock_offset` matches `?clock_offset=utc` (the historical
        Linux default), and a Windows VM with empty `spec.clock_offset`
        matches `?clock_offset=localtime` (the Windows RTC convention). An
        explicit `spec.clock_offset` always wins over the OS-family default,
        so a Windows guest pinned to `utc` (NTP-synced fleet) appears under
        `?clock_offset=utc` rather than `?clock_offset=localtime`. Any other
        value returns `400 invalid_clock_offset` (matching the create-time
        validation contract on `POST /vms`). Composes additively with every
        other filter; `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: [utc, localtime]
    GPUFilter:
      name: gpu
      in: query
      description: |
        Any-of exact-match filter on the VM's requested passthrough GPUs
        (`spec.gpus`). Accepts both the long (`0000:01:00.0`) and short
        (`01:00.0`) PCI address form; the daemon normalises before
        matching via `NormalizePCIAddress`, so a VM stored with the short
        form still surfaces when queried by the long form (and vice
        versa). Surrounding whitespace is trimmed; empty value disables
        the filter. VMs with no requested GPUs drop out whenever the
        filter is set, mirroring the empty-stored-excludes contract on
        `?ip=` / `?nat_static_ip=` / `?nat_gateway=`. Garbage failing
        `IsValidPCIAddress` returns `400 invalid_gpu`, mirroring the
        create-path validation contract (5.7.4). Composes additively with
        every other filter; `X-Total-Count` reflects the post-filter
        population.
      schema:
        type: string
    AutoStartFilter:
      name: auto_start
      in: query
      description: |
        Tristate boolean filter on the VM's `auto_start` flag. Accepts
        `true` / `false` (case-insensitive, plus `1` / `0` aliases);
        absent or whitespace-only disables the filter so every VM is
        returned. Anything else returns 400 `invalid_auto_start`.
        Composes additively with every other list filter so
        `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: ["true", "false"]
    LockedFilter:
      name: locked
      in: query
      description: |
        Tristate boolean filter on the VM's `locked` (delete-protection)
        flag. Accepts `true` / `false` (case-insensitive, plus `1` / `0`
        aliases); absent or whitespace-only disables the filter so every
        VM is returned. Anything else returns 400 `invalid_locked`.
        Composes additively with every other list filter so
        `X-Total-Count` reflects the post-filter population.
      schema:
        type: string
        enum: ["true", "false"]
    VMSort:
      name: sort
      in: query
      description: |
        Field to sort the VM list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. `cpus`, `ram_mb`, and `disk_gb` are
        numeric capacity axes on the VM's `spec` (asc = smallest first,
        desc = largest first); they complement the matching `?min_cpus=` /
        `?max_cpus=` / `?min_ram_mb=` / `?max_ram_mb=` / `?min_disk_gb=` /
        `?max_disk_gb=` range filters so the same capacity-audit query can
        be sorted as well as filtered. `ip` is a numeric IP-address sort on
        the runtime `vm.ip` field — parsed as `net.IP` and compared
        byte-wise on the canonical 16-byte form so `192.168.100.2` sorts
        before `192.168.100.10` rather than lexicographically; VMs with an
        empty or unparseable IP (stopped, no DHCP lease, no static IP) sink
        to the tail in ascending order and the head in descending order,
        mirroring the nil-trailing semantics on the schedule
        `last_fired_at` / `next_fire_at` sort axes. It is the symmetric
        sort counterpart to the `?ip=` filter so the same runtime-IP cohort
        can be both sorted and narrowed. `image` (5.4.88) is a
        case-insensitive sort on `spec.image` mirroring the
        case-insensitive `?image=` exact-match filter contract (5.4.22) so
        the same base-image cohort can be both filtered and sorted on the
        same column; VMs with an empty `spec.image` sink to the tail in
        ascending order and the head in descending order, mirroring the
        nil-trailing semantics on every other nullable sort axis (ip,
        guest_ip, last_fired_at, last_delivery_at, actor).
        `default_user` (5.4.91) is a case-insensitive sort on
        `spec.default_user` mirroring the case-insensitive
        `?default_user=` exact-match filter contract (5.4.23); unlike
        every other nullable axis it resolves an empty stored value to
        `root` so empty VMs collate with explicit-root VMs in
        alphabetical order rather than sinking to the tail — matches the
        runtime semantics in `internal/vm/lifecycle.go` and the
        empty-means-root filter contract. `gpu` (5.7.13) is a
        lexicographic sort on the VM's smallest assigned GPU PCI address,
        normalised to the canonical long form (`0000:01:00.0`) before
        compare so a VM persisted with the short form (`01:00.0`)
        collates identically; symmetric sort counterpart to the
        `?gpu=` filter (5.7.9) so the same passthrough cohort can be
        both filtered and sorted on the same column. VMs with no
        requested GPUs sink to the tail in ascending order and the head
        in descending order, mirroring the nil-trailing semantics on
        every other nullable axis (ip, guest_ip, image, actor,
        last_fired_at, last_delivery_at). `os_type` (5.4.100) is a
        case-insensitive sort on the VM's *effective* OS family via
        `VMSpec.ResolvedOSType`, the symmetric sort counterpart to the
        case-insensitive `?os_type=` exact-match filter (5.6.8) so the
        same OS-family cohort can be both filtered and sorted on the
        same column. Alphabetical: `linux` < `windows`. Diverges from
        the nil-trailing convention because os_type has a documented
        default — an empty stored `spec.os_type` resolves to `linux`
        (mirrors the `?os_type=linux` empty-means-linux filter contract
        and the runtime semantics in `lifecycle.go`) so empty VMs
        collate with explicit-linux VMs rather than sinking to the tail,
        mirroring the `default_user` documented-default rationale
        (5.4.91). `firmware` (5.4.101) is a case-insensitive sort on
        the VM's *effective* firmware via the `resolveFirmware` helper,
        the symmetric sort counterpart to the case-insensitive
        `?firmware=` exact-match filter (5.4.68) so the same firmware
        cohort can be both filtered and sorted on the same column.
        Alphabetical: `bios` < `ovmf` < `uefi`. Diverges from the
        nil-trailing convention because firmware has a documented
        default — an empty stored `spec.firmware` resolves to `bios`
        (mirrors the `?firmware=bios` empty-means-bios filter contract
        and the SeaBIOS default surfaced through
        `ResolvedFirmwareAttr`) so empty VMs collate with explicit-bios
        VMs rather than sinking to the tail, mirroring the `os_type`
        documented-default rationale (5.4.100) and the `default_user`
        rationale (5.4.91). `os_variant` (5.4.103) is a case-insensitive
        sort on `spec.os_variant` mirroring the case-insensitive
        `?os_variant=` exact-match filter (5.4.66) so the same Windows
        edition cohort can be both filtered and sorted on the same
        column. Unlike `os_type` (5.4.100) and `firmware` (5.4.101) it
        has NO documented default — an empty stored value means
        "operator did not specify an edition" (typically Linux guests
        where the field is genuinely absent), so empty VMs sink to the
        tail in ascending order and the head in descending order,
        mirroring the nil-trailing semantics on `image` / `gpu` / `ip`
        rather than collapsing to a default. Alphabetical Windows
        edition ordering: `windows-10` < `windows-11` <
        `windows-server-2019` < `windows-server-2022` <
        `windows-server-2025`. `disk_bus` (5.4.104) is a case-insensitive
        sort on the VM's *effective* system-disk bus via
        `VMSpec.ResolvedDiskBus`, the symmetric sort counterpart to the
        case-insensitive `?disk_bus=` exact-match filter so the same
        disk-bus cohort can be both filtered and sorted on the same
        column. Alphabetical: `sata` < `virtio`. Diverges from the
        nil-trailing convention because disk_bus has a documented
        OS-family-aware default — an empty stored `spec.disk_bus`
        resolves to `virtio` for Linux guests and `sata` for Windows
        guests (mirrors the `?disk_bus=virtio` empty-defaults-to-
        OS-family filter contract and the runtime semantics in
        `lifecycle.go`) so empty VMs collate with explicit-bus VMs of
        the same OS family rather than sinking to the tail. Same
        documented-default rationale as the `firmware` axis (5.4.101)
        and the `os_type` axis (5.4.100), though the resolved value
        here depends on the VM's OS family rather than being a
        constant. An explicit `spec.disk_bus` always wins over the
        OS-family default, so a Windows guest flipped to virtio after
        the operator installs the virtio-blk drivers in-guest via
        5.6.12 collates with the virtio cohort. `nic_model` (5.4.105)
        is a case-insensitive sort on the VM's *effective* NIC model
        via `VMSpec.ResolvedNICModel`, the symmetric sort counterpart
        to the case-insensitive `?nic_model=` exact-match filter so
        the same NIC-model cohort can be both filtered and sorted on
        the same column. Alphabetical: `e1000e` < `virtio`. Diverges
        from the nil-trailing convention because nic_model has a
        documented OS-family-aware default — an empty stored
        `spec.nic_model` resolves to `virtio` for Linux guests and
        `e1000e` for Windows guests (mirrors the `?nic_model=virtio`
        empty-defaults-to-OS-family filter contract and the runtime
        semantics in `lifecycle.go`) so empty VMs collate with
        explicit-model VMs of the same OS family rather than sinking
        to the tail. Same OS-family-aware default rationale as the
        `disk_bus` axis (5.4.104), though the resolved value here
        depends on the VM's OS family rather than being a constant.
        An explicit `spec.nic_model` always wins over the OS-family
        default, so a Windows guest flipped to virtio after the
        operator installs the virtio-net drivers in-guest via 5.6.12
        collates with the virtio cohort. `machine` (5.4.107) is a
        case-sensitive sort on the VM's *effective* libvirt machine
        type via `VMSpec.ResolvedMachine`, the symmetric sort
        counterpart to the case-sensitive `?machine=` exact-match
        filter so the same machine-type cohort can be both filtered
        and sorted on the same column. Diverges from the nil-trailing
        convention because machine has a documented default — an
        empty stored `spec.machine` resolves to the daemon default
        `pc-q35-6.2` via `ResolvedMachine` so empty VMs collate with
        explicit-default VMs rather than sinking to the tail,
        mirroring the `?machine=pc-q35-6.2` empty-defaults-to-default
        filter contract and the documented-default rationale of the
        `firmware` axis (5.4.101). Unlike the closed-and-total enums
        on `disk_bus` / `nic_model`, machine is a free-form
        bounded-alphabet value (`[A-Za-z0-9._-]+`) — `pc-q35-6.2`,
        `q35`, `virt-7.2` — so the compare is case-sensitive,
        preserving the operator's chosen casing and mirroring the
        case-sensitive `?machine=` filter contract on the same
        column. `clock_offset` (5.4.106)
        is a case-insensitive sort on the VM's *effective* clock offset
        via `VMSpec.ResolvedClockOffset`, the symmetric sort counterpart
        to the case-insensitive `?clock_offset=` exact-match filter
        (5.4.72) so the same clock-offset cohort can be both filtered
        and sorted on the same column. Alphabetical: `localtime` <
        `utc`. Diverges from the nil-trailing convention because
        clock_offset has a documented OS-family-aware default — an
        empty stored `spec.clock_offset` resolves to `utc` for Linux
        guests and `localtime` for Windows guests (mirrors the
        `?clock_offset=utc` empty-defaults-to-OS-family filter
        contract and the runtime semantics in `lifecycle.go`) so
        empty VMs collate with explicit-offset VMs of the same OS
        family rather than sinking to the tail. Same documented-default
        rationale as the `disk_bus` axis (5.4.104) and the `nic_model`
        axis (5.4.105), though the resolved value depends on the VM's
        OS family rather than being a constant. An explicit
        `spec.clock_offset` always wins over the OS-family default,
        so a Windows guest pinned to utc for an NTP-synced fleet
        appears under the utc cohort rather than the localtime cohort.
        `auto_start` (5.4.108) is a boolean sort axis on
        `spec.auto_start`, the symmetric sort counterpart to the
        tristate `?auto_start=true|false` exact-match filter on the
        same column so the same auto-start cohort can be both
        filtered and sorted on the same column. Asc collates the
        disabled cohort (`false`) at the head and the enabled cohort
        (`true`) at the tail; desc surfaces the auto-starting cohort
        operators care about at boot first. The column is a
        non-nullable boolean — a missing `spec.auto_start` key on
        the wire is treated as the zero value (`false`) — so the
        classification is closed-and-total and the axis has no
        nil-trailing bucket, mirroring the `state` enum sort
        rationale rather than the nullable string axes `ip` /
        `image` / `gpu` that sink empty stored values to the tail.
        `locked` (5.4.109) is a boolean sort axis on
        `spec.locked` (the delete-protection flag), the symmetric
        sort counterpart to the tristate `?locked=true|false`
        exact-match filter on the same column so the same
        delete-protection cohort can be both filtered and sorted
        on the same column. Asc collates the unlocked cohort
        (`false`) at the head and the locked cohort (`true`) at
        the tail; desc surfaces the locked cohort first, the
        natural ordering for the safety-review operator query
        *"which VMs are delete-protected against a fleet
        rebuild"*. Closed-and-total — `spec.locked` is
        non-nullable (`json:"locked"` without `omitempty`) so a
        missing key resolves to the zero value (`false`) and
        every VM belongs to exactly one of the two buckets, with
        no nil-trailing bucket — same rationale as the
        `auto_start` axis (5.4.108) and the `state` axis on the
        closed running/stopped/paused enum.
        `nat_static_ip` (5.4.110) is a numeric IP sort axis on
        the IP portion of `spec.nat_static_ip` (the configured
        static NAT address — stored as CIDR `192.168.100.10/24`
        but the sort key strips the suffix so the comparator sees
        a bare address). The symmetric sort counterpart to the
        `?nat_static_ip=` exact-match filter (5.4.79) which
        accepts the filter as either the full CIDR or just the
        IP portion. Compared byte-wise on the canonical 16-byte
        `To16()` form via `compareVMIP` so `192.168.100.2` sorts
        before `192.168.100.10` instead of lexicographically.
        VMs with an empty or unparseable `nat_static_ip`
        (DHCP-assigned) sink to the tail of `asc` and the head of
        `desc`, mirroring the nil-trailing semantics on the
        `ip` sort axis and the empty-stored-excludes contract on
        the `?nat_static_ip=` filter — same nil-trailing rationale
        as the nullable string axes `ip` / `image` / `gpu` /
        `actor`, unlike the closed-and-total boolean axes
        `auto_start` / `locked` that have no nil-trailing bucket.
        `nat_gateway` (5.4.111) is a numeric IP sort axis on
        `spec.nat_gateway` (the configured NAT gateway IP — a bare
        IP, no CIDR dual-form like `nat_static_ip`). The symmetric
        sort counterpart to the `?nat_gateway=` exact-match filter
        (5.4.80) so the same gateway cohort can be both filtered
        and sorted on the same column. Compared byte-wise on the
        canonical 16-byte `To16()` form via `compareVMIP` so
        `192.168.100.2` sorts before `192.168.100.10` instead of
        lexicographically — same numeric IP comparator as the
        `ip` and `nat_static_ip` sort axes. VMs with an empty or
        unparseable `nat_gateway` (no explicit gateway override)
        sink to the tail of `asc` and the head of `desc`,
        mirroring the nil-trailing semantics on the `ip` /
        `nat_static_ip` sort axes and the empty-stored-excludes
        contract on the `?nat_gateway=` filter.
        All comparators tiebreak on `id` so pagination is deterministic
        across backends.
      schema:
        type: string
        enum: [id, name, created_at, state, cpus, ram_mb, disk_gb, ip, image, default_user, gpu, os_type, firmware, os_variant, disk_bus, nic_model, machine, clock_offset, auto_start, locked, nat_static_ip, nat_gateway]
        default: id
    ImageSort:
      name: sort
      in: query
      description: |
        Field to sort the image list by. Defaults to `id`. Unknown values
        return 400 `invalid_sort`. All comparators tiebreak on `id` so
        pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, size, created_at]
        default: id
    SnapshotSort:
      name: sort
      in: query
      description: |
        Field to sort the snapshot list by. Defaults to `id`. Within a single
        VM the snapshot ID is `<vmID>/<name>` so id-asc is identical to
        name-asc. Unknown values return 400 `invalid_sort`. All comparators
        tiebreak on `name` so pagination is deterministic across backends.
      schema:
        type: string
        enum: [id, name, created_at]
        default: id
    TemplateSort:
      name: sort
      in: query
      description: |
        Field to sort the template list by. Defaults to `id`. Unknown
        values return 400 `invalid_sort`. `cpus`, `ram_mb`, and `disk_gb`
        are numeric capacity axes on the template (asc = smallest first,
        desc = largest first); they complement the matching `?min_cpus=` /
        `?max_cpus=` / `?min_ram_mb=` / `?max_ram_mb=` / `?min_disk_gb=` /
        `?max_disk_gb=` range filters so the same capacity-audit query can
        be sorted as well as filtered on the template cohort. `image`
        (5.4.89) is the symmetric sort counterpart to the `?image=`
        exact-match filter, using the same case-insensitive comparator —
        operators paste base-image names verbatim from the images
        directory (`rocky9.qcow2`, `Rocky9.qcow2`) and a case-sensitive
        comparator would split the rocky9 cohort across multiple
        buckets. Templates with an empty `image` sort to the tail of
        `asc` / head of `desc`, mirroring the nil-trailing semantics on
        every other nullable sort axis. `default_user` (5.4.92) is the
        symmetric sort counterpart to the `?default_user=` exact-match
        filter, using the same case-insensitive comparator. Diverges
        from the VM list `default_user` sort axis (5.4.91) which
        collapses empty → "root": templates store an empty
        `default_user` as "use the image's built-in user" (e.g.
        cloud-init's `cloud-user` / `ec2-user` / `ubuntu`), not root.
        So templates with an empty `default_user` sort to the tail of
        `asc` / head of `desc`, mirroring the nil-trailing semantics
        on the template `image` axis (5.4.89). `os_type` (5.4.102) is
        the symmetric sort counterpart to the case-insensitive
        `?os_type=` exact-match filter — case-insensitive alphabetical
        compare on the two-member enum (`linux` < `windows`). Diverges
        from the nil-trailing convention on `image` / `default_user`
        because this column has a documented default: an empty stored
        `os_type` resolves to `linux` via `VMTemplate.ResolvedOSType`
        (mirrors `VMSpec.ResolvedOSType` and the `?os_type=linux`
        empty-means-linux filter contract) so empty templates collate
        with explicit-linux templates rather than sinking to the tail.
        Same documented-default rationale as the VM list `os_type`
        axis (5.4.100). All comparators tiebreak on `id` so paginated
        requests return the same set across two independent fetches.
      schema:
        type: string
        enum: [id, name, created_at, cpus, ram_mb, disk_gb, image, default_user, os_type]
        default: id
    SortOrder:
      name: order
      in: query
      description: |
        Sort direction. Defaults to `asc`. Unknown values return 400
        `invalid_order`.
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
  responses:
    APIError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
  schemas:
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    Protocol:
      type: string
      enum: [tcp, udp]
    VMState:
      type: string
      enum: [creating, running, stopped, paused, deleted, unknown]
    NetworkMode:
      type: string
      enum: [nat, macvtap, bridge]
    NetworkAttachment:
      type: object
      properties:
        name:
          type: string
        mode:
          $ref: '#/components/schemas/NetworkMode'
        host_interface:
          type: string
        bridge:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        mac_address:
          type: string
    VMSpec:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        template_id:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        cloud_init_file:
          type: string
        ssh_pub_key:
          type: string
        default_user:
          type: string
        os_type:
          type: string
          enum: [linux, windows]
          description: >-
            Guest OS family. Empty/omitted means "linux". Windows guests get a
            Windows-tuned domain XML (SATA system disk, e1000e NIC, localtime
            clock, Hyper-V enlightenments, USB tablet, QXL video, and an
            attached virtio-win driver ISO when configured) and are provisioned
            via a cloudbase-init NoCloud datasource instead of cloud-init.
            Windows guests require at least 2048 MB RAM and 32 GB disk.
        os_variant:
          type: string
          enum: [windows-10, windows-11, windows-server-2019, windows-server-2022, windows-server-2025]
          description: >-
            Specific Windows edition (advisory metadata). Only meaningful when
            os_type is "windows".
        admin_password:
          type: string
          description: >-
            Windows local Administrator password injected into the
            cloudbase-init datasource at first boot. Write-only: it is redacted
            from the stored/returned VM record once the provisioning ISO is
            written. Ignored for Linux guests.
        clock_offset:
          type: string
          enum: [utc, localtime]
          description: >-
            Override the libvirt domain `<clock offset='...'>`. Empty/omitted
            resolves to the OS-family default (utc for Linux, localtime for
            Windows). Lets operators pin "utc" on Windows guests synced with
            an NTP-driven Linux fleet, or "localtime" on a dual-boot Linux
            guest sharing an RTC with Windows. Any other value returns
            400 `invalid_clock_offset`.
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: When true, the daemon starts this VM automatically at boot.
        locked:
          type: boolean
          description: When true, the VM is delete-protected. Stop/start/restart still work.
        disk_bus:
          type: string
          enum: [virtio, sata]
          description: >-
            Per-VM system-disk bus override. Empty/omitted resolves to the
            OS-family default (virtio for Linux, sata for Windows). When set
            on a Windows guest, the cdrom slot is moved to sdb so the
            virtio system disk takes vda; when set on a Linux guest the
            cdrom moves back to sda. Any other value returns 400
            `invalid_disk_bus`. Baked at create time.
        nic_model:
          type: string
          enum: [virtio, e1000e]
          description: >-
            Per-VM NIC model override applied to every `<interface>` entry
            (primary NAT + extras). Empty/omitted resolves to the OS-family
            default (virtio for Linux, e1000e for Windows). Operators who
            have installed the virtio-net drivers in a Windows guest can
            pin "virtio" here for throughput. Any other value returns 400
            `invalid_nic_model`.
        machine:
          type: string
          description: >-
            Libvirt machine type override (e.g. `pc-q35-rhel9.6.0`).
            Empty/omitted resolves to vmsmith's default (`pc-q35-6.2`).
            Only letters, digits, dots, hyphens, and underscores are
            allowed; anything else returns 400 `invalid_machine`.
        firmware:
          type: string
          enum: [bios, uefi, ovmf]
          description: >-
            Firmware override. "bios" (default) emits no firmware
            attribute and falls back to SeaBIOS; "uefi" and "ovmf" both
            resolve to libvirt's `firmware='efi'` shorthand, which
            auto-picks the host's OVMF code/vars pair. Required for
            Windows 11. Does NOT enable Secure Boot or attach a virtual
            TPM (tracked separately under roadmap 5.6.9). Any other value
            returns 400 `invalid_firmware`.
        virtio_win_iso:
          type: string
          description: >-
            Per-VM virtio-win driver ISO path. Overrides the daemon-wide
            `storage.virtio_win_iso` config for this Windows VM only;
            ignored for Linux guests. If the override path is missing on
            the daemon host the resolver logs a warning and falls back to
            the daemon config / probe. The guest still boots without an
            ISO (SATA + e1000e work natively); the ISO is only required
            in-guest to install virtio drivers.
        gpus:
          type: array
          items:
            type: string
          description: >-
            Host PCI GPU addresses to pass through to this VM via VFIO, in
            the long ("0000:01:00.0") or short ("01:00.0") form. Discover
            assignable GPUs via GET /host/gpus. vmsmith attaches each
            requested GPU together with the rest of its IOMMU group (the GPU
            plus, typically, its HDMI audio function) as managed='yes'
            <hostdev> entries. The host must have IOMMU enabled
            (intel_iommu=on / amd_iommu=on) and the GPU must not be driving
            the host console. Invalid addresses return 400 `invalid_gpu`.
            See docs/GPU_PASSTHROUGH.md.
    VMUpdateSpec:
      type: object
      properties:
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        nat_static_ip:
          type: string
        nat_gateway:
          type: string
        auto_start:
          type: boolean
          description: Toggle auto-start at daemon boot. Omit to leave unchanged.
          nullable: true
        locked:
          type: boolean
          description: Toggle delete-protection. Omit to leave unchanged.
          nullable: true
        clock_offset:
          type: string
          enum: [utc, localtime, ""]
          nullable: true
          description: >-
            Override the libvirt domain `<clock offset='...'>` on an existing
            VM. Allowed values are `utc` / `localtime` (case-insensitive). An
            explicit empty string clears the override so the OS-family default
            (utc for Linux, localtime for Windows) applies again at next
            render. Omit (null) to leave unchanged. Applying a change
            triggers a domain redefine + VM restart, mirroring the cpus /
            ram_mb change path. Any other value returns 400
            `invalid_clock_offset`.
        os_type:
          type: string
          nullable: true
          description: >-
            **Immutable.** Sending any value (including the empty string)
            returns 400 `os_type_immutable` — the guest OS family is baked at
            create time because it drives the device profile (disk bus, NIC
            model, clock, Hyper-V, video, provisioning datasource).
        os_variant:
          type: string
          nullable: true
          description: >-
            **Immutable.** Sending any value returns 400 `os_type_immutable`;
            capture os_variant at create time. Use the dedicated `os_type` /
            `os_variant` create endpoint to express variant changes by cloning
            a new VM from the same base image.
        disk_bus:
          type: string
          enum: [virtio, sata, ""]
          nullable: true
          description: >-
            Switch the system-disk bus on an existing VM (roadmap 5.6.12
            switch-to-virtio helper). Allowed values are `virtio` / `sata`
            (case-insensitive). An explicit empty string clears the override
            so the OS-family default (virtio for Linux, sata for Windows)
            applies again at next render. Omit (null) to leave unchanged.
            Applying a change triggers a domain redefine and restarts the VM
            if it was running. Any other value returns 400 `invalid_disk_bus`.
            Pair with `nic_model` to switch a Windows guest fully to virtio
            after installing the virtio drivers in-guest.
        nic_model:
          type: string
          enum: [virtio, e1000e, ""]
          nullable: true
          description: >-
            Switch the NIC model on every libvirt `<interface>` entry on an
            existing VM (the primary NAT interface plus any additional
            macvtap / bridge / nat attachments). Allowed values are
            `virtio` / `e1000e` (case-insensitive). An explicit empty
            string clears the override so the OS-family default (virtio
            for Linux, e1000e for Windows) applies again at next render.
            Omit (null) to leave unchanged. Applying a change triggers a
            domain redefine and restarts the VM if it was running. Any
            other value returns 400 `invalid_nic_model`.
        gpus:
          type: array
          items:
            type: string
          description: >-
            **Immutable post-create.** GPU passthrough is configured only on
            create via `VMSpec.gpus`; PATCH rejects `gpus` with 400
            `gpus_immutable`, and clone clears any inherited GPU assignment so
            passthrough devices are not silently shared across VMs. This
            avoids disruptive IOMMU-group rebinding on an existing VM.
    VM:
      type: object
      required: [id, name, spec, state, disk_path, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        spec:
          $ref: '#/components/schemas/VMSpec'
        state:
          $ref: '#/components/schemas/VMState'
        ip:
          type: string
        nat_mac:
          type: string
        disk_path:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        generated_admin_password:
          type: string
          description: |
            One-time Windows Administrator password that vmsmith generated
            because the create request set `os_type: windows` without
            supplying `admin_password`. Returned **only** on `POST /vms` and
            **only** for that path — `GET /vms/{id}` and `GET /vms` never
            return this field. The value is shown exactly once so the
            operator can copy it before the response is discarded; vmsmith
            does not store it anywhere recoverable. Surfaced as a CLI banner
            (`vmsmith vm create`) and a one-time-reveal modal in the GUI.
            For non-Windows guests, Windows guests with an explicit
            `admin_password`, and any non-create response this field is
            absent.
    CloneVMRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    BulkVMActionRequest:
      type: object
      required: [action, ids]
      properties:
        action:
          type: string
          enum: [start, stop, delete, restart, force-stop, reboot, suspend, resume]
          description: |
            Lifecycle verb to apply to every VM in `ids`. Maps 1:1 to the
            single-VM endpoints — e.g. `restart` is a graceful stop+start,
            `reboot` issues an in-guest ACPI reboot without power-cycling
            QEMU, `force-stop` is an immediate destroy that skips ACPI,
            `suspend`/`resume` pause/unpause CPU+memory.
        ids:
          type: array
          minItems: 1
          items:
            type: string
    BulkVMActionResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    BulkVMActionResponse:
      type: object
      required: [action, results]
      properties:
        action:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkVMActionResult'
    UpdatePortRequest:
      type: object
      description: |
        Editable metadata for an existing port forwarding rule. Currently
        `description` and `tags` are editable; the underlying iptables
        5-tuple (host_port/guest_port/guest_ip/protocol) is immutable. Both
        fields use JSON-pointer style optionals — omit a key to leave its
        value unchanged. Pass `description: ""` to clear the description;
        pass `tags: []` to clear the tag set.
      properties:
        description:
          type: string
          maxLength: 256
          description: Free-form label (max 256 chars). Pass `""` to clear.
        tags:
          type: array
          description: |
            Replace the rule's tag set with this list. Tags are normalised
            (lowercased, deduplicated, alphabetised; 1-32 chars; pattern
            `[a-z0-9][a-z0-9._:-]*`). Pass `[]` to clear; omit the key to
            leave the existing tag set unchanged.
          items:
            type: string
    BulkDeletePortsRequest:
      type: object
      description: |
        Selector for the port forwards to delete. Exactly one of `ids` or
        `protocol` must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present.
      properties:
        ids:
          type: array
          description: Explicit list of port-forward IDs to delete.
          items:
            type: string
        protocol:
          type: string
          enum: [tcp, udp]
          description: Match every port forward on this VM with this protocol.
    BulkDeletePortsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeletePortResult'
    BulkDeletePortResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteSnapshotsRequest:
      type: object
      description: |
        Selector for the snapshots to delete. Exactly one of `names` or `prefix`
        must be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present.
      properties:
        names:
          type: array
          description: Explicit list of snapshot names to delete.
          items:
            type: string
        prefix:
          type: string
          description: Match every snapshot whose name starts with this prefix.
    BulkDeleteSnapshotsResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteSnapshotResult'
    BulkDeleteSnapshotResult:
      type: object
      required: [name, success]
      properties:
        name:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteImagesRequest:
      type: object
      description: |
        Selector for the images to delete. Exactly one of `ids` or `tag` must
        be set; the request is rejected with HTTP 400 `invalid_bulk_request`
        when both or neither are present. Tag matching is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of image IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every image whose tag list contains this tag (case-insensitive).
    BulkDeleteImagesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteImageResult'
    BulkDeleteImageResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteTemplatesRequest:
      type: object
      description: |
        Selector for the templates to delete. Exactly one of `ids` or `tag`
        must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present. Tag matching
        is case-insensitive.
      properties:
        ids:
          type: array
          description: Explicit list of template IDs to delete.
          items:
            type: string
        tag:
          type: string
          description: Match every template whose tag list contains this tag (case-insensitive).
    BulkDeleteTemplatesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteTemplateResult'
    BulkDeleteTemplateResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    BulkDeleteWebhooksRequest:
      type: object
      description: |
        Selector for the webhooks to delete. Exactly one of `ids` or
        `event_type` must be set; the request is rejected with HTTP 400
        `invalid_bulk_request` when both or neither are present.

        The `event_type` selector matches webhooks whose `event_types`
        filter list contains this exact value. Catch-all webhooks
        (empty `event_types`) are NOT swept by the categorical selector
        — delete them by id.
      properties:
        ids:
          type: array
          description: Explicit list of webhook IDs to delete.
          items:
            type: string
        event_type:
          type: string
          description: Match every webhook whose event_types filter contains this exact event type.
    BulkDeleteWebhooksResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteWebhookResult'
    BulkDeleteWebhookResult:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
    TopVMItem:
      type: object
      required: [vm_id, name, state, value]
      properties:
        vm_id:
          type: string
        name:
          type: string
        state:
          type: string
        value:
          type: number
          format: double
        sample:
          $ref: '#/components/schemas/MetricSample'
    TopVMResponse:
      type: object
      required: [metric, limit, state, items]
      properties:
        metric:
          type: string
          enum: [cpu, mem, disk_read, disk_write, net_rx, net_tx]
        limit:
          type: integer
        state:
          type: string
          enum: [running, all]
        items:
          type: array
          items:
            $ref: '#/components/schemas/TopVMItem'
    Snapshot:
      type: object
      required: [id, vm_id, name, created_at]
      properties:
        id:
          type: string
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
          description: Optional free-text description (max 1024 chars).
        tags:
          type: array
          items:
            type: string
          description: |
            Operator-supplied labels.  Lowercased, deduplicated, and
            alphabetised server-side using the shared tag alphabet
            (1-32 chars, `[a-z0-9][a-z0-9._:-]*`).  Persisted out of band
            from the libvirt snapshot XML (the domainsnapshot schema does
            not permit `<metadata>`); the wire shape is identical to the
            tags array on every other tagged resource.
        created_at:
          type: string
          format: date-time
    CreateSnapshotRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          maxLength: 1024
          description: Optional free-text description for this snapshot.
        tags:
          type: array
          items:
            type: string
          description: |
            Optional tag list.  Lowercased + deduped + alphabetised server-side
            using the shared `[a-z0-9][a-z0-9._:-]*` tag alphabet.
    UpdateSnapshotRequest:
      type: object
      description: |
        Editable metadata for an existing snapshot. The snapshot's
        underlying disk and memory state, parent pointer, and creation
        timestamp are immutable.

        Field semantics:
          * `description` nil/missing = leave as-is; explicit empty
            string clears the description.
          * `tags` nil/missing = leave as-is; explicit empty array
            (`[]`) clears every tag.
      properties:
        description:
          type: string
          nullable: true
          maxLength: 1024
          description: New description for the snapshot. Empty string clears.
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: New tag list. Empty array clears every tag.
    AddPortRequest:
      type: object
      required: [host_port, guest_port]
      properties:
        host_port:
          type: integer
        guest_port:
          type: integer
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          maxLength: 256
          description: Optional free-form label for the rule (e.g. "web", "metrics scrape").
        tags:
          type: array
          description: |
            Optional free-form tags. Normalised on save (lowercased,
            deduplicated, alphabetised; 1-32 chars per tag; pattern
            `[a-z0-9][a-z0-9._:-]*`).
          items:
            type: string
    PortForward:
      type: object
      required: [id, vm_id, host_port, guest_port, guest_ip, protocol]
      properties:
        id:
          type: string
        vm_id:
          type: string
        host_port:
          type: integer
        guest_port:
          type: integer
        guest_ip:
          type: string
        protocol:
          $ref: '#/components/schemas/Protocol'
        description:
          type: string
          description: Optional free-form label for the rule.
        tags:
          type: array
          description: |
            Normalised tag list (lowercased, deduplicated, alphabetised).
          items:
            type: string
    ConsoleTicket:
      type: object
      required: [ticket, expires_at, websocket_url]
      properties:
        ticket:
          type: string
          description: Single-use opaque token; pass to the websocket endpoint.
        expires_at:
          type: string
          format: date-time
        websocket_url:
          type: string
          description: Path the client should dial after upgrading to a websocket.
    Image:
      type: object
      required: [id, name, path, size_bytes, format, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
        format:
          type: string
        source_vm:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateImageRequest:
      type: object
      required: [vm_id, name]
      properties:
        vm_id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
    UpdateImageRequest:
      type: object
      properties:
        description:
          type: string
          description: New description. An empty string is treated as "no change".
        tags:
          type: array
          description: Replacement tag set. A null/omitted field leaves tags unchanged; an empty array clears all tags.
          items:
            type: string
    VMTemplate:
      type: object
      required: [id, name, image, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        os_type:
          type: string
          enum: [linux, windows]
          description: |
            Guest OS family pinned by this template. Empty / unset resolves
            to `linux` via `VMTemplate.ResolvedOSType` and is inherited by
            VMs created from the template when their own `os_type` is
            empty. Mirrors `VMSpec.os_type` semantics.
        os_variant:
          type: string
          description: |
            Optional Windows variant carried alongside `os_type=windows`
            (`windows-10`, `windows-11`, `windows-server-2019/2022/2025`).
            Advisory metadata; inherited by derived VMs when empty.
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateTemplateRequest:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        cpus:
          type: integer
        ram_mb:
          type: integer
        disk_gb:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        default_user:
          type: string
        os_type:
          type: string
          enum: [linux, windows]
          description: |
            Optional guest OS family (`linux` default, or `windows`).
            Case-insensitive; lowercased on store. Inherited by derived VMs.
        os_variant:
          type: string
          description: |
            Optional Windows variant; case-insensitive, lowercased on
            store. Inherited by derived VMs when not overridden.
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttachment'
    UpdateTemplateRequest:
      type: object
      description: |
        Partial update for an existing template. An empty `description`
        means "no change"; a missing `tags` field means "no change",
        while an explicit empty `tags` array clears the tag set.
      properties:
        description:
          type: string
        tags:
          type: array
          nullable: true
          items:
            type: string
    HostInterface:
      type: object
      required: [name, ips, mac, is_up, is_physical]
      properties:
        name:
          type: string
        ips:
          type: array
          items:
            type: string
        mac:
          type: string
        is_up:
          type: boolean
        is_physical:
          type: boolean
    GPUDevice:
      type: object
      required: [address, vendor_id, device_id, vendor, class, iommu_group]
      properties:
        address:
          type: string
          description: PCI address in canonical form, e.g. "0000:01:00.0".
        vendor_id:
          type: string
          description: Raw 0x-prefixed PCI vendor id, e.g. "0x10de".
        device_id:
          type: string
          description: Raw 0x-prefixed PCI device id, e.g. "0x2704".
        vendor:
          type: string
          description: Human-readable vendor name (NVIDIA / AMD / Intel) or the raw id.
        class:
          type: string
          description: Raw PCI class code, e.g. "0x030000" (VGA controller).
        driver:
          type: string
          description: >-
            Kernel driver currently bound to the device ("nvidia",
            "vfio-pci", "" when unbound).
        iommu_group:
          type: integer
          description: IOMMU group number; the whole group is passed through together.
        group_devices:
          type: array
          items:
            type: string
          description: >-
            Every assignable PCI function sharing this device's IOMMU group
            (the GPU plus, typically, its HDMI audio function); bridges
            excluded. These are the addresses vmsmith attaches when this GPU
            is requested.
        boot_vga:
          type: boolean
          description: >-
            True when firmware marked this GPU as the host's primary display
            adapter (`boot_vga=1`). Passing the primary display through will
            usually blank the host console once the VM starts.
    HostResourceUsageSummary:
      type: object
      required: [used, total]
      properties:
        used:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        available:
          type: integer
          format: int64
        percentage:
          type: integer
    HostStats:
      type: object
      required: [vm_count, cpu, ram, disk, event_stream_connections]
      properties:
        vm_count:
          type: integer
        cpu:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        ram:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        disk:
          $ref: '#/components/schemas/HostResourceUsageSummary'
        event_stream_connections:
          type: integer
          format: int64
          description: |
            Number of in-flight Server-Sent Event clients on
            `/api/v1/events/stream`.  Useful for spotting consumer pressure
            and stuck SSE connections.
    QuotaUsageSummary:
      type: object
      required: [used]
      properties:
        used:
          type: integer
        limit:
          type: integer
    QuotaUsage:
      type: object
      required: [vms, cpus, ram_mb, disk_gb, gpus]
      properties:
        vms:
          $ref: '#/components/schemas/QuotaUsageSummary'
        cpus:
          $ref: '#/components/schemas/QuotaUsageSummary'
        ram_mb:
          $ref: '#/components/schemas/QuotaUsageSummary'
        disk_gb:
          $ref: '#/components/schemas/QuotaUsageSummary'
        gpus:
          $ref: '#/components/schemas/QuotaUsageSummary'
          description: |
            Aggregate GPU passthrough allocation (count of host PCI GPU
            functions assigned across all VMs) and its configured
            `quotas.max_total_gpus` cap (`limit: 0` = uncapped). Lines up
            with the existing CPU / RAM / disk quota dimensions; GPU
            assignment is immutable post-create (5.7.4) so PATCH /vms/{id}
            never affects this counter.
    Webhook:
      type: object
      required: [id, url, active, created_at]
      properties:
        id:
          type: string
          example: "wh-1741234567890123"
        url:
          type: string
          format: uri
          example: "https://example.com/hook"
        event_types:
          type: array
          items:
            type: string
          description: Optional event-type filter list (exact match or "prefix.*" glob). Empty = all events.
        description:
          type: string
          maxLength: 1024
          description: >
            Free-form operator label ("Slack notifier for VM crashes",
            "PagerDuty escalations"). Surfaced in the GUI and CLI listings;
            included in the case-insensitive `search` haystack.
        tags:
          type: array
          items:
            type: string
          description: >
            Free-form lowercase tag list for organising webhooks by team or
            purpose ("production", "audit", "slack"). Normalised on
            persistence (trimmed, lowercased, deduplicated, alphabetised);
            included in the case-insensitive `search` haystack and supports
            exact-match filtering via the `?tag=` query parameter.
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_delivery_at:
          type: string
          format: date-time
        last_status:
          type: integer
          description: HTTP status of the most recent successful delivery; 0 if last attempt failed.
        last_error:
          type: string
    WebhookCreateRequest:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
          description: HMAC-SHA256 signing secret. Never returned in responses.
        event_types:
          type: array
          items:
            type: string
        description:
          type: string
          maxLength: 1024
          description: >
            Free-form operator label. Trimmed before persistence; capped at
            1024 characters. Optional.
        tags:
          type: array
          items:
            type: string
          description: >
            Free-form tag list. Normalised on persistence (trimmed,
            lowercased, deduplicated, alphabetised). Each tag must be 1-32
            characters of lowercase letters, numbers, dots, colons,
            underscores, or hyphens. Optional.
    WebhookUpdateSpec:
      type: object
      description: >
        Partial-update payload for `PATCH /webhooks/{id}`.  All fields are
        optional; omit a key to leave the corresponding field unchanged.
        `event_types: []` clears the filter so the webhook matches every
        event; `event_types` omitted leaves the current list intact.
      properties:
        url:
          type: string
          format: uri
          description: Replace the receiver URL.  Must use http or https.
        secret:
          type: string
          description: >
            Rotate the HMAC signing secret.  Empty string is rejected — an
            unsigned webhook would defeat receiver-side verification.
        event_types:
          type: array
          items:
            type: string
          description: Replace the event-type filter list.  Pass `[]` to clear.
        active:
          type: boolean
          description: Toggle delivery on or off without deleting the registration.
        description:
          type: string
          maxLength: 1024
          description: >
            Replace the free-form description. Omit the key to leave it
            unchanged; pass the empty string to clear it.
        tags:
          type: array
          items:
            type: string
          description: >
            Replace the tag list. Omit the key to leave the current list
            unchanged; pass `[]` to clear all tags. Tags are normalised
            (trimmed, lowercased, deduplicated, alphabetised) before
            persistence.
    WebhookTestResult:
      type: object
      required: [success, duration_ms, attempted_at]
      properties:
        success:
          type: boolean
          description: True iff the receiver returned a 2xx HTTP status.
        status_code:
          type: integer
          description: HTTP status code returned by the receiver, if any.
        error:
          type: string
          description: Error message when delivery failed.
        duration_ms:
          type: integer
          format: int64
          description: Round-trip time of the single delivery attempt.
        attempted_at:
          type: string
          format: date-time
        event_id:
          type: string
          description: ID of the synthetic system.webhook_test event used for the probe.
    Schedule:
      type: object
      required: [id, name, action, cron_spec, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          example: "sch-1741234567890123"
        name:
          type: string
          maxLength: 128
        vm_id:
          type: string
          description: >
            Target VM ID. Mutually exclusive with `tag_selector`; when both
            are empty the schedule applies to all VMs.
        tag_selector:
          type: array
          items:
            type: string
          description: >
            Normalised lowercase tag list selecting target VMs by tag.
            Mutually exclusive with `vm_id`.
        action:
          type: string
          enum: [snapshot, start, stop, restart, force-stop, reboot, suspend, resume]
        cron_spec:
          type: string
          description: 6-field cron expression WITH seconds, e.g. "0 0 2 * * *".
          example: "0 0 2 * * *"
        timezone:
          type: string
          description: Optional IANA timezone name (e.g. "America/New_York").
        enabled:
          type: boolean
        catch_up_policy:
          type: string
          enum: [skip, run_once, run_all]
          description: How missed fires after downtime are handled. Default `skip`.
        max_concurrent:
          type: integer
          description: Maximum simultaneous runs of this schedule across resolved VMs.
        retention_count:
          type: integer
          description: For snapshot schedules, how many snapshots to retain.
        params:
          type: object
          additionalProperties: true
          description: Optional action-specific parameters.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_fired_at:
          type: string
          format: date-time
        last_result:
          type: string
        next_fire_at:
          type: string
          format: date-time
    ScheduleRun:
      type: object
      required: [id, schedule_id, vm_id, started_at, status]
      properties:
        id:
          type: string
        schedule_id:
          type: string
        vm_id:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [running, success, error, skipped]
        error:
          type: string
        skip_reason:
          type: string
    CreateScheduleRequest:
      type: object
      required: [name, action, cron_spec]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        vm_id:
          type: string
          description: Mutually exclusive with `tag_selector`.
        tag_selector:
          type: array
          items:
            type: string
          description: Mutually exclusive with `vm_id`.
        action:
          type: string
          enum: [snapshot, start, stop, restart, force-stop, reboot, suspend, resume]
        cron_spec:
          type: string
          description: 6-field cron expression WITH seconds.
          example: "0 0 2 * * *"
        timezone:
          type: string
        enabled:
          type: boolean
          default: true
        catch_up_policy:
          type: string
          enum: [skip, run_once, run_all]
          default: skip
        max_concurrent:
          type: integer
        retention_count:
          type: integer
        params:
          type: object
          additionalProperties: true
    ScheduleUpdateSpec:
      type: object
      description: >
        Partial-update payload for `PATCH /schedules/{id}`. All fields are
        optional; omit a key to leave the corresponding field unchanged. An
        empty body returns 400 `noop_update`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        vm_id:
          type: string
        tag_selector:
          type: array
          items:
            type: string
        action:
          type: string
          enum: [snapshot, start, stop, restart, force-stop, reboot, suspend, resume]
        cron_spec:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        catch_up_policy:
          type: string
          enum: [skip, run_once, run_all]
        max_concurrent:
          type: integer
        retention_count:
          type: integer
        params:
          type: object
          additionalProperties: true
    LogField:
      type: object
      additionalProperties:
        type: string
    LogsResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        total:
          type: integer
    LogEntry:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
        source:
          type: string
        msg:
          type: string
        fields:
          $ref: '#/components/schemas/LogField'
    MetricSample:
      type: object
      required: [timestamp]
      properties:
        timestamp:
          type: string
          format: date-time
        cpu_percent:
          type: number
          format: double
          nullable: true
          description: CPU utilisation percent across all vCPUs (null when unavailable).
        mem_used_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        mem_avail_mb:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          description: Available memory reported by the guest agent (null without it).
        disk_read_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        disk_write_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_rx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        net_tx_bps:
          type: integer
          format: int64
          minimum: 0
          nullable: true
    VMStatsSnapshot:
      type: object
      required: [vm_id, state, history, interval_seconds, history_size]
      properties:
        vm_id:
          type: string
        state:
          type: string
          description: VM state at the time of the response (running, stopped, ...).
        last_sampled_at:
          type: string
          format: date-time
          nullable: true
        current:
          allOf:
            - $ref: '#/components/schemas/MetricSample'
          nullable: true
          description: Most recent sample (mirrors the last entry in `history`).
        history:
          type: array
          items:
            $ref: '#/components/schemas/MetricSample'
          description: Sample history, oldest first.
        interval_seconds:
          type: integer
          minimum: 0
          description: Configured sample interval in seconds.
        history_size:
          type: integer
          minimum: 0
          description: Configured ring buffer capacity (max samples retained).
    Event:
      type: object
      required: [id, type, source, severity, message, occurred_at]
      properties:
        id:
          type: string
          description: Stringified monotonic uint64 assigned by the EventBus.
        type:
          type: string
          description: Event type (e.g., `vm.started`, `vm.created`).
        source:
          type: string
          enum: [libvirt, app, system]
        vm_id:
          type: string
        resource_id:
          type: string
        severity:
          type: string
          enum: [info, warn, error]
        message:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        actor:
          type: string
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          description: Legacy timestamp; prefer `occurred_at` for new code.
