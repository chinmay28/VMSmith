  /vms/{vmID}/snapshots/bulk_delete:
    post:
      tags: [Snapshots]
      summary: Delete multiple snapshots in a single request
      description: |
        Delete a batch of snapshots either by explicit name list or by prefix
        match. Returns a per-target result so partial failures are visible.
        Exactly one of `names` or `prefix` must be provided.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteSnapshotsRequest'
      responses:
        '200':
          description: Per-snapshot delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteSnapshotsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports:
    get:
      tags: [Port Forwards]
      summary: List a VM's port forwards
      description: |
        `sort` accepts `id` (default), `host_port`, `guest_port`, `protocol`, or
        `description`; the description sort is case-insensitive. `order` accepts
        `asc` (default) or `desc`. All comparators tiebreak on `id` so
        repeated requests return a deterministic order.

        `search` is an optional case-insensitive substring filter applied
        before sort across `description`, `protocol`, `host_port`,
        `guest_port`, `guest_ip`, and `tags`. The rule ID (`{vmID}/{host}`)
        and `vm_id` are intentionally excluded from the haystack — they're
        the URL scope or redundant with the host port match.

        `tag` is an optional case-insensitive exact-match filter on the
        rule's tag list. Composes additively with `search` (the tag filter
        is applied first).

        `protocol` is an optional case-insensitive exact-match filter on
        the rule's transport protocol (`tcp` or `udp`). Empty disables;
        anything other than tcp/udp returns 400 `invalid_protocol`.
        Mirrors the bulk_delete `protocol` selector so the filter and
        bulk-action surfaces agree. Composes additively with `tag` and
        `search`.

        `page` and `per_page` paginate the result. Pagination is applied
        after filter + sort so the `X-Total-Count` response header reflects
        the post-filter / pre-pagination population. `limit` is accepted as
        a synonym for `per_page`. Omitting both returns the full filtered
        set, preserving the legacy contract.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: query
          name: sort
          schema:
            type: string
            enum: [id, host_port, guest_port, protocol, description, guest_ip]
            default: id
          required: false
          description: |
            Field to sort by. `guest_ip` uses numeric IP comparison
            (`192.168.100.2` sorts before `192.168.100.10`); rules with an
            empty or unparseable `guest_ip` sink to the tail in `asc` and
            the head in `desc`, mirroring the VM list `ip` sort axis and
            the schedule `last_fired_at` / `next_fire_at` axes.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          required: false
          description: Sort direction.
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: |
            Case-insensitive substring filter applied before sort across
            description, protocol, host_port, guest_port, guest_ip, and
            tags. Leading/trailing whitespace is trimmed.
        - in: query
          name: tag
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the rule's tag list.
            Applied before search + sort; composes additively with search.
        - in: query
          name: protocol
          schema:
            type: string
            enum: [tcp, udp]
          required: false
          description: |
            Case-insensitive exact-match filter on transport protocol.
            Empty disables; anything other than tcp/udp returns 400
            `invalid_protocol`. Composes additively with `tag` and
            `search`.
        - in: query
          name: min_host_port
          schema:
            type: integer
            minimum: 0
          required: false
          description: |
            Inclusive lower bound on the rule's `host_port`. Whitespace-trimmed;
            empty disables the bound; non-numeric or negative values return 400
            `invalid_min_host_port`. Applied after `protocol` and before
            `search`; composes additively with every other filter so
            `X-Total-Count` reflects the post-filter population.
        - in: query
          name: max_host_port
          schema:
            type: integer
            minimum: 0
          required: false
          description: |
            Inclusive upper bound on the rule's `host_port`. Same shape as
            `min_host_port`; non-numeric or negative values return 400
            `invalid_max_host_port`.
        - in: query
          name: min_guest_port
          schema:
            type: integer
            minimum: 0
          required: false
          description: |
            Inclusive lower bound on the rule's `guest_port`. Whitespace-trimmed;
            empty disables the bound; non-numeric or negative values return 400
            `invalid_min_guest_port`. The symmetric counterpart to
            `min_host_port`; applied right after the host-port range and before
            `search`; composes additively with every other filter so
            `X-Total-Count` reflects the post-filter population.
        - in: query
          name: max_guest_port
          schema:
            type: integer
            minimum: 0
          required: false
          description: |
            Inclusive upper bound on the rule's `guest_port`. Same shape as
            `min_guest_port`; non-numeric or negative values return 400
            `invalid_max_guest_port`.
        - in: query
          name: guest_ip
          schema:
            type: string
          required: false
          description: |
            Case-insensitive exact-match filter on the rule's `guest_ip`.
            Whitespace-trimmed; empty disables. Closes the multi-NIC audit
            query *"show me every forward landing on 192.168.100.50"* that
            `search` can only fuzzy-match (`192.168.100.5` also matches when
            searching for `192.168.100.50`). Applied after the guest-port
            range and before `search`; composes additively with every other
            filter so `X-Total-Count` reflects the post-filter population.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Port forward list
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: |
                Total number of port forwards matching the filter +
                search predicates (pre-pagination). Use this to drive
                page indicators on the client.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Port Forwards]
      summary: Add a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPortRequest'
      responses:
        '201':
          description: Port forward created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/bulk_delete:
    post:
      tags: [Port Forwards]
      summary: Delete multiple port forwards in a single request
      description: |
        Delete a batch of port forwards either by explicit ID list or by
        protocol selector (`tcp` / `udp`). Returns a per-target result so
        partial failures are visible. Exactly one of `ids` or `protocol`
        must be provided. The protocol selector is always scoped to the VM
        in the URL — it never deletes another VM's rules.
      parameters:
        - $ref: '#/components/parameters/VMID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeletePortsRequest'
      responses:
        '200':
          description: Per-port-forward delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeletePortsResponse'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/ports/{portID}:
    patch:
      tags: [Port Forwards]
      summary: Update editable metadata on a port forward
      description: |
        Updates the editable metadata on an existing port forwarding rule.
        Today only the `description` is editable; the underlying iptables
        5-tuple (host_port/guest_port/guest_ip/protocol) is intentionally
        immutable. Omit `description` to leave it unchanged; pass `""` to
        clear it.

        The `vmID` in the URL is the authoritative scope: a request that
        targets a port-forward owned by a different VM returns
        `404 resource_not_found` (mirroring the safety property of
        bulk_delete).
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePortRequest'
      responses:
        '200':
          description: Updated port forward
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortForward'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Port Forwards]
      summary: Remove a port forward
      parameters:
        - $ref: '#/components/parameters/VMID'
        - $ref: '#/components/parameters/PortID'
      responses:
        '204':
          description: Port forward removed
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/console/ticket:
    post:
      tags: [Console]
      summary: Issue a single-use console ticket
      description: |
        Returns a short-TTL one-time token the caller passes to the console
        websocket endpoint (forthcoming).  The VM must be in the `running`
        state.  The endpoint returns 503 `service_unavailable` when the
        daemon was started without a console subsystem (e.g. on a host where
        the console feature is disabled in config).
      parameters:
        - $ref: '#/components/parameters/VMID'
      responses:
        '200':
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleTicket'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /vms/{vmID}/console:
    get:
      tags: [Console]
      summary: Proxy the live VM VNC console over websocket
      description: |
        Upgrades the request to a websocket and proxies raw VNC/RFB bytes for a
        running VM. Call `POST /vms/{vmID}/console/ticket` first, then connect
        with the returned short-lived single-use `ticket` query parameter.

        The server negotiates the `binary` websocket subprotocol and bridges
        websocket binary frames to the VM's loopback-only VNC listener. When
        daemon TLS is enabled, callers must use `wss://`; reverse-proxy
        deployments may forward that fact with `X-Forwarded-Proto: https`.
      parameters:
        - $ref: '#/components/parameters/VMID'
        - in: query
          name: ticket
          required: true
          schema:
            type: string
          description: Single-use console ticket issued by `POST /vms/{vmID}/console/ticket`.
      responses:
        '101':
          description: Switching Protocols — websocket proxy established.
        '401':
          $ref: '#/components/responses/APIError'
        '403':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '409':
          $ref: '#/components/responses/APIError'
        '429':
          $ref: '#/components/responses/APIError'
        '502':
          $ref: '#/components/responses/APIError'
        '503':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images:
    get:
      tags: [Images]
      summary: List images
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ImageSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema:
            type: string
          description: Filter to images carrying this tag (case-insensitive).
        - in: query
          name: source_vm
          schema:
            type: string
          description: |
            Case-insensitive exact-match on the image's `source_vm` field —
            i.e. the VM ID the image was exported from. Whitespace is trimmed;
            an empty value disables the filter. Composes additively with
            `tag`, `search`, `sort`, and pagination so `X-Total-Count` reflects
            the post-filter population.
        - in: query
          name: search
          schema:
            type: string
          description: |
            Case-insensitive substring filter on image name, description, and
            tags. Whitespace is trimmed; ID is intentionally excluded so opaque
            `img-<unix-nano>` strings don't produce numeric false positives.
            Composes additively with `tag`, `source_vm`, `sort`, and
            pagination.
        - name: since
          in: query
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the image's
            `created_at`. Images created before this instant are filtered
            out. Whitespace is trimmed; empty disables the filter. Invalid
            values return 400 `invalid_since`. An image with a zero /
            unknown `created_at` is filtered OUT whenever any bound is set
            — operators querying a time window don't want unbounded entries
            silently included. Composes additively with `tag`, `source_vm`,
            `search`, `sort`, and pagination so `X-Total-Count` reflects
            the post-filter population.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the image's
            `created_at`. Images created after this instant are filtered
            out. Whitespace is trimmed; empty disables the filter. Invalid
            values return 400 `invalid_until`. Same zero / unknown /
            additive-composition semantics as `since`.
          schema:
            type: string
            format: date-time
        - name: min_size
          in: query
          required: false
          description: |
            Inclusive lower bound (in bytes) on the image's `size_bytes`.
            Images smaller than this value are filtered out. Whitespace is
            trimmed; empty disables the filter. Non-numeric or negative
            values return 400 `invalid_min_size`. Unlike the time-range
            filters there is no zero-value exclusion — a zero-byte size is a
            legitimate value that matches whenever it falls within the
            window. Composes additively with `tag`, `source_vm`, `search`,
            the time-range bounds, `sort`, and pagination so `X-Total-Count`
            reflects the post-filter population.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: max_size
          in: query
          required: false
          description: |
            Inclusive upper bound (in bytes) on the image's `size_bytes`.
            Images larger than this value are filtered out. Whitespace is
            trimmed; empty disables the filter. Non-numeric or negative
            values return 400 `invalid_max_size`. Same byte-range semantics
            as `min_size`.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: prefix
          in: query
          required: false
          description: |
            Case-sensitive `HasPrefix(img.Name, prefix)` filter on the image
            list. Whitespace is trimmed; empty disables the filter. Mirrors
            the snapshot list `prefix` selector (5.4.75) and the VM list
            `prefix` selector (5.4.76) so the same fleet-audit query
            (`?prefix=rocky-`) round-trips 1:1 across the three name-prefix
            axes operators use most. Composes additively with `tag`,
            `source_vm`, `search`, the byte-range bounds, the time-range
            bounds, `sort`, and pagination so `X-Total-Count` reflects the
            post-filter population.
          schema:
            type: string
      responses:
        '200':
          description: Image list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Images]
      summary: Export a VM to an image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
      responses:
        '201':
          description: Image created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/upload:
    post:
      tags: [Images]
      summary: Upload a qcow2 image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  description: Optional display name override.
                description:
                  type: string
                  description: Optional human-readable description.
                tags:
                  type: array
                  description: Optional tags. Repeat the form field per tag, or pass a single comma-separated value.
                  items:
                    type: string
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        '507':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/bulk_delete:
    post:
      tags: [Images]
      summary: Delete multiple images in a single request
      description: |
        Delete a batch of images either by explicit ID list or by tag selector.
        Returns a per-target result so partial failures (one image missing,
        the rest succeeded) surface in a single response. Exactly one of
        `ids` or `tag` must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteImagesRequest'
      responses:
        '200':
          description: Per-image delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteImagesResponse'
        '400':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/{imageID}:
    patch:
      tags: [Images]
      summary: Update image description and/or tags
      parameters:
        - $ref: '#/components/parameters/ImageID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageRequest'
      responses:
        '200':
          description: Image updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/APIError'
        '404':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
    delete:
      tags: [Images]
      summary: Delete an image
      parameters:
        - $ref: '#/components/parameters/ImageID'
      responses:
        '204':
          description: Image deleted
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /images/{imageID}/download:
    get:
      tags: [Images]
      summary: Download an image file
      parameters:
        - $ref: '#/components/parameters/ImageID'
      responses:
        '200':
          description: Binary image download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates:
    get:
      tags: [Templates]
      summary: List reusable VM templates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/TemplateSort'
        - $ref: '#/components/parameters/SortOrder'
        - in: query
          name: tag
          schema: { type: string }
          description: |
            Case-insensitive filter; only templates carrying this tag are
            returned. Filtering is applied before sort + pagination, so
            X-Total-Count reflects the filtered population.
        - in: query
          name: search
          required: false
          description: |
            Case-insensitive substring filter applied to the template's
            `name`, `description`, and `tags`. The needle is trimmed and
            lowercased before matching. Filtering happens before sort +
            pagination so `X-Total-Count` reflects the post-search
            population. ID, image, default_user, and network attachments
            are intentionally excluded from the haystack — they describe
            what the template produces, not the template itself, and
            including them produces noisy false positives. Mirrors the
            5.4.9 / 5.4.10 / 5.4.11 `search` filter contract.
          schema:
            type: string
        - in: query
          name: image
          required: false
          description: |
            Case-insensitive exact-match filter on the template's `image`
            field. Whitespace is trimmed before comparison; empty value
            disables the filter. Closes the operator query "show me every
            template built from `rocky9.qcow2`" that `?search=` would
            match fuzzily across name / description / tags. Composes
            additively with `?tag=`, `?search=`, `?sort=`, `?order=`, and
            pagination so `X-Total-Count` reflects the post-filter
            population. Mirrors the VMs `?image=` filter (5.4.22).
          schema:
            type: string
        - in: query
          name: default_user
          required: false
          description: |
            Case-insensitive exact-match filter on the template's
            `default_user` field. Whitespace is trimmed before comparison;
            empty value disables the filter. Closes the operator query
            "show me every template that provisions the `deploy` SSH user".
            Unlike the VMs `?default_user=` filter (5.4.23), there is no
            empty-means-root fallback: a template's empty `default_user`
            means "use the image's built-in user", so an empty stored value
            never matches a non-empty query. Composes additively with
            `?tag=`, `?image=`, `?search=`, `?since=`, `?until=`, `?sort=`,
            `?order=`, and pagination so `X-Total-Count` reflects the
            post-filter population.
          schema:
            type: string
        - $ref: '#/components/parameters/OSTypeFilter'
        - $ref: '#/components/parameters/OSVariantFilter'
        - in: query
          name: network
          required: false
          description: |
            Case-insensitive exact-match filter on the name of any of the
            template's additional network attachments (`networks[].name`). A
            template matches when any attachment name equals the value
            (any-of). Whitespace is trimmed before comparison; an empty value
            disables the filter. Closes the operator query "show me every
            template that attaches `data-net`". Mirrors the VMs `?network=`
            filter (5.4.36): the implicit primary NAT network is not
            represented in the template's networks list, so this only scopes
            to explicitly-attached extra networks operators name and group by
            ("data-net", "storage-net"). Composes additively with `?tag=`,
            `?image=`, `?default_user=`, `?search=`, `?since=`, `?until=`,
            `?sort=`, `?order=`, and pagination so `X-Total-Count` reflects
            the post-filter population.
          schema:
            type: string
        - in: query
          name: prefix
          required: false
          description: |
            Case-sensitive `HasPrefix(tpl.name, prefix)` filter (5.4.78).
            A template matches when its `name` starts with this value
            verbatim. Whitespace is trimmed before comparison; an empty
            value disables the filter. The fourth and final member of the
            name-prefix filter family alongside snapshots (5.4.75), VMs
            (5.4.76), and images (5.4.77) so the same cohort-discrimination
            query (`?prefix=rocky9-base-`, `?prefix=web-prod-`,
            `?prefix=auto-nightly-`) round-trips 1:1 across all four
            name-prefix axes operators reach for most. Case-sensitive
            mirrors `strings.HasPrefix` semantics — template names share
            the case-sensitive `[A-Za-z0-9-]` alphabet with VM names.
            Composes additively with `?tag=`, `?image=`, `?default_user=`,
            `?os_type=`, `?os_variant=`, `?network=`, `?search=`,
            `?since=`, `?until=`, `?min_cpus=` / `?max_cpus=`,
            `?min_ram_mb=` / `?max_ram_mb=`, `?min_disk_gb=` /
            `?max_disk_gb=`, `?sort=`, `?order=`, and pagination so
            `X-Total-Count` reflects the post-filter population.
          schema:
            type: string
        - in: query
          name: since
          required: false
          description: |
            RFC3339 timestamp lower bound (inclusive) on the template's
            `created_at`. Templates created before this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_since`. A template
            with a zero / unknown `created_at` is filtered OUT whenever
            any bound is set — operators querying a time window don't
            want unbounded entries silently included. Composes additively
            with `tag`, `image`, `search`, `sort`, and pagination so
            `X-Total-Count` reflects the post-filter population. Mirrors
            the snapshot (5.4.28), image (5.4.29), and VM (5.4.30)
            time-range filters.
          schema:
            type: string
        - in: query
          name: until
          required: false
          description: |
            RFC3339 timestamp upper bound (inclusive) on the template's
            `created_at`. Templates created after this instant are
            filtered out. Whitespace is trimmed; empty disables the
            filter. Invalid values return 400 `invalid_until`. Same zero
            / unknown / additive-composition semantics as `since`.
          schema:
            type: string
        - in: query
          name: min_cpus
          required: false
          description: |
            Inclusive lower bound on the template's `cpus` field.
            Templates with fewer vCPUs are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_min_cpus`. Composes additively with
            every other list filter so `X-Total-Count` reflects the
            post-filter population. Mirrors the VM `?min_cpus=` filter
            (5.4.44) — opens the same capacity-audit query against the
            template cohort.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: max_cpus
          required: false
          description: |
            Inclusive upper bound on the template's `cpus` field.
            Templates with more vCPUs are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_max_cpus`. Same count-range
            semantics as `min_cpus`.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: min_ram_mb
          required: false
          description: |
            Inclusive lower bound on the template's `ram_mb` field.
            Templates with less RAM are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_min_ram_mb`. Composes additively with
            every other list filter so `X-Total-Count` reflects the
            post-filter population. Mirrors the VM `?min_ram_mb=` filter
            (5.4.48) — opens the same capacity-audit query against the
            template cohort.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: max_ram_mb
          required: false
          description: |
            Inclusive upper bound on the template's `ram_mb` field.
            Templates with more RAM are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_max_ram_mb`. Same count-range
            semantics as `min_ram_mb`.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: min_disk_gb
          required: false
          description: |
            Inclusive lower bound on the template's `disk_gb` field.
            Templates with less disk are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_min_disk_gb`. Composes additively
            with every other list filter so `X-Total-Count` reflects the
            post-filter population. Mirrors the VM `?min_disk_gb=` filter
            (5.4.50) — opens the same capacity-audit query against the
            template cohort and completes the cpus/ram/disk capacity-audit
            trio on the template list.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: max_disk_gb
          required: false
          description: |
            Inclusive upper bound on the template's `disk_gb` field.
            Templates with more disk are filtered out. Whitespace is
            trimmed; empty disables the bound. Non-numeric or negative
            values return 400 `invalid_max_disk_gb`. Same count-range
            semantics as `min_disk_gb`.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Template list
          headers:
            X-Total-Count:
              $ref: '#/components/headers/XTotalCount'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VMTemplate'
        default:
          $ref: '#/components/responses/APIError'
    post:
      tags: [Templates]
      summary: Create a reusable VM template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMTemplate'
        '400':
          $ref: '#/components/responses/APIError'
        '413':
          $ref: '#/components/responses/APIError'
        default:
          $ref: '#/components/responses/APIError'
  /templates/bulk_delete:
    post:
      tags: [Templates]
      summary: Delete multiple templates in a single request
      description: |
        Delete a batch of templates either by explicit ID list or by tag
        selector. Returns a per-target result so partial failures (one
        template missing, the rest succeeded) surface in a single response.
        Exactly one of `ids` or `tag` must be provided. Tag matching is
