  <text x="380.0" y="23" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="13">vmsmith — create, snapshot, ssh</text>
<text class="term-line line-0" x="18" y="72"><tspan fill="#3fb950">$</tspan> <tspan fill="#e6edf3">vmsmith vm create web-01 --image rocky9 --cpus 2 --ram 2048 --ssh-key &quot;$(cat ~/.ssh/id_ed25519.pub)&quot;</tspan></text><text class="term-line line-1" x="18" y="94" fill="#8b949e">VM created successfully:</text><text class="term-line line-2" x="18" y="116" fill="#8b949e">  ID:    vm-1741234567890</text><text class="term-line line-3" x="18" y="138" fill="#8b949e">  Name:  web-01</text><text class="term-line line-4" x="18" y="160" fill="#58a6ff">  IP:    192.168.100.10   (static, ready before first boot)</text><text class="term-line line-5" x="18" y="182"><tspan fill="#3fb950">$</tspan> <tspan fill="#e6edf3">vmsmith vm list</tspan></text><text class="term-line line-6" x="18" y="204" fill="#8b949e">ID                 NAME    STATE    IP              CPUS  RAM_MB</text><text class="term-line line-7" x="18" y="226" fill="#8b949e">vm-1741234567890   web-01  running  192.168.100.10  2     2048</text><text class="term-line line-8" x="18" y="248"><tspan fill="#3fb950">$</tspan> <tspan fill="#e6edf3">vmsmith snapshot create vm-1741234567890 --name before-upgrade --tag audit</tspan></text><text class="term-line line-9" x="18" y="270" fill="#3fb950">Snapshot &#x27;before-upgrade&#x27; created</text><text class="term-line line-10" x="18" y="292"><tspan fill="#3fb950">$</tspan> <tspan fill="#e6edf3">ssh root@192.168.100.10</tspan></text><text class="term-line line-11" x="18" y="314" fill="#58a6ff">[root@web-01 ~]#  █</text>
