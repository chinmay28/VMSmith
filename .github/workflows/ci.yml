name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - '1.22'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install backend build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libvirt-dev

      - name: Download Go modules
        run: go mod download

      - name: Build backend
        run: make build-go

      - name: Run unit tests
        run: make test-unit

      - name: Run API integration tests
        run: make test-integration
