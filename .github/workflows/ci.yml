name: Build and Test

on:
  pull_request:

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-22.04
    env:
      CGO_ENABLED: 1
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - '1.22'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install backend build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libvirt-dev

      - name: Download Go modules
        run: go mod download

      - name: Create stub frontend dist for embed
        run: mkdir -p internal/web/dist && touch internal/web/dist/.gitkeep

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m ./...

      - name: Build backend
        run: make build-go

      - name: Vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test -v -race -count=1 -coverprofile=unit-coverage.out \
            ./internal/store/... ./internal/config/... ./internal/vm/... ./internal/cli/... ./internal/storage/... \
            2>&1 | tee unit-test-output.txt

      - name: Run API integration tests
        run: |
          go test -v -race -count=1 -coverprofile=integration-coverage.out \
            ./internal/api/... \
            2>&1 | tee integration-test-output.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for label_file in "Unit Tests:unit-test-output.txt" "Integration Tests:integration-test-output.txt"; do
            label="${label_file%%:*}"
            file="${label_file##*:}"
            if [ -f "$file" ]; then
              total=$(grep -c '^--- ' "$file" || true)
              passed=$(grep -c '^--- PASS' "$file" || true)
              failed=$(grep -c '^--- FAIL' "$file" || true)
              skipped=$(grep -c '^--- SKIP' "$file" || true)

              if [ "$failed" -gt 0 ]; then
                status="❌"
              else
                status="✅"
              fi

              echo "### ${status} ${label}" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Total | ${total} |" >> $GITHUB_STEP_SUMMARY
              echo "| Passed | ${passed} |" >> $GITHUB_STEP_SUMMARY
              echo "| Failed | ${failed} |" >> $GITHUB_STEP_SUMMARY
              echo "| Skipped | ${skipped} |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Coverage summary
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY

          for covfile in unit-coverage.out integration-coverage.out; do
            if [ -f "$covfile" ]; then
              go tool cover -func="$covfile" | while IFS= read -r line; do
                if echo "$line" | grep -q 'total:'; then
                  pkg=$(echo "$covfile" | sed 's/-coverage.out//')
                  pct=$(echo "$line" | awk '{print $NF}')
                  echo "| ${pkg} | ${pct} |" >> $GITHUB_STEP_SUMMARY
                fi
              done
            fi
          done

          # Print failed tests if any
          if grep -q '^--- FAIL' unit-test-output.txt integration-test-output.txt 2>/dev/null; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep '^--- FAIL' unit-test-output.txt integration-test-output.txt 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  frontend:
    name: Frontend build and mock GUI tests
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root test dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build frontend bundle
        run: make web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run mock GUI tests
        run: make test-web

      - name: Generate test summary
        if: always()
        run: |
          echo "## Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.json ]; then
            echo "See Playwright report for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "See job logs for test output." >> $GITHUB_STEP_SUMMARY
          fi
