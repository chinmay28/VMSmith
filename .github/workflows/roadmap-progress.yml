name: Roadmap progress

# Feature PRs touch docs/ROADMAP.md (a task row gets ✅ Done in its Notes cell)
# but historically also had to regenerate the README.md progress block in the
# same commit. That block is a single line range that every concurrent PR
# mutates, so it became a serial conflict point — every PR rebased against
# the others on the same line, even though no PR's logic depended on it.
#
# This workflow runs after a merge to main and:
#   1. Regenerates the README.md progress block via scripts/roadmap-progress.sh
#   2. If anything changed, commits and pushes the result back to main
#
# Effect: feature PRs no longer need to touch the progress block at all. The
# block is always in sync with docs/ROADMAP.md within one push to main.
#
# Idempotent: scripts/roadmap-progress.sh is a pure function of ROADMAP.md, so
# a no-op run (no roadmap change in the merge) regenerates the same content
# the script already wrote and the diff check skips the commit.

on:
  push:
    branches: [main]
    # Only re-run when something that affects the rendered block actually
    # changed. The README itself is in the path list so a manual edit (e.g.
    # someone touching the markers) re-syncs on the next push.
    paths:
      - docs/ROADMAP.md
      - scripts/roadmap-progress.sh
      - README.md
      - .github/workflows/roadmap-progress.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: roadmap-progress
  cancel-in-progress: false

jobs:
  regenerate:
    name: regenerate README progress block
    runs-on: ubuntu-latest
    # Skip the job's own auto-commits to avoid a self-trigger loop. The
    # commit author is set explicitly below; the same value is checked here.
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.author.email != 'helix-bot@users.noreply.github.com'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that can push back to main. The default
          # GITHUB_TOKEN's push is allowed because contents: write is set.
          # If branch protection rules require a PAT later, swap this for a
          # secrets.HELIX_BOT_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Regenerate progress block
        run: bash scripts/roadmap-progress.sh

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "README progress block already in sync; nothing to commit."
            exit 0
          fi
          git config user.name  'helix-bot'
          git config user.email 'helix-bot@users.noreply.github.com'
          git add README.md
          git commit -m 'chore(readme): regenerate roadmap progress block

Auto-regenerated by .github/workflows/roadmap-progress.yml after a
docs/ROADMAP.md change merged to main. Feature PRs no longer need to
touch the progress block.
'
          # Push with a small retry in case another merge raced us.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; rebasing on origin/main"
            git pull --rebase origin main
          done
          echo "push failed after retries" >&2
          exit 1
