[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    cli: CLI-based E2E tests
    api: REST API-based E2E tests
    gui: GUI/Playwright E2E tests
    networking: multi-NIC networking tests (require --host-iface)
    portforward: port forwarding tests
# Run tests in file order (important for stateful test classes)
addopts = -v --tb=short -p no:randomly
timeout = 600
# Custom CLI options (registered in conftest.py):
#   --rocky-image PATH       Rocky Linux qcow2 image (required)
#   --ssh-key PATH           SSH private key (default: ~/.ssh/id_rsa)
#   --ssh-user USER          SSH username (default: root)
#   --vmsmith-bin PATH       vmsmith binary (default: vmsmith)
#   --vmsmith-api URL        API URL (default: http://localhost:8080)
#   --host-iface NAME        Host interface for multi-NIC tests
#   --host-iface2 NAME       Second interface for dual-NIC tests
#   --ip-timeout SECS        VM IP wait timeout (default: 120)
#   --ssh-timeout SECS       SSH wait timeout (default: 180)
